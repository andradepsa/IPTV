<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>CineStream — Archive.org para TV</title>
<style>
:root {
  --red: #e50914;
  --teal: #00d4b4;
  --bg: #0a0a0f;
  --bg2: #111118;
  --bg3: #18181f;
  --bg4: #22222c;
  --text: #f0f0f5;
  --muted: #aaa;
  --border: #2a2a3a;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: Arial, sans-serif;
  font-size: 16px;
  min-height: 100vh;
  overflow-x: hidden;
}
@-webkit-keyframes spin { to { -webkit-transform: rotate(360deg); } }
@keyframes spin { to { transform: rotate(360deg); } }
@-webkit-keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
@keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
@-webkit-keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

/* ── TELA HOME ── */
#tela-home { display: block; }

/* CABEÇALHO */
.hd {
  background: #000;
  padding: 0 16px;
  border-bottom: 3px solid var(--red);
  position: -webkit-sticky;
  position: sticky;
  top: 0;
  z-index: 50;
  display: -webkit-box;
  display: -webkit-flex;
  display: flex;
  -webkit-box-align: center;
  -webkit-align-items: center;
  align-items: center;
  gap: 12px;
  height: 60px;
}
.logo {
  font-size: 28px;
  font-weight: bold;
  color: var(--red);
  letter-spacing: 1px;
  white-space: nowrap;
}
.logo span { color: var(--teal); font-size: 14px; }
.nav-tabs {
  display: -webkit-box;
  display: -webkit-flex;
  display: flex;
  gap: 6px;
  -webkit-box-flex: 1;
  -webkit-flex: 1;
  flex: 1;
  overflow-x: auto;
}
.nt {
  padding: 8px 16px;
  background: transparent;
  color: var(--muted);
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
  border-radius: 30px;
  border: none;
  white-space: nowrap;
  font-family: Arial, sans-serif;
}
.nt.on { background: var(--red); color: white; }
.btn-guide {
  padding: 8px 16px;
  border: 2px solid var(--teal);
  background: transparent;
  color: var(--teal);
  font-size: 14px;
  font-weight: bold;
  cursor: pointer;
  border-radius: 30px;
  font-family: Arial, sans-serif;
}

/* BARRA DE BUSCA */
.sb {
  padding: 12px 16px;
  background: var(--bg2);
  display: -webkit-box;
  display: -webkit-flex;
  display: flex;
  gap: 10px;
  -webkit-box-align: center;
  -webkit-align-items: center;
  align-items: center;
  -webkit-flex-wrap: wrap;
  flex-wrap: wrap;
  border-bottom: 1px solid var(--border);
}
.sb input {
  -webkit-box-flex: 3;
  -webkit-flex: 3;
  flex: 3;
  min-width: 160px;
  padding: 10px 16px;
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text);
  font-size: 16px;
  border-radius: 30px;
  outline: none;
  font-family: Arial, sans-serif;
}
.sb button {
  padding: 10px 22px;
  background: var(--red);
  border: none;
  color: white;
  font-size: 16px;
  font-weight: bold;
  border-radius: 30px;
  cursor: pointer;
  font-family: Arial, sans-serif;
}
.src-badge {
  padding: 6px 14px;
  border-radius: 30px;
  font-size: 14px;
  font-weight: bold;
  white-space: nowrap;
}

/* CATEGORIAS */
.cats {
  padding: 10px 16px;
  background: var(--bg2);
  display: -webkit-box;
  display: -webkit-flex;
  display: flex;
  gap: 6px;
  -webkit-flex-wrap: wrap;
  flex-wrap: wrap;
  border-bottom: 1px solid var(--border);
}
.cb {
  background: var(--bg4);
  border: 1px solid var(--border);
  color: var(--muted);
  padding: 6px 14px;
  font-size: 14px;
  font-weight: bold;
  border-radius: 30px;
  cursor: pointer;
  font-family: Arial, sans-serif;
}
.cb.on { background: var(--red); border-color: var(--red); color: white; }

/* INFOS */
.ib {
  text-align: center;
  padding: 10px;
  font-size: 14px;
  color: var(--muted);
  background: var(--bg);
}

/* BARRA DE PROGRESSO */
.progress-bar-wrap { height: 3px; background: var(--bg3); overflow: hidden; }
.progress-bar { height: 100%; background: var(--red); width: 0%; }

/* GRADE */
.gr {
  padding: 16px 12px;
  max-width: 1600px;
  margin: 0 auto;
  display: -webkit-box;
  display: -webkit-flex;
  display: flex;
  -webkit-flex-wrap: wrap;
  flex-wrap: wrap;
  gap: 16px;
  -webkit-box-pack: center;
  -webkit-justify-content: center;
  justify-content: center;
}

/* SKELETON CARD */
.cd-skeleton {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  width: 130px;
}
.cd-skeleton-img {
  width: 100%;
  /* padding-bottom trick = aspect-ratio 2/3 */
  padding-bottom: 150%;
  background: linear-gradient(90deg, var(--bg3) 25%, var(--bg4) 50%, var(--bg3) 75%);
  background-size: 200% 100%;
  -webkit-animation: shimmer 1.5s infinite;
  animation: shimmer 1.5s infinite;
}
.cd-skeleton-line {
  height: 10px;
  margin: 6px 8px;
  border-radius: 5px;
  background: linear-gradient(90deg, var(--bg3) 25%, var(--bg4) 50%, var(--bg3) 75%);
  background-size: 200% 100%;
  -webkit-animation: shimmer 1.5s infinite;
  animation: shimmer 1.5s infinite;
}
.cd-skeleton-line.short { width: 60%; }

/* CARD INDIVIDUAL */
.cd {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 10px;
  cursor: pointer;
  overflow: hidden;
  width: 130px;
  -webkit-animation: fadeIn 0.3s ease both;
  animation: fadeIn 0.3s ease both;
}
/* wrapper para substituir aspect-ratio */
.cd-thumb-wrap {
  width: 100%;
  padding-bottom: 150%; /* 2:3 ratio */
  position: relative;
  overflow: hidden;
  background: #111;
}
.cd-thumb-wrap img {
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  height: 100%;
  display: block;
  -o-object-fit: cover;
  object-fit: cover;
}
.ci { padding: 6px 8px 8px; }
.ct {
  font-size: 12px;
  font-weight: bold;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  color: var(--text);
}
.cm { font-size: 11px; color: var(--red); margin-top: 3px; }
.cc {
  font-size: 10px;
  color: var(--muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* PAGINAÇÃO */
.pg { text-align: center; padding: 14px; }
.pb {
  display: inline-block;
  background: var(--bg4);
  padding: 8px 14px;
  margin: 3px;
  border-radius: 24px;
  font-size: 14px;
  font-weight: bold;
  cursor: pointer;
}
.pb.on { background: var(--red); color: white; }

/* ── TELA PLAYER (igual ao tv.html) ── */
#tela-player {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: #000;
  z-index: 200;
}
#vid-player {
  width: 100%;
  height: 100%;
  display: block;
}
#player-osd {
  position: absolute;
  top: 0; left: 0; right: 0;
  background: rgba(0,0,0,0.85);
  padding: 14px 20px;
}
#player-titulo {
  font-size: 18px;
  font-weight: bold;
  color: #fff;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
#player-info {
  font-size: 12px;
  color: var(--teal);
  margin-top: 3px;
}
#player-carregando {
  position: absolute;
  top: 50%; left: 50%;
  -webkit-transform: translate(-50%,-50%);
  transform: translate(-50%,-50%);
  font-size: 16px;
  color: #888;
  text-align: center;
}
#player-controles {
  position: absolute;
  bottom: 20px;
  left: 50%;
  -webkit-transform: translateX(-50%);
  transform: translateX(-50%);
  display: -webkit-box;
  display: -webkit-flex;
  display: flex;
  gap: 12px;
  -webkit-box-align: center;
  -webkit-align-items: center;
  align-items: center;
}
#player-controles.oculto { opacity: 0; pointer-events: none; }
#btn-voltar-home {
  background: #111;
  border: 2px solid #00aaff;
  color: #00aaff;
  font-size: 14px;
  font-weight: bold;
  padding: 10px 32px;
  border-radius: 30px;
  cursor: pointer;
  font-family: Arial, sans-serif;
}
#btn-archive-direct {
  background: #111;
  border: 2px solid var(--teal);
  color: var(--teal);
  font-size: 14px;
  font-weight: bold;
  padding: 10px 24px;
  border-radius: 30px;
  cursor: pointer;
  font-family: Arial, sans-serif;
}
#player-erro {
  display: none;
  position: absolute;
  top: 50%; left: 50%;
  -webkit-transform: translate(-50%,-50%);
  transform: translate(-50%,-50%);
  background: #111;
  border: 2px solid #ff5555;
  border-radius: 12px;
  padding: 20px 32px;
  text-align: center;
  z-index: 10;
}
#player-erro p { font-size: 15px; color: #ff8888; margin-bottom: 12px; }
#player-erro button {
  padding: 10px 22px;
  background: var(--bg4);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 24px;
  cursor: pointer;
  font-size: 14px;
  font-family: Arial, sans-serif;
}

/* GUIA */
#gm {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.97);
  z-index: 300;
  overflow: auto;
  padding: 30px 16px;
}
</style>
</head>
<body>

<!-- ── TELA HOME ── -->
<div id="tela-home">
  <div class="hd">
    <div class="logo">CINE<span>STREAM</span></div>
    <div class="nav-tabs">
      <button class="nt on" id="tab-filmes">&#127916; FILMES</button>

<!-- GUIA -->
<div id="gm">
  <div style="max-width:860px;margin:0 auto;background:#0f0f15;border-radius:16px;padding:20px;">
    <span id="btnCloseGuide" style="float:right;font-size:32px;cursor:pointer;">&times;</span>
    <h2 style="font-size:26px;">GUIA <span style="color:var(--teal)">CINESTREAM</span></h2>
    <p style="margin:10px 0 16px;color:var(--muted);">Filmes e vídeos públicos do Internet Archive.</p>
    <div style="background:var(--bg3);border-radius:10px;padding:14px;margin-bottom:14px;font-size:14px;color:var(--muted);line-height:1.9;">
      <b style="color:var(--teal)">&#128250; Modo TV</b><br>
      Cards carregados em lotes. Player nativo sem iframe.<br>
      Compatível com TVs antigas e Smart TVs.
    </div>
    <button id="btnCloseGuide2" style="background:var(--red);width:100%;padding:12px;border:none;color:white;font-size:16px;border-radius:30px;cursor:pointer;">FECHAR</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@1/dist/hls.min.js"></script>
<script>
(function(){

// ── Detecção de TV ─────────────────────────────────────────────
var _ua = (navigator.userAgent || '').toLowerCase();
var IS_TV = /smart-?tv|smarttv|tizen|web0s|webos|hbbtv|netcast|viera|bravia|aquos|inettvbrowser|crkey|googletv|appletv|aoc|philips|samsung.*tv|lg.*tv|tv.*browser/.test(_ua);
try { if (localStorage.getItem('cine_tv') === '1') IS_TV = true; } catch(e) {}

// ── Lotes (igual ao tv.html) ───────────────────────────────────
var CHUNK_SIZE  = IS_TV ? 4  : 12;
var CHUNK_PAUSE = IS_TV ? 200 : 60;
var PP = IS_TV ? 16 : 24;

// ── Estado global ──────────────────────────────────────────────
var state = { source:'archive', cat:'', q:'', page:1, tot:0, loading:false };
var FMT_PRIORIDADE = ['MPEG4','512Kb MPEG4','H.264 IA','H.264','HiRes MPEG4','Ogg Video','HLS'];
var EXT_VALIDAS = ['.mp4','.m4v','.ogv','.mkv','.m3u8'];

var gr = document.getElementById('gr');
var ib = document.getElementById('ib');
var si = document.getElementById('si');
var pgd = document.getElementById('pg');
var srcBadge = document.getElementById('srcBadge');
var catsDiv = document.getElementById('cats');
var progressBar = document.getElementById('progressBar');
var telaHome = document.getElementById('tela-home');
var telaPlayer = document.getElementById('tela-player');
var vidPlayer = document.getElementById('vid-player');
var playerTitulo = document.getElementById('player-titulo');
var playerInfo = document.getElementById('player-info');
var playerCarregando = document.getElementById('player-carregando');
var playerErro = document.getElementById('player-erro');

var hlsObj = null;
var curArchId = null;
var hidePlayerCtrlTmr = null;

// ── Proxies CORS (igual tv.html) ──────────────────────────────
var PROXIES = [
  'https://corsproxy.io/?url=',
  'https://api.allorigins.win/raw?url=',
  'https://api.codetabs.com/v1/proxy/?quest='
];

// ── XHR com fallback proxy (igual tv.html) ────────────────────
function xhrGet(url, cb) {
  var tentativas = [url];
  for (var i = 0; i < PROXIES.length; i++) {
    tentativas.push(PROXIES[i] + encodeURIComponent(url));
  }
  var ti = 0;
  function next() {
    if (ti >= tentativas.length) { cb(null); return; }
    var u = tentativas[ti++];
    var r = new XMLHttpRequest();
    r.open('GET', u, true);
    try { r.timeout = 14000; } catch(e) {}
    r.onreadystatechange = function() {
      if (r.readyState !== 4) return;
      if (r.status === 200 && r.responseText) {
        cb(r.responseText);
      } else {
        next();
      }
    };
    r.onerror = next;
    r.ontimeout = next;
    try { r.send(); } catch(e) { next(); }
  }
  next();
}

// ── Barra de progresso ─────────────────────────────────────────
function setProgress(pct) {
  progressBar.style.width = pct + '%';
}

// ── Miniatura ──────────────────────────────────────────────────
function getThumbnailUrl(id) {
  return 'https://archive.org/services/img/' + encodeURIComponent(id);
}

// ── Escape HTML ────────────────────────────────────────────────
function esc(s) {
  if (!s) return '';
  return String(s).replace(/[&<>"]/g, function(m) {
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m];
  });
}

// ── Skeletons ──────────────────────────────────────────────────
function renderSkeletons(count) {
  var html = '';
  for (var i = 0; i < count; i++) {
    html += '<div class="cd-skeleton">'
      + '<div class="cd-skeleton-img"></div>'
      + '<div style="padding:6px 8px">'
      + '<div class="cd-skeleton-line"></div>'
      + '<div class="cd-skeleton-line short"></div>'
      + '</div></div>';
  }
  gr.innerHTML = html;
}

// ── Criar card ─────────────────────────────────────────────────
function criarCard(d) {
  var id = d.identifier;
  var titulo = d.title || 'Sem título';
  var curto = titulo.length > 50 ? titulo.substr(0,47) + '...' : titulo;
  var ano = d.year || '?';
  var creator = d.creator ? String(d.creator).substr(0,40) : '';
  var downloads = d.downloads ? Number(d.downloads).toLocaleString() : '';

  var el = document.createElement('div');
  el.className = 'cd';

  var thumbHtml = '<div class="cd-thumb-wrap">'
    + '<img src="' + getThumbnailUrl(id) + '" alt="" '
    + 'onerror="this.src=\'https://archive.org/images/notfound.png\'">'
    + '</div>';

  el.innerHTML = thumbHtml
    + '<div class="ci">'
    + '<div class="ct">' + esc(curto) + '</div>'
    + '<div class="cm">' + esc(ano) + '</div>'
    + '<div class="cc">' + esc(creator) + '</div>'
    + '</div>';

  el.onclick = function() {
    abrirPlayer(id, titulo, ano, creator, downloads);
  };
  return el;
}

// ── Renderização progressiva em lotes (padrão tv.html) ─────────
function renderCardsProgressivo(docs) {
  if (!docs.length) {
    gr.innerHTML = '<div style="text-align:center;padding:40px;color:var(--muted)">Nenhum resultado</div>';
    setProgress(100);
    return;
  }
  gr.innerHTML = '';
  var total = docs.length;
  var idx = 0;

  function processarLote() {
    var fim = Math.min(idx + CHUNK_SIZE, total);
    var frag = document.createDocumentFragment();
    for (var i = idx; i < fim; i++) {
      frag.appendChild(criarCard(docs[i]));
    }
    gr.appendChild(frag);
    idx = fim;
    var pct = Math.round((idx / total) * 100);
    setProgress(pct);
    ib.textContent = state.tot.toLocaleString() + ' itens · Pág.' + state.page
      + ' · Carregando ' + idx + '/' + total + '...';
    if (idx < total) {
      setTimeout(processarLote, CHUNK_PAUSE);
    } else {
      ib.textContent = state.tot.toLocaleString() + ' itens · Pág.' + state.page
        + ' · Archive.org' + (IS_TV ? ' (Modo TV)' : '');
      setTimeout(function(){ setProgress(0); }, 800);
    }
  }
  processarLote();
}

// ── JSONP para Archive.org (sem fetch) ─────────────────────────
function fetchJSONP(url, cb) {
  var name = '_cb_' + Date.now() + '_' + Math.floor(Math.random() * 99999);
  var script = document.createElement('script');
  var timeout = setTimeout(function() {
    cleanup();
    cb(null);
  }, 15000);
  window[name] = function(data) {
    clearTimeout(timeout);
    cleanup();
    cb(data);
  };
  function cleanup() {
    try { delete window[name]; } catch(e) { window[name] = undefined; }
    if (script.parentNode) script.parentNode.removeChild(script);
  }
  script.onerror = function() {
    clearTimeout(timeout);
    cleanup();
    cb(null);
  };
  script.src = url + '&callback=' + name;
  document.head.appendChild(script);
}

// ── Busca ──────────────────────────────────────────────────────
function load() {
  if (state.loading) return;
  state.loading = true;
  renderSkeletons(PP);
  pgd.innerHTML = '';
  ib.textContent = 'Buscando no Archive.org...';
  setProgress(10);

  var query = buildQuery();
  var url = 'https://archive.org/advancedsearch.php?q=' + encodeURIComponent(query)
    + '&fl[]=identifier&fl[]=title&fl[]=year&fl[]=creator&fl[]=downloads'
    + '&sort[]=downloads+desc&rows=' + PP + '&page=' + state.page + '&output=json';

  fetchJSONP(url, function(data) {
    state.loading = false;
    setProgress(50);
    if (!data || !data.response) {
      gr.innerHTML = '<div style="text-align:center;padding:40px;color:var(--muted)">Erro de conexão</div>';
      ib.textContent = 'Falha na conexão';
      setProgress(0);
      return;
    }
    var docs = data.response.docs || [];
    state.tot = data.response.numFound || 0;
    if (!docs.length) {
      gr.innerHTML = '<div style="text-align:center;padding:40px;color:var(--muted)">Nenhum resultado</div>';
      ib.textContent = 'Nenhum resultado';
      setProgress(0);
      return;
    }
    renderCardsProgressivo(docs);
    renderPag();
  });
}

function buildQuery() {
  var q = state.q, cat = state.cat, src = state.source;
  var col = '';
  if (src === 'docs') {
    col = cat
      ? 'collection:' + cat
      : '(collection:feature_films OR collection:prelinger OR collection:german_cinema OR collection:classic_tv)';
    col += ' AND mediatype:movies';
  } else if (src === 'cartoons') {
    col = cat ? 'collection:' + cat : 'collection:animationandcartoons';
    col += ' AND mediatype:movies';
  } else {
    col = cat
      ? 'collection:' + cat
      : '(collection:feature_films OR collection:Comedy_Films OR collection:Film_Noir OR collection:SciFi_Horror OR collection:silent_films OR collection:short_films OR collection:prelinger OR collection:animationandcartoons)';
    col += ' AND mediatype:movies';
  }
  if (q) col = '(' + col + ') AND title:(' + q + ')';
  return col;
}

// ── Paginação ──────────────────────────────────────────────────
function renderPag() {
  var total = Math.ceil(state.tot / PP);
  if (total <= 1) { pgd.innerHTML = ''; return; }
  var html = '<span class="pb" id="pg-prev">&#9664;</span>';
  var maxPag = Math.min(total, 8);
  for (var i = 1; i <= maxPag; i++) {
    html += '<span class="pb ' + (i === state.page ? 'on' : '') + '" data-page="' + i + '">' + i + '</span>';
  }
  html += '<span class="pb" id="pg-next">&#9654;</span>';
  pgd.innerHTML = html;

  var prev = document.getElementById('pg-prev');
  var next = document.getElementById('pg-next');
  if (state.page <= 1) prev.style.opacity = '0.4';
  else prev.onclick = function() { state.page--; load(); window.scrollTo(0,0); };

  if (state.page >= total) next.style.opacity = '0.4';
  else next.onclick = function() { state.page++; load(); window.scrollTo(0,0); };

  var pbs = document.querySelectorAll('.pb[data-page]');
  for (var j = 0; j < pbs.length; j++) {
    (function(btn) {
      var p = parseInt(btn.getAttribute('data-page'), 10);
      btn.onclick = function() { state.page = p; load(); window.scrollTo(0,0); };
    })(pbs[j]);
  }
}

// ── Player fullscreen (padrão tv.html, SEM iframe) ────────────
function pararPlayer() {
  if (hlsObj) { try { hlsObj.destroy(); } catch(e){} hlsObj = null; }
  try { vidPlayer.pause(); vidPlayer.src = ''; vidPlayer.load(); } catch(e) {}
}

function abrirPlayer(id, titulo, ano, creator, downloads) {
  curArchId = id;
  pararPlayer();
  playerTitulo.textContent = titulo;
  playerInfo.textContent = (ano && ano !== '?' ? ano + ' · ' : '') + (creator || '') + (downloads ? ' · ' + downloads + ' acessos' : '');
  playerCarregando.textContent = 'Carregando vídeo...';
  playerCarregando.style.display = 'block';
  playerErro.style.display = 'none';

  telaHome.style.display = 'none';
  telaPlayer.style.display = 'block';

  carregarVideo(id);
  mostrarControlesPlayer();
}

function voltarHome() {
  pararPlayer();
  telaPlayer.style.display = 'none';
  telaHome.style.display = 'block';
  curArchId = null;
}

// ── Carregar metadados via XHR (sem fetch) ────────────────────
function carregarVideo(id) {
  var metaUrl = 'https://archive.org/metadata/' + encodeURIComponent(id);
  xhrGet(metaUrl, function(txt) {
    if (!txt) {
      mostrarErroPlayer();
      return;
    }
    var data;
    try { data = JSON.parse(txt); } catch(e) { mostrarErroPlayer(); return; }

    var files = data.files || [];
    var url = encontrarMelhorUrl(files, id);
    if (url) {
      tocarUrl(url, id);
    } else {
      mostrarErroPlayer();
    }
  });
}

// ── Encontrar URL sem Array.find/some (compatível com TVs antigas) ──
function temExtensaoValida(nome) {
  if (!nome) return false;
  var nomeLower = nome.toLowerCase();
  for (var ei = 0; ei < EXT_VALIDAS.length; ei++) {
    if (nomeLower.indexOf(EXT_VALIDAS[ei], nomeLower.length - EXT_VALIDAS[ei].length) !== -1) {
      return true;
    }
  }
  return false;
}

function encontrarMelhorUrl(files, id) {
  // Prioridade por formato
  for (var f = 0; f < FMT_PRIORIDADE.length; f++) {
    var fmt = FMT_PRIORIDADE[f];
    for (var i = 0; i < files.length; i++) {
      var fi = files[i];
      if (fi.format === fmt && temExtensaoValida(fi.name)) {
        return 'https://archive.org/download/' + encodeURIComponent(id) + '/' + encodeURIComponent(fi.name);
      }
    }
  }
  // Fallback: qualquer .mp4
  for (var j = 0; j < files.length; j++) {
    var fn = files[j].name || '';
    if (fn.toLowerCase().indexOf('.mp4') !== -1) {
      return 'https://archive.org/download/' + encodeURIComponent(id) + '/' + encodeURIComponent(fn);
    }
  }
  return null;
}

// ── Tocar URL (igual ao tv.html: HLS.js + fallback nativo) ─────
function tocarUrl(url, id) {
  playerCarregando.style.display = 'none';
  playerErro.style.display = 'none';

  var isHls = url.toLowerCase().indexOf('.m3u8') !== -1;

  if (isHls && window.Hls && Hls.isSupported()) {
    if (hlsObj) { try { hlsObj.destroy(); } catch(e){} }
    hlsObj = new Hls();
    hlsObj.loadSource(url);
    hlsObj.attachMedia(vidPlayer);
    hlsObj.on(Hls.Events.MANIFEST_PARSED, function() {
      try { vidPlayer.play(); } catch(e) { vidPlayer.muted = true; vidPlayer.play(); }
    });
    hlsObj.on(Hls.Events.ERROR, function(evt, data) {
      if (data && data.fatal) { mostrarErroPlayer(); }
    });
  } else {
    vidPlayer.src = url;
    vidPlayer.load();
    try { vidPlayer.play(); } catch(e) { vidPlayer.muted = true; try { vidPlayer.play(); } catch(e2){} }
  }

  vidPlayer.onerror = function() {
    mostrarErroPlayer();
  };
}

function mostrarErroPlayer() {
  playerCarregando.style.display = 'none';
  playerErro.style.display = 'block';
}

// ── Controles do player ───────────────────────────────────────
var playerCtrl = document.getElementById('player-controles');
function mostrarControlesPlayer() {
  playerCtrl.classList.remove('oculto');
  clearTimeout(hidePlayerCtrlTmr);
  hidePlayerCtrlTmr = setTimeout(function() {
    playerCtrl.classList.add('oculto');
  }, 4000);
}

['mousemove','mousedown','touchstart','keydown'].forEach(function(ev) {
  telaPlayer.addEventListener(ev, mostrarControlesPlayer);
});

// ── Categorias ─────────────────────────────────────────────────
var CATS = {
  archive: [
    {k:'',l:'TODOS'},{k:'feature_films',l:'LONGAS'},{k:'Comedy_Films',l:'COMÉDIA'},
    {k:'SciFi_Horror',l:'SCI-FI'},{k:'silent_films',l:'MUDOS'},{k:'short_films',l:'CURTAS'},
    {k:'animationandcartoons',l:'ANIMAÇÃO'},{k:'prelinger',l:'PRELINGER'},
    {k:'classic_tv',l:'TV'},{k:'german_cinema',l:'ALEMÃO'}
  ],
  cartoons: [
    {k:'',l:'TODOS'},{k:'animationandcartoons',l:'ANIMAÇÃO'},{k:'short_films',l:'CURTAS'}
  ],
  docs: [
    {k:'',l:'TODOS'},{k:'feature_films',l:'LONGAS'},{k:'prelinger',l:'HISTÓRIA'},{k:'classic_tv',l:'TV CLÁSSICA'}
  ]
};

function renderCats() {
  var list = CATS[state.source] || [];
  var html = '';
  for (var i = 0; i < list.length; i++) {
    var c = list[i];
    html += '<span class="cb' + (c.k === state.cat ? ' on' : '') + '" data-k="' + c.k + '">' + c.l + '</span>';
  }
  catsDiv.innerHTML = html;
  var cbs = document.querySelectorAll('.cb');
  for (var j = 0; j < cbs.length; j++) {
    (function(el) {
      el.onclick = function() {
        state.cat = el.getAttribute('data-k');
        state.page = 1;
        renderCats();
        load();
      };
    })(cbs[j]);
  }
}

function switchSource(src) {
  var tabs = document.querySelectorAll('.nt');
  for (var i = 0; i < tabs.length; i++) tabs[i].classList.remove('on');
  var idx = {archive:0, cartoons:1, docs:2}[src] || 0;
  tabs[idx].classList.add('on');
  state.source = src;
  state.cat = (src === 'cartoons') ? 'animationandcartoons' : '';
  state.q = '';
  state.page = 1;
  si.value = '';
  renderCats();
  load();
}

document.getElementById('tab-filmes').onclick   = function() { switchSource('archive'); };
document.getElementById('tab-cartoons').onclick = function() { switchSource('cartoons'); };
document.getElementById('tab-docs').onclick     = function() { switchSource('docs'); };

document.getElementById('btnBuscar').onclick = function() {
  state.q = si.value.replace(/^\s+|\s+$/g, '');
  state.page = 1;
  load();
};
si.onkeydown = function(e) {
  var key = e.key || e.keyCode;
  if (key === 'Enter' || key === 13) {
    state.q = si.value.replace(/^\s+|\s+$/g, '');
    state.page = 1;
    load();
  }
};
