<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>K60 FAST TV (TV Lite)</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#fff;font-family:Arial,sans-serif;overflow:hidden}
#tela-home{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;align-items:flex-start;justify-content:center;gap:20px;padding:0 20px;overflow:hidden}
#home-centro{flex:1;max-width:580px;height:100%;overflow-y:auto;padding-bottom:20px;text-align:center}
#home-lado{width:320px;max-width:35%;height:100%;padding:30px 0 20px;display:flex;flex-direction:column}
@media(max-width:720px){#tela-home{flex-direction:column;align-items:stretch;padding:0 10px;overflow-y:auto}#home-centro{height:auto;max-width:none;overflow:visible}#home-lado{width:100%;max-width:none;height:300px;padding:0 0 20px}}
#titulo{font-size:32px;font-weight:bold;color:#ff6600;padding-top:30px;margin-bottom:4px}
#subtitulo{font-size:12px;color:#555;margin-bottom:12px}
#status-line{font-size:14px;color:#888;margin-bottom:8px}
#status-line span{color:#ff6600;font-weight:bold}
#filtros{margin-bottom:12px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
#filtros select{background:#111;color:#ff6600;border:2px solid #ff6600;border-radius:20px;padding:6px 14px;font-size:13px;font-weight:bold;cursor:pointer;outline:none}
#display-canal{display:inline-block;border:3px solid #333;border-radius:12px;padding:12px 36px;margin-bottom:8px;min-width:240px}
#display-canal.ativo{border-color:#ff6600}
#digitos{font-size:52px;font-weight:bold;color:#ff6600;font-family:monospace;letter-spacing:4px;min-height:62px;line-height:1}
#digitos.vazio{color:#222}
#instrucao{font-size:11px;color:#444;margin-top:6px}
#btn-enter{margin-top:12px;background:#111;border:2px solid #ff6600;color:#ff6600;font-size:15px;font-weight:bold;padding:10px 44px;border-radius:30px;cursor:pointer}
#log-fontes{margin-top:10px;font-size:11px;color:#444;line-height:1.7;max-height:80px;overflow-y:auto;text-align:left;padding:0 8px}
#log-fontes .ok{color:#00cc66}
#log-fontes .err{color:#ff4444}
#log-fontes .load{color:#888}
#tela-player{position:absolute;top:0;left:0;width:100%;height:100%;background:#000;display:none}
#vid{width:100%;height:100%;display:block}
#osd{position:absolute;top:0;left:0;right:0;background:rgba(0,0,0,0.88);padding:14px 22px}
#osd-num{font-size:38px;font-weight:bold;color:#ff6600;font-family:monospace}
#osd-nome{font-size:18px;color:#fff;margin-top:2px}
#osd-plat{font-size:11px;color:#ff6600;margin-top:3px;text-transform:uppercase;letter-spacing:2px}
#osd-estado{font-size:11px;color:#888;margin-top:2px}
#carregando{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:16px;color:#888;text-align:center}
#p-canal{position:absolute;bottom:80px;left:50%;transform:translateX(-50%);background:#111;border:2px solid #ffaa00;border-radius:10px;padding:10px 28px;text-align:center;display:none}
#p-canal-val{font-size:34px;font-weight:bold;color:#ffaa00;font-family:monospace;letter-spacing:6px}
#controles{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:12px;transition:opacity .4s}
#controles.oculto{opacity:0;pointer-events:none}
#btn-voltar{background:#111;border:2px solid #ff6600;color:#ff6600;font-size:14px;font-weight:bold;padding:10px 36px;border-radius:30px;cursor:pointer}
.btn-ch{background:#111;border:2px solid #ffaa00;color:#ffaa00;font-size:20px;font-weight:bold;width:48px;height:48px;border-radius:50%;cursor:pointer}
#toast{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:#111;border:2px solid #ff5555;border-radius:12px;padding:22px 36px;text-align:center;display:none;z-index:99}
#favs{margin:0;width:100%;height:100%;overflow-y:auto;background:#0a0a0a;border:2px solid #333;border-radius:12px;padding:10px;text-align:left}
.fav-item{display:flex;align-items:center;justify-content:space-between;background:#111;border:1px solid #333;border-radius:8px;padding:7px 12px;margin-bottom:5px;cursor:pointer}
.fav-nome{font-size:13px;color:#fff;flex:1}
.fav-plat{font-size:10px;color:#ff6600;margin-right:8px}
.fav-del{background:none;border:none;color:#ff5555;font-size:16px;cursor:pointer;padding:0 0 0 10px}
#btn-fav{background:#111;border:2px solid #ffdd00;color:#ffdd00;font-size:18px;width:48px;height:48px;border-radius:50%;cursor:pointer}
#btn-fav.favoritado{background:#ffdd00;color:#000}
#volume-ctrl{position:absolute;bottom:90px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:10px;background:rgba(0,0,0,0.75);border:2px solid #ff6600;border-radius:30px;padding:7px 16px;z-index:10}
#btn-sintonizar{margin-top:10px;background:#111;border:2px solid #00ff88;color:#00ff88;font-size:13px;font-weight:bold;padding:9px 26px;border-radius:30px;cursor:pointer}
#sint-progresso{font-size:12px;color:#00ff88;margin-top:7px;min-height:16px}
#btn-limpar-sint{background:#111;border:2px solid #ff5555;color:#ff5555;font-size:12px;font-weight:bold;padding:7px 20px;border-radius:30px;cursor:pointer;display:none}
#btn-relatorio{background:#111;border:2px solid #aaa;color:#aaa;font-size:12px;font-weight:bold;padding:7px 20px;border-radius:30px;cursor:pointer;display:none}
</style>
</head>
<body>

<div id="tela-home">
  <div id="home-centro">
    <div id="titulo">📺 K60 FAST TV</div>
    <div id="subtitulo">Pluto · Tubi · Roku · LG · Vizio · XUMO · Distro · Cineverse</div>
    <div id="status-line">Carregando fontes...</div>
    <div id="filtros">
      <select id="sel-plat"><option value="">🌐 Todas as plataformas</option></select>
      <select id="sel-cat"><option value="">📂 Todas as categorias</option></select>
    </div>

    <button id="btn-relatorio">📄 Ver relatório</button>

  </div>
  <aside id="home-lado"><div id="favs"></div></aside>
</div>

<div id="tela-player">
  <video id="vid" autoplay></video>
  <div id="osd"><div id="osd-num">-</div><div id="osd-nome">Canal</div><div id="osd-plat"></div><div id="osd-estado">Conectando...</div></div>
  <div id="carregando">Conectando ao canal...</div>
  <div id="p-canal"><div id="p-canal-val">_</div></div>
  <div id="volume-ctrl"><button id="btn-mute">🔊</button><input id="vol-slider" type="range" min="0" max="100" value="100"><span id="vol-label">100%</span></div>
  <div id="controles"><button class="btn-ch" id="btn-ch-baixo">▼</button><button id="btn-voltar">◀ Voltar</button><button class="btn-ch" id="btn-ch-cima">▲</button><button id="btn-fav">★</button></div>
</div>
<div id="toast"><p>Canal indisponível</p><small>Pulando...</small></div>
<div id="modal-relatorio" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);z-index:200;overflow:auto;padding:24px"><div style="max-width:600px;margin:0 auto;background:#0d0d0d;border:2px solid #00ff88;border-radius:14px;padding:24px"><div style="display:flex;justify-content:space-between;margin-bottom:16px"><div style="color:#00ff88">📡 Relatório</div><button onclick="fecharRelatorio()" style="background:none;border:2px solid #ff5555;color:#ff5555;padding:6px 16px;border-radius:20px">✕ Fechar</button></div><textarea id="relatorio-txt" readonly style="width:100%;height:400px;background:#000;color:#ccc;border:1px solid #333;border-radius:8px;padding:12px;font-family:monospace;font-size:12px"></textarea><div style="margin-top:12px;text-align:right"><button onclick="copiarRelatorio()" style="background:#111;border:2px solid #00ff88;color:#00ff88;padding:8px 24px;border-radius:20px">📋 Copiar</button></div><div id="copiar-ok" style="margin-top:6px;font-size:12px;color:#0f0"></div></div></div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@1/dist/hls.min.js"></script>
<script>
// ========== FONTES FAST (lista completa, mas carregaremos uma por vez) ==========
const FONTES = [
  { nome:'Pluto TV',    url:'https://raw.githubusercontent.com/BuddyChewChew/app-m3u-generator/refs/heads/main/playlists/plutotv_us.m3u' },
  { nome:'Tubi TV',     url:'https://raw.githubusercontent.com/BuddyChewChew/app-m3u-generator/refs/heads/main/playlists/tubi_all.m3u' },
  { nome:'Roku',        url:'https://raw.githubusercontent.com/BuddyChewChew/app-m3u-generator/refs/heads/main/playlists/roku_all.m3u' },
  { nome:'Vizio',       url:'https://www.apsattv.com/vizio.m3u' },
  { nome:'XUMO',        url:'https://www.apsattv.com/xumo.m3u' },
  { nome:'Distro',      url:'https://www.apsattv.com/distro.m3u' },
  { nome:'Local Now',   url:'https://www.apsattv.com/localnow.m3u' },
  { nome:'Cineverse',   url:'https://www.apsattv.com/cineverse.m3u' },
  { nome:'Vidaa',       url:'https://www.apsattv.com/vidaa.m3u' },
  { nome:'Whale TV',    url:'https://www.apsattv.com/whaletvplus_all.m3u' },
  { nome:'TCL TV Plus', url:'https://www.apsattv.com/tclplus.m3u' },
  { nome:'Metax',       url:'https://www.apsattv.com/metax.m3u' },
  { nome:'Galxy.TV',    url:'https://www.apsattv.com/galxytv.m3u' },
  { nome:'Freelivesports', url:'https://www.apsattv.com/freelivesports.m3u' },
  { nome:'Rewardedtv',  url:'https://www.apsattv.com/rewardedtv.m3u' },
  { nome:'HP Fast',     url:'https://www.apsattv.com/hp.m3u' },
  { nome:'Orka TV',     url:'https://www.apsattv.com/orka.m3u' },
  { nome:'Xiaomi',      url:'https://www.apsattv.com/xiaomi.m3u' },
  { nome:'Igocast',     url:'https://www.apsattv.com/igocast.m3u' },
  { nome:'LG BR',       url:'https://www.apsattv.com/brlg.m3u' }, { nome:'LG US', url:'https://www.apsattv.com/uslg.m3u' },
  { nome:'LG UK',       url:'https://www.apsattv.com/gblg.m3u' }, { nome:'LG CA', url:'https://www.apsattv.com/calg.m3u' },
  { nome:'LG AU',       url:'https://www.apsattv.com/aulg.m3u' }, { nome:'LG DE', url:'https://www.apsattv.com/delg.m3u' },
  { nome:'LG FR',       url:'https://www.apsattv.com/frlg.m3u' }, { nome:'LG ES', url:'https://www.apsattv.com/eslg.m3u' },
  { nome:'LG IT',       url:'https://www.apsattv.com/itlg.m3u' }, { nome:'LG MX', url:'https://www.apsattv.com/mxlg.m3u' },
  { nome:'LG AR',       url:'https://www.apsattv.com/arlg.m3u' }, { nome:'LG CO', url:'https://www.apsattv.com/colg.m3u' },
  { nome:'LG PT',       url:'https://www.apsattv.com/ptlg.m3u' }, { nome:'LG JP', url:'https://www.apsattv.com/jplg.m3u' },
  { nome:'LG KR',       url:'https://www.apsattv.com/krlg.m3u' }, { nome:'LG IN', url:'https://www.apsattv.com/inlg.m3u' },
  { nome:'LG AT',       url:'https://www.apsattv.com/atlg.m3u' }, { nome:'LG BE', url:'https://www.apsattv.com/belg.m3u' },
  { nome:'LG CH',       url:'https://www.apsattv.com/chlg.m3u' }, { nome:'LG CL', url:'https://www.apsattv.com/cllg.m3u' },
  { nome:'LG AE',       url:'https://www.apsattv.com/aelg.m3u' }, { nome:'Movieark BR', url:'https://www.apsattv.com/moviearkbr.m3u' },
  { nome:'Rede ITV',    url:'https://www.apsattv.com/redeitv.m3u' }, { nome:'Soul TV', url:'https://www.apsattv.com/soultv.m3u' },
  { nome:'9fast AU',    url:'https://www.apsattv.com/9fast.m3u' }, { nome:'Fetch TV AU', url:'https://www.apsattv.com/fetchtv.m3u' }
];

// ========== ESTADO GLOBAL ==========
var canais = [], canaisBrutos = [], seenUrls = {};
var nextNum = 1;
var urlsRemovidas = {};
var sintRelatorio = "";
var platFiltro = null, catFiltro = null;
var curCh = -1, pronto = false;
var buf = "", bufTmr = null;
var hlsObj = null;

// Carregar bloqueios antigos
try { var r = localStorage.getItem('k60fast_removidos'); if(r) urlsRemovidas = JSON.parse(r); } catch(e) {}

// ========== FUNÇÃO PARA CARREGAR UMA FONTE (sequencial) ==========
function carregarFonteSequencial(idx) {
  if (idx >= FONTES.length) {
    // Todas fontes carregadas
    setStatus('✅ Carregamento completo — <span>' + canaisBrutos.length + '</span> canais únicos');
    popularPlataformas(); popularCategorias();
    mostrarBtnLimparSint();
    pronto = true;
    return;
  }
  var fonte = FONTES[idx];
  logFonte(fonte.nome, 'load');
  // Usa XHR direto (sem proxy, mais rápido e estável na TV)
  var xhr = new XMLHttpRequest();
  xhr.open('GET', fonte.url, true);
  xhr.timeout = 15000;
  xhr.onload = function() {
    if (xhr.status === 200 && xhr.responseText && xhr.responseText.indexOf('#EXTM3U') !== -1) {
      var lista = parseM3u(xhr.responseText, fonte.nome);
      var adicionados = 0;
      for (var i = 0; i < lista.length; i++) {
        var c = lista[i];
        if (!c.url || seenUrls[c.url]) continue;
        if (urlsRemovidas[c.url]) continue;
        seenUrls[c.url] = true;
        c._num = nextNum++;
        canaisBrutos.push(c);
        adicionados++;
      }
      logFonte(fonte.nome, 'ok', adicionados);
    } else {
      logFonte(fonte.nome, 'err');
    }
    // Avança para próxima fonte
    carregarFonteSequencial(idx + 1);
  };
  xhr.onerror = function() { logFonte(fonte.nome, 'err'); carregarFonteSequencial(idx + 1); };
  xhr.ontimeout = function() { logFonte(fonte.nome, 'err'); carregarFonteSequencial(idx + 1); };
  xhr.send();
}

function logFonte(nome, estado, count) {
  var logDiv = document.getElementById('log-fontes');
  var id = 'log-' + nome.replace(/\s/g,'_');
  var el = document.getElementById(id);
  if (!el) {
    el = document.createElement('div'); el.id = id;
    logDiv.appendChild(el);
  }
  if (estado === 'load') el.innerHTML = '<span class="load">⏳ ' + nome + ': carregando...</span>';
  else if (estado === 'ok') el.innerHTML = '<span class="ok">✅ ' + nome + ': +' + count + ' canais</span>';
  else el.innerHTML = '<span class="err">❌ ' + nome + ': falhou</span>';
}

function parseM3u(txt, plat) {
  var res = [], cur = null;
  var lines = txt.split('\n');
  for (var i=0; i<lines.length; i++) {
    var l = lines[i].trim();
    if (l.indexOf('#EXTINF') === 0) {
      var nm = l.match(/,(.+)$/);
      var gt = l.match(/group-title="([^"]*)"/i);
      var cats = gt && gt[1] ? gt[1].toLowerCase().split(/[;,/|]/).map(s=>s.trim()).filter(s=>s) : [];
      cur = { nome: nm ? nm[1].trim() : 'Canal', cats: cats, plat: plat, url: null };
    } else if (l && l[0] !== '#' && cur) {
      if (l.indexOf('http') === 0) { cur.url = l; res.push(cur); }
      cur = null;
    }
  }
  return res;
}

// ========== FILTROS ==========
function aplicarFiltro() {
  var filtrados = canaisBrutos.filter(function(c) {
    if (platFiltro && c.plat !== platFiltro) return false;
    if (catFiltro && !c.cats.some(cat => cat.includes(catFiltro))) return false;
    return true;
  });
  // favoritos primeiro
  var favs = []; try { favs = JSON.parse(localStorage.getItem('k60fast_favs') || '[]'); } catch(e){}
  var favMap = {};
  for (var i=0; i<favs.length; i++) favMap[favs[i].url] = i;
  var favCh = filtrados.filter(c => favMap.hasOwnProperty(c.url));
  var outros = filtrados.filter(c => !favMap.hasOwnProperty(c.url));
  favCh.sort((a,b) => favMap[a.url] - favMap[b.url]);
  canais = favCh.concat(outros);
  for (var k=0; k<canais.length; k++) canais[k]._idx = k+1;
  if (curCh >= canais.length) curCh = -1;
  atualizarTela();
}

function setFiltroPlatforma(v) { platFiltro = v||null; aplicarFiltro(); }
function setFiltroCategoria(v) { catFiltro = v||null; aplicarFiltro(); }

function popularPlataformas() {
  var sel = document.getElementById('sel-plat');
  var plats = {};
  for (var i=0; i<canaisBrutos.length; i++) plats[canaisBrutos[i].plat] = true;
  var arr = Object.keys(plats).sort();
  sel.innerHTML = '<option value="">🌐 Todas as plataformas</option>';
  for (var j=0; j<arr.length; j++) {
    var opt = document.createElement('option'); opt.value = arr[j]; opt.textContent = arr[j];
    sel.appendChild(opt);
  }
  if (platFiltro) sel.value = platFiltro;
}

function popularCategorias() {
  var sel = document.getElementById('sel-cat');
  var cats = {};
  for (var i=0; i<canaisBrutos.length; i++) {
    for (var j=0; j<canaisBrutos[i].cats.length; j++) cats[canaisBrutos[i].cats[j]] = true;
  }
  var arr = Object.keys(cats).sort();
  sel.innerHTML = '<option value="">📂 Todas as categorias</option>';
  for (var k=0; k<arr.length; k++) {
    var opt = document.createElement('option'); opt.value = arr[k]; opt.textContent = arr[k];
    sel.appendChild(opt);
  }
  if (catFiltro) sel.value = catFiltro;
}

function atualizarTela() {
  if (!pronto) return;
  var total = canais.length;
  setStatus('Total: <span>' + total + '</span> canais | Digite 1 a ' + total);
}
function setStatus(txt) { document.getElementById('status-line').innerHTML = txt; }

// ========== SINTONIZADOR (SERIAL, SEM PROXY) ==========
var sintRodando = false, sintAbortar = false;
function sintonizarCanais() {
  if (sintRodando) { sintAbortar = true; return; }
  if (!pronto || canaisBrutos.length === 0) {
    document.getElementById('sint-progresso').innerHTML = '<span class="err">Aguarde o carregamento completo.</span>';
    return;
  }
  sintRodando = true; sintAbortar = false;
  var btn = document.getElementById('btn-sintonizar');
  var prog = document.getElementById('sint-progresso');
  btn.innerHTML = '⏹️ Cancelar';
  var lista = canaisBrutos.slice();
  var total = lista.length;
  var idx = 0, ok = 0, fail = 0;
  var removidos = []; // guardar URLs a remover
  prog.innerHTML = '📡 Testando canais (1 a 1)... 0/' + total;
  
  function testarProximo() {
    if (sintAbortar) {
      finalizar('Sintonia cancelada.');
      return;
    }
    if (idx >= total) {
      finalizar('✅ Sintonia concluída!');
      return;
    }
    var ch = lista[idx];
    prog.innerHTML = '🔍 Testando ' + (idx+1) + '/' + total + ' – ' + ch.nome + ' (' + ch.plat + ')';
    // Testa a URL com GET range (mais compatível que HEAD)
    var xhr = new XMLHttpRequest();
    xhr.open('GET', ch.url, true);
    xhr.setRequestHeader('Range', 'bytes=0-0');
    xhr.timeout = 8000; // 8s timeout
    xhr.onload = function() {
      if (xhr.status >= 200 && xhr.status < 400) {
        ok++;
        idx++;
        testarProximo();
      } else {
        fail++;
        removidos.push(ch.url);
        idx++;
        testarProximo();
      }
    };
    xhr.onerror = function() { fail++; removidos.push(ch.url); idx++; testarProximo(); };
    xhr.ontimeout = function() { fail++; removidos.push(ch.url); idx++; testarProximo(); };
    xhr.send();
  }
  
  function finalizar(msg) {
    // Aplica remoção
    for (var i=0; i<removidos.length; i++) {
      var url = removidos[i];
      urlsRemovidas[url] = 1;
      // remove do canaisBrutos
      for (var j=0; j<canaisBrutos.length; j++) {
        if (canaisBrutos[j].url === url) { canaisBrutos.splice(j,1); j--; }
      }
      delete seenUrls[url];
    }
    // Salva localStorage
    try { localStorage.setItem('k60fast_removidos', JSON.stringify(urlsRemovidas)); } catch(e) {}
    aplicarFiltro();
    atualizarTela();
    popularPlataformas(); popularCategorias();
    mostrarBtnLimparSint();
    
    var totalRem = Object.keys(urlsRemovidas).length;
    prog.innerHTML = msg + ' | ✅ ' + ok + ' | ❌ ' + fail + ' | 🗑️ ' + totalRem + ' removidos';
    // Gerar relatório simples
    sintRelatorio = `K60 FAST TV - ${new Date().toLocaleString()}\n${msg}\nTestados: ${total}\nOK: ${ok}\nRemovidos: ${fail}\nTotal canais ativos: ${canaisBrutos.length}`;
    document.getElementById('btn-relatorio').style.display = 'block';
    sintRodando = false;
    btn.innerHTML = '🔍 Sintonizar canais';
  }
  
  testarProximo();
}

function limparSintonizacao() {
  if (!confirm('Limpar todos os canais removidos? Eles vão reaparecer.')) return;
  urlsRemovidas = {};
  localStorage.removeItem('k60fast_removidos');
  // Recarregar tudo (reset completo)
  location.reload();
}

function mostrarBtnLimparSint() {
  var btn = document.getElementById('btn-limpar-sint');
  if (btn) btn.style.display = Object.keys(urlsRemovidas).length > 0 ? 'inline-block' : 'none';
}

function abrirRelatorio() {
  document.getElementById('relatorio-txt').value = sintRelatorio;
  document.getElementById('modal-relatorio').style.display = 'block';
}
function fecharRelatorio() { document.getElementById('modal-relatorio').style.display = 'none'; }
function copiarRelatorio() {
  var txt = document.getElementById('relatorio-txt');
  txt.select(); document.execCommand('copy');
  document.getElementById('copiar-ok').innerText = '✓ Copiado!';
}

// ========== PLAYER E CANAIS (sem alterações significativas) ==========
function tocarCanal(idx) {
  if (!canais.length) return;
  curCh = idx;
  var ch = canais[idx];
  document.getElementById('tela-home').style.display = 'none';
  document.getElementById('tela-player').style.display = 'block';
  document.getElementById('osd-num').innerText = String(idx+1).padStart(3,'0');
  document.getElementById('osd-nome').innerText = ch.nome;
  document.getElementById('osd-plat').innerText = ch.plat;
  document.getElementById('osd-estado').innerText = 'Conectando...';
  document.getElementById('carregando').style.display = 'block';
  setTimeout(()=>document.getElementById('osd').style.display='none', 5000);
  iniciarStream(ch.url);
}
function iniciarStream(url) {
  var vid = document.getElementById('vid');
  if (hlsObj) { try{ hlsObj.destroy(); }catch(e){} hlsObj=null; }
  vid.pause(); vid.src = '';
  var timeoutErr = setTimeout(()=>{ onFalha(); }, 12000);
  if (Hls.isSupported()) {
    hlsObj = new Hls({ enableWorker: false });
    hlsObj.loadSource(url);
    hlsObj.attachMedia(vid);
    hlsObj.on(Hls.Events.MANIFEST_PARSED, ()=>{ clearTimeout(timeoutErr); vid.play(); document.getElementById('carregando').style.display='none'; document.getElementById('osd-estado').innerText='Ao vivo'; });
    hlsObj.on(Hls.Events.ERROR, (e,d)=>{ if(d.fatal) onFalha(); });
  } else {
    vid.src = url;
    vid.onloadedmetadata = ()=>{ clearTimeout(timeoutErr); vid.play(); document.getElementById('carregando').style.display='none'; };
  }
}
var skipCount=0;
function onFalha() {
  skipCount++;
  if(skipCount<=2) { mostrarToast(); setTimeout(()=>{ tocarCanal((curCh+1)%canais.length); }, 2000); }
  else { skipCount=0; document.getElementById('osd-estado').innerText='Falhou'; }
}
function mostrarToast() { var t=document.getElementById('toast'); t.style.display='block'; setTimeout(()=>t.style.display='none',2000); }
function voltarHome() { if(hlsObj) hlsObj.destroy(); document.getElementById('tela-player').style.display='none'; document.getElementById('tela-home').style.display='flex'; }
function canalCima() { tocarCanal((curCh+1)%canais.length); }
function canalBaixo() { tocarCanal((curCh-1+canais.length)%canais.length); }
function irCanal() { var n=parseInt(buf,10); buf=''; atualizarDisplay(); if(!pronto || isNaN(n)|| n<1|| n>canais.length) return; tocarCanal(n-1); }
function atualizarDisplay() { var el=document.getElementById('digitos'); if(buf===''){ el.textContent='_'; el.className='vazio'; }else{ el.textContent=buf; el.className=''; } }

// ========== EVENTOS ==========
document.getElementById('btn-enter').onclick = ()=>{ clearTimeout(bufTmr); irCanal(); };
document.getElementById('btn-voltar').onclick = voltarHome;
document.getElementById('btn-ch-cima').onclick = canalCima;
document.getElementById('btn-ch-baixo').onclick = canalBaixo;
document.getElementById('btn-sintonizar').onclick = sintonizarCanais;
document.getElementById('btn-limpar-sint').onclick = limparSintonizacao;
document.getElementById('btn-relatorio').onclick = abrirRelatorio;

// Favoritos
function renderFavs() {
  var favs=[]; try{ favs=JSON.parse(localStorage.getItem('k60fast_favs')||'[]'); }catch(e){}
  var html='<div>⭐ Favoritos</div>';
  for(var i=0;i<favs.length;i++) html+=`<div class="fav-item" onclick="irFav(${i})"><span class="fav-plat">${favs[i].plat}</span><span class="fav-nome">${favs[i].nome}</span><button class="fav-del" onclick="event.stopPropagation();delFav(${i})">✖</button></div>`;
  document.getElementById('favs').innerHTML=html||'<div>Nenhum favorito</div>';
}
function irFav(i) { var favs=JSON.parse(localStorage.getItem('k60fast_favs')||'[]'); var fav=favs[i]; for(var j=0;j<canais.length;j++) if(canais[j].url===fav.url) tocarCanal(j); }
function delFav(i) { var favs=JSON.parse(localStorage.getItem('k60fast_favs')||'[]'); favs.splice(i,1); localStorage.setItem('k60fast_favs',JSON.stringify(favs)); renderFavs(); aplicarFiltro(); }
document.getElementById('btn-fav').onclick = function() {
  var ch=canais[curCh]; if(!ch) return;
  var favs=JSON.parse(localStorage.getItem('k60fast_favs')||'[]');
  var idx=favs.findIndex(f=>f.url===ch.url);
  if(idx===-1) favs.push({nome:ch.nome, url:ch.url, plat:ch.plat});
  else favs.splice(idx,1);
  localStorage.setItem('k60fast_favs',JSON.stringify(favs));
  renderFavs(); aplicarFiltro();
  document.getElementById('btn-fav').classList.toggle('favoritado', idx===-1);
};
// Volume
var vid=document.getElementById('vid');
document.getElementById('vol-slider').oninput = function(){ vid.volume=this.value/100; document.getElementById('vol-label').innerText=this.value+'%'; };
document.getElementById('btn-mute').onclick = function(){ vid.muted=!vid.muted; this.innerText=vid.muted?'🔇':'🔊'; };
// Teclado
document.addEventListener('keydown', function(e){
  var c=e.key;
  if(c>='0' && c<='9') { buf+=c; if(buf.length>3) buf=buf.slice(1); atualizarDisplay(); clearTimeout(bufTmr); bufTmr=setTimeout(irCanal,2000); }
  else if(c==='Enter') { clearTimeout(bufTmr); irCanal(); }
  else if(c==='Backspace') { buf=buf.slice(0,-1); atualizarDisplay(); }
  else if(c==='Escape') voltarHome();
  else if(c==='ArrowUp') canalCima();
  else if(c==='ArrowDown') canalBaixo();
});
// Auto-ocultar controles
var hideTmr;
function mostrarControles(){ var c=document.getElementById('controles'); c.classList.remove('oculto'); clearTimeout(hideTmr); hideTmr=setTimeout(()=>c.classList.add('oculto'),3000); }
document.addEventListener('mousemove',mostrarControles); document.addEventListener('keydown',mostrarControles);

// ========== INICIALIZAÇÃO ==========
try { platFiltro = localStorage.getItem('k60fast_plat'); catFiltro = localStorage.getItem('k60fast_cat'); } catch(e) {}
renderFavs();
carregarFonteSequencial(0);
</script>
