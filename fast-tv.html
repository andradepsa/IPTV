// ── Proxies com rodízio inteligente ───────────────────────────
var PROXIES = [
  'https://sweet-dust-4bfe.andradepsa-633.workers.dev/?url='
];

// Contadores de uso e bloqueio por proxy
var proxyStats = PROXIES.map(function() { return { usos: 0, erros: 0, bloqueado: false, cooldown: 0 }; });
var proxyIdx = 0; // índice do rodízio atual

// Retorna o próximo proxy disponível (rodízio, pula bloqueados)
function proximoProxy() {
  var agora = Date.now();
  for (var tentativas = 0; tentativas < PROXIES.length; tentativas++) {
    proxyIdx = (proxyIdx + 1) % PROXIES.length;
    var s = proxyStats[proxyIdx];
    if (s.bloqueado && agora < s.cooldown) continue; // ainda em cooldown
    if (s.bloqueado && agora >= s.cooldown) { s.bloqueado = false; s.erros = 0; } // reabilita
    return proxyIdx;
  }
  return 0; // fallback
}

function marcarErroProxy(pi) {
  var s = proxyStats[pi];
  s.erros++;
  // Limiar maior quando há poucos proxies para não paralisar a sintonia inteira
  var limiar = Math.max(12, PROXIES.length < 2 ? 20 : 8);
  if (s.erros >= limiar) {
    s.bloqueado = true;
    s.cooldown = Date.now() + 60000; // 60s de cooldown
  }
}

function marcarOkProxy(pi) {
  proxyStats[pi].erros = 0;
  proxyStats[pi].bloqueado = false;
  proxyStats[pi].usos++;
}

// ── Estado ─────────────────────────────────────────────────────
var canais = [], seenUrls = {};
var buf = '', bufTmr = null, pBuf = '', pBufTmr = null;
var curCh = -1, pronto = false;
var osdTmr, errTmr, failTmr, hlsObj;
var MAX_DIGITOS = 3;
var platFiltro = null, catFiltro = null;
var canaisBrutos = [];
var skipCount = 0;

// ── Persistência da sintonização ───────────────────────────────
var LS_SINT = 'k60fast_sint_v1';
var _sintoniaRestaurada = false;

function _salvarSintonia() {
  try {
    var slim = canaisBrutos.map(function(c) {
      return { nome: c.nome, url: c.url, plat: c.plat, cats: c.cats || [], logo: c.logo || null };
    });
    localStorage.setItem(LS_SINT, JSON.stringify({ ts: Date.now(), canais: slim }));
  } catch(e) {
    console.error('[K60FAST] Falha ao salvar sintonia:', e);
  }
}

function _restaurarSintonia() {
  try {
    var raw = localStorage.getItem(LS_SINT);
    if (!raw) return false;
    var obj = JSON.parse(raw);
    if (!obj || !obj.canais || !obj.canais.length) return false;
    canaisBrutos = [];
    seenUrls = {};
    nextNum = 1;
    for (var i = 0; i < obj.canais.length; i++) {
      var c = obj.canais[i];
      if (!c || !c.url || seenUrls[c.url]) continue;
      seenUrls[c.url] = true;
      c._num = nextNum++;
      canaisBrutos.push(c);
    }
    _sintoniaRestaurada = true;
    var d = new Date(obj.ts);
    var dataStr = d.toLocaleDateString('pt-BR') + ' ' + d.toLocaleTimeString('pt-BR');
    setStatus('Sintonia restaurada (<span>' + canaisBrutos.length + '</span> canais) — ' + dataStr
      + ' &nbsp;<button onclick="limparSintonia()" style="background:none;border:1px solid #ff4444;color:#ff4444;font-size:11px;padding:2px 10px;border-radius:10px;cursor:pointer">&#10005; Recarregar fontes</button>');
    aplicarFiltro();
    atualizarTela();
    popularPlataformas();
    popularCategorias();
    return true;
  } catch(e) {
    return false;
  }
}

function limparSintonia() {
  try { localStorage.removeItem(LS_SINT); } catch(e) {}
  _sintoniaRestaurada = false;
  canaisBrutos = [];
  seenUrls = {};
  nextNum = 1;
  pronto = false;
  document.getElementById('log-fontes').innerHTML = '';
  setStatus('Carregando fontes...');
  carregar();
}

// ── Normalização global de macros de anúncio ─────────────────
// Substitui placeholders não preenchidos para evitar erro 400.
// Escopo GLOBAL: usada tanto na sintonia quanto na reprodução.
function normalizarUrl(url) {
  if (!url) return url;
  return url
    .replace(/\[DEVICE_ID\]/gi,        'aaa00000000')
    .replace(/\[IFA\]/gi,              'aaa00000000')
    .replace(/\[IFA_TYPE\]/gi,         'idfa')
    .replace(/\[LMT\]/gi,              '0')
    .replace(/\[DNS\]/gi,              '0')
    .replace(/\[DNT\]/gi,              '0')
    .replace(/\[UA\]/gi,               'Mozilla%2F5.0')
    .replace(/\[IP\]/gi,               '0.0.0.0')
    .replace(/\[GDPR\]/gi,             '0')
    .replace(/\[GDPR_CONSENT\]/gi,     '')
    .replace(/\[COUNTRY\]/gi,          'US')
    .replace(/\[US_PRIVACY\]/gi,       '1---')
    .replace(/\[APP_STOREURL\]/gi,     '')
    .replace(/\[APP_BUNDLE\]/gi,       'com.test.app')
    .replace(/\[APP_NAME\]/gi,         'TestApp')
    .replace(/\[APP_VERSION\]/gi,      '1.0')
    .replace(/\[DEVICE_TYPE\]/gi,      'tv')
    .replace(/\[DEVICE_MAKE\]/gi,      'LG')
    .replace(/\[DEVICE_MODEL\]/gi,     'OLED55')
    .replace(/\[TARGETAD_ALLOWED\]/gi, '1')
    .replace(/\[FCK\]/gi,              '')
    .replace(/\[VIEWSIZE\]/gi,         '1920x1080')
    .replace(/\[NONCE\]/gi,            '')
    .replace(/\[IC\]/gi,               '')
    .replace(/\[IAB_CATEGORY\]/gi,     '')
    .replace(/\[PCS\]/gi,              '')
    .replace(/\[HOTEL_TYPE\]/gi,       '')
    .replace(/\{\{[^}]+\}\}/g,         '')   // {{MACRO}}
    .replace(/\{[A-Z_]{2,}\}/g,        '')   // {MACRO}
    .replace(/REPLACE_ME/g,            '')
    .replace(/REPLACEME/g,             '');
}

// ── XHR com fallback proxy e rodízio ──────────────────────────
function fetchM3u(url, cb) {
  var tentativas = [{ url: url, pi: -1 }];
  var startIdx = proxyIdx;
  for (var i = 0; i < PROXIES.length; i++) {
    var pi = (startIdx + i) % PROXIES.length;
    if (!proxyStats[pi].bloqueado || Date.now() >= proxyStats[pi].cooldown) {
      tentativas.push({ url: PROXIES[pi] + encodeURIComponent(url), pi: pi });
    }
  }
  var ti = 0;
  function next() {
    if (ti >= tentativas.length) { cb('erro'); return; }
    var t = tentativas[ti++];
    var r = new XMLHttpRequest();
    r.open('GET', t.url, true);
    // 22s: M3Us grandes (Roku/Pluto/Tubi têm 400+ canais)
    try { r.timeout = 22000; } catch(e){}
    r.onreadystatechange = function() {
      if (r.readyState !== 4) return;
      if (r.status === 429 || r.status === 503) {
        if (t.pi >= 0) marcarErroProxy(t.pi);
        next(); return;
      }
      if (r.status === 200 && r.responseText &&
          (r.responseText.indexOf('#EXTM3U') !== -1 || r.responseText.indexOf('#EXTINF') !== -1)) {
        if (t.pi >= 0) marcarOkProxy(t.pi);
        cb(null, r.responseText);
      } else {
        // 400/404 = problema da fonte, não do proxy — não penaliza
        next();
      }
    };
    // onerror direto = CORS bloqueado (esperado); via proxy = falha de rede real
    r.onerror = function() { if (t.pi >= 0) marcarErroProxy(t.pi); next(); };
    // Timeout do proxy = proxy lento; penaliza 0.5 (suave) e tenta próximo
    r.ontimeout = function() {
      if (t.pi >= 0) { proxyStats[t.pi].erros = Math.min(proxyStats[t.pi].erros + 0.5, 19); }
      next();
    };
    try { r.send(); } catch(e) { next(); }
  }
  next();
}

// ── Parse M3U ──────────────────────────────────────────────────
function parseM3u(txt, plat) {
  var result = [], cur = null;
  var lines = txt.split('\n');
  for (var i = 0; i < lines.length; i++) {
    var l = lines[i].trim();
    if (l.indexOf('#EXTINF') === 0) {
      var nm = l.match(/,(.+)$/);
      var gt = l.match(/group-title="([^"]*)"/i);
      var logo = l.match(/tvg-logo="([^"]*)"/i);
      var cats = [];
      if (gt && gt[1]) {
        var parts = gt[1].toLowerCase().split(/[;,/|]/);
        for (var p = 0; p < parts.length; p++) {
          var s = parts[p].trim(); if (s) cats.push(s);
        }
      }
      cur = {
        nome: nm ? nm[1].trim() : 'Canal',
        cats: cats,
        plat: plat,
        logo: (logo && logo[1]) ? logo[1] : null
      };
    } else if (l && l.indexOf('#') !== 0 && cur) {
      if (l.indexOf('http') === 0) { cur.url = l; result.push(cur); }
      cur = null;
    }
  }
  return result;
}

// ── Numeração ─────────────────────────────────────────────────
var nextNum = 1;
function atribuirNumero(url) {
  var n = nextNum++;
  return n;
}

// ── Adicionar canais ───────────────────────────────────────────
function addCanais(lista, plat) {
  var adicionados = 0;
  for (var i = 0; i < lista.length; i++) {
    var c = lista[i];
    if (!c || !c.url || seenUrls[c.url]) continue;
    seenUrls[c.url] = true;
    c._num = atribuirNumero(c.url);
    canaisBrutos.push(c);
    adicionados++;
  }
  if (adicionados) {
    aplicarFiltro();
    atualizarTela();
  }
  return adicionados;
}

// ── Filtros ────────────────────────────────────────────────────
function aplicarFiltro() {
  var urlAtual = (curCh >= 0 && canais[curCh]) ? canais[curCh].url : null;
  var todos = canaisBrutos.filter(function(c) {
    if (platFiltro && c.plat !== platFiltro) return false;
    if (catFiltro) {
      var ok = false;
      for (var i = 0; i < c.cats.length; i++) {
        if (c.cats[i].indexOf(catFiltro) !== -1) { ok = true; break; }
      }
      if (!ok) return false;
    }
    return true;
  });
  // Favoritos primeiro
  var favs = [];
  try { favs = JSON.parse(localStorage.getItem('k60fast_favs') || '[]'); } catch(e){}
  if (favs.length) {
    var favMap = {};
    for (var i = 0; i < favs.length; i++) favMap[favs[i].url] = i;
    var favCh = [], outros = [];
    for (var j = 0; j < todos.length; j++) {
      if (favMap.hasOwnProperty(todos[j].url)) favCh.push(todos[j]);
      else outros.push(todos[j]);
    }
    favCh.sort(function(a,b){ return favMap[a.url]-favMap[b.url]; });
    canais = favCh.concat(outros);
  } else {
    canais = todos;
  }
  // renumerar sequencialmente no filtro
  for (var k = 0; k < canais.length; k++) canais[k]._idx = k + 1;
  if (urlAtual) {
    for (var m = 0; m < canais.length; m++) {
      if (canais[m].url === urlAtual) { curCh = m; break; }
    }
  }
}

function setFiltroPlatforma(v) {
  platFiltro = v || null;
  try { platFiltro ? localStorage.setItem('k60fast_plat', platFiltro) : localStorage.removeItem('k60fast_plat'); } catch(e){}
  aplicarFiltro(); atualizarTela();
}
function setFiltroCategoria(v) {
  catFiltro = v || null;
  try { catFiltro ? localStorage.setItem('k60fast_cat', catFiltro) : localStorage.removeItem('k60fast_cat'); } catch(e){}
  aplicarFiltro(); atualizarTela();
}

// ── Popula selects ─────────────────────────────────────────────
function popularPlataformas() {
  var sel = document.getElementById('sel-plat');
  var plats = {};
  for (var i = 0; i < canaisBrutos.length; i++) plats[canaisBrutos[i].plat] = true;
  var arr = [];
  for (var k in plats) arr.push(k);
  arr.sort();
  // Remove opções existentes
  while (sel.options.length > 1) sel.remove(1);
  for (var j = 0; j < arr.length; j++) {
    var o = document.createElement('option');
    o.value = arr[j]; o.textContent = arr[j];
    sel.appendChild(o);
  }
  if (platFiltro) sel.value = platFiltro;
}

function popularCategorias() {
  var sel = document.getElementById('sel-cat');
  var cats = {};
  for (var i = 0; i < canaisBrutos.length; i++) {
    for (var j = 0; j < canaisBrutos[i].cats.length; j++) cats[canaisBrutos[i].cats[j]] = true;
  }
  var arr = [];
  for (var k in cats) if (k) arr.push(k);
  arr.sort();
  while (sel.options.length > 1) sel.remove(1);
  for (var m = 0; m < arr.length; m++) {
    var o = document.createElement('option');
    o.value = arr[m]; o.textContent = arr[m].charAt(0).toUpperCase() + arr[m].slice(1);
    sel.appendChild(o);
  }
  if (catFiltro) sel.value = catFiltro;
}

// ── Status e tela ──────────────────────────────────────────────
function setStatus(txt) { document.getElementById('status-line').innerHTML = txt; }

function atualizarTela() {
  if (!canais.length) return;
  pronto = true;
  var total = canais.length;
  var dig = String(total).length;
  if (dig < 3) dig = 3;
  MAX_DIGITOS = dig;
  setStatus('Total: <span>' + total + '</span> canais  |  Digite 1 a ' + total);
}

// ── Carregamento de fontes ─────────────────────────────────────
var logEl;
function logFonte(nome, estado, count) {
  if (!logEl) logEl = document.getElementById('log-fontes');
  var div = document.getElementById('log-' + nome.replace(/\s/g,'_'));
  if (!div) {
    div = document.createElement('div');
    div.id = 'log-' + nome.replace(/\s/g,'_');
    logEl.appendChild(div);
  }
  if (estado === 'load') div.innerHTML = '<span class="load">&#9679; ' + nome + ': carregando...</span>';
  else if (estado === 'ok') div.innerHTML = '<span class="ok">&#10003; ' + nome + ': +' + count + ' canais</span>';
  else div.innerHTML = '<span class="err">&#10005; ' + nome + ': falhou</span>';
}

function carregar() {
  if (_sintoniaRestaurada) return;
  var total = FONTES.length, done = 0;
  function fimFonte() {
    done++;
    if (done === total) {
      setStatus('Carregamento completo — <span>' + canaisBrutos.length + '</span> canais únicos');
      popularPlataformas();
      popularCategorias();
    }
  }
  for (var i = 0; i < FONTES.length; i++) {
    (function(fonte) {
      logFonte(fonte.nome, 'load');
      fetchM3u(fonte.url, function(e, txt) {
        if (e) { logFonte(fonte.nome, 'err'); fimFonte(); return; }
        var lista = parseM3u(txt, fonte.nome);
        var n = addCanais(lista, fonte.nome);
        logFonte(fonte.nome, 'ok', n);
        popularPlataformas();
        popularCategorias();
        fimFonte();
      });
    })(FONTES[i]);
  }
}

// ── Input numérico ─────────────────────────────────────────────
function atualizarDisplay() {
  var el = document.getElementById('digitos');
  var box = document.getElementById('display-canal');
  if (buf === '') { el.textContent = '_'; el.className = 'vazio'; box.className = ''; }
  else { el.textContent = buf; el.className = ''; box.className = 'ativo'; }
}

function irCanal() {
  if (!pronto || !buf) return;
  var n = parseInt(buf, 10);
  buf = ''; atualizarDisplay();
  if (n >= 1 && n <= canais.length) { tocar(n - 1); }
  else {
    setStatus('Canal ' + n + ' não existe. Digite 1 a <span>' + canais.length + '</span>');
    setTimeout(function() { atualizarTela(); }, 2500);
  }
}

// ── Player ─────────────────────────────────────────────────────
function pararHls() { if (hlsObj) { try { hlsObj.destroy(); } catch(e){} hlsObj = null; } }

function pararVideo() {
  pararHls();
  var vid = document.getElementById('vid');
  vid.onerror = null; vid.oncanplay = null; vid.onloadedmetadata = null; vid.onplaying = null;
  clearTimeout(failTmr);
  try { vid.pause(); } catch(e) {}
  try { vid.src = ''; } catch(e) {}
  try { vid.removeAttribute('src'); } catch(e) {}
  try { vid.load(); } catch(e) {}
  try { vid.muted = false; vid.volume = 1; } catch(e) {}
}

function tocar(idx) {
  var ch = canais[idx]; if (!ch) return;
  curCh = idx;
  pararVideo();
  var vid = document.getElementById('vid');
  document.getElementById('osd-num').textContent = String(idx + 1).padStart(3, '0');
  document.getElementById('osd-nome').textContent = ch.nome;
  document.getElementById('osd-plat').textContent = ch.plat || '';
  document.getElementById('osd-estado').textContent = 'Conectando...';
  setTimeout(sincVolSlider, 100);
  document.getElementById('carregando').style.display = 'block';
  document.getElementById('tela-home').style.display = 'none';
  document.getElementById('tela-player').style.display = 'block';
  mostrarOSD();
  atualizarBtnFav();
  failTmr = setTimeout(mostrarErro, 15000);
  var okJa = false;
  function onOk() {
    if (okJa) return; okJa = true;
    clearTimeout(failTmr); skipCount = 0;
    document.getElementById('carregando').style.display = 'none';
    document.getElementById('osd-estado').textContent = 'Ao vivo';
    try { if (vid.muted) { vid.muted = false; vid.volume = 1; } } catch(e) {}
  }
  vid.oncanplay = onOk;
  vid.onplaying = onOk;
  vid.onloadedmetadata = function() { try { vid.play(); } catch(e) {} };
  // Normaliza macros de anúncio antes de reproduzir
  var url = normalizarUrl(ch.url);
  var ehHls  = /\.m3u8?($|\?)/i.test(url);
  var nativeHls = !!(vid.canPlayType && (
    vid.canPlayType('application/vnd.apple.mpegurl') !== '' ||
    vid.canPlayType('application/x-mpegURL') !== ''
  ));
  var temMSE = typeof window.MediaSource !== 'undefined' &&
               typeof Hls !== 'undefined' && Hls.isSupported();
  function onErroNativo() {
    vid.onerror = null;
    if (ehHls && temMSE) { tentarHlsJs(); return; }
    clearTimeout(failTmr); mostrarErro();
  }
  vid.onerror = onErroNativo;
  function tentarHlsJs() {
    try {
      hlsObj = new Hls({ enableWorker: false, lowLatencyMode: false, backBufferLength: 20,
        maxBufferLength: 20, maxMaxBufferLength: 40, capLevelToPlayerSize: true });
      hlsObj.loadSource(url);
      hlsObj.attachMedia(vid);
      hlsObj.on(Hls.Events.MANIFEST_PARSED, function() { try { vid.play(); } catch(e) {} });
      hlsObj.on(Hls.Events.ERROR, function(ev, d) {
        if (!d || !d.fatal) return;
        clearTimeout(failTmr); mostrarErro();
      });
    } catch(e) { mostrarErro(); }
  }
  if (ehHls && temMSE && !nativeHls) {
    tentarHlsJs();
  } else {
    try {
      vid.src = url; vid.load();
      var p = vid.play();
      if (p && p.catch) p.catch(function() {
        try {
          vid.muted = true;
          var p2 = vid.play();
          if (p2 && p2.then) p2.then(function() {
            setTimeout(function() { try { vid.muted = false; vid.volume = 1; } catch(e){} }, 800);
          }).catch(function(){});
        } catch(e) {}
      });
    } catch(e) { clearTimeout(failTmr); mostrarErro(); }
  }
}

function mostrarOSD() {
  document.getElementById('osd').style.display = 'block'; clearTimeout(osdTmr);
  osdTmr = setTimeout(function(){ document.getElementById('osd').style.display = 'none'; }, 5000);
}

function voltarHome() {
  pararVideo(); clearTimeout(osdTmr); clearTimeout(errTmr);
  skipCount = 0;
  document.getElementById('toast').style.display = 'none';
  document.getElementById('tela-player').style.display = 'none';
  document.getElementById('tela-home').style.display = 'flex';
  document.getElementById('osd').style.display = 'block';
  buf = ''; atualizarDisplay();
}

function mostrarErro() {
  clearTimeout(failTmr); clearTimeout(errTmr);
  if (curCh >= 0 && canais[curCh]) {
    // Remove canal defeituoso da lista
    var urlDefeituosa = canais[curCh].url;
    for (var _i = canaisBrutos.length - 1; _i >= 0; _i--) {
      if (canaisBrutos[_i].url === urlDefeituosa) { canaisBrutos.splice(_i, 1); break; }
    }
    delete seenUrls[urlDefeituosa];
    aplicarFiltro();
    if (canais.length === 0) { voltarHome(); return; }
    curCh = curCh % canais.length;
  }
  skipCount++;
  if (skipCount >= canais.length) skipCount = 1;
  document.getElementById('carregando').style.display = 'none';
  document.getElementById('osd-estado').textContent = 'Sem sinal — pulando...';
  document.getElementById('osd').style.display = 'block';
  errTmr = setTimeout(function() {
    curCh = (curCh + 1) % canais.length;
    tocar(curCh);
  }, 900);
}

function digitarNoPlayer(num) {
  if (pBuf.length >= MAX_DIGITOS) return;
  pBuf += String(num);
  document.getElementById('p-canal-val').textContent = pBuf + '_';
  document.getElementById('p-canal').style.display = 'block';
  clearTimeout(pBufTmr);
  pBufTmr = setTimeout(function() {
    var idx = parseInt(pBuf, 10) - 1; pBuf = '';
    document.getElementById('p-canal-val').textContent = '_';
    document.getElementById('p-canal').style.display = 'none';
    if (idx >= 0 && idx < canais.length) tocar(idx);
  }, pBuf.length >= MAX_DIGITOS ? 600 : 2000);
}

function canalCima()  { if (canais.length) { skipCount = 0; curCh = (curCh + 1) % canais.length; tocar(curCh); } }
function canalBaixo() { if (canais.length) { skipCount = 0; curCh = ((curCh - 1) + canais.length) % canais.length; tocar(curCh); } }

// ── Teclado ────────────────────────────────────────────────────
document.addEventListener('keydown', function(e) {
  var c = e.key;
  var naPlayer = document.getElementById('tela-player').style.display === 'block';

  if (c >= '0' && c <= '9') {
    e.preventDefault();
    if (naPlayer) {
      pBuf += c;
      var pv = document.getElementById('p-canal-val');
      pv.textContent = pBuf;
      document.getElementById('p-canal').style.display = 'block';
      clearTimeout(pBufTmr);
      pBufTmr = setTimeout(function() {
        var n = parseInt(pBuf, 10); pBuf = '';
        document.getElementById('p-canal-val').textContent = '_';
        document.getElementById('p-canal').style.display = 'none';
        if (!isNaN(n) && n >= 1 && n <= canais.length) tocar(n - 1);
      }, 1800);
    } else {
      if (!pronto) return;
      buf += c;
      if (buf.length > MAX_DIGITOS) buf = buf.slice(1);
      atualizarDisplay();
      clearTimeout(bufTmr);
      bufTmr = setTimeout(irCanal, 2000);
    }
  } else if (c === 'Enter' || c === 'Accept') {
    e.preventDefault();
    if (!naPlayer) { clearTimeout(bufTmr); irCanal(); }
    else mostrarOSD();
  } else if (c === 'Backspace') {
    e.preventDefault();
    if (naPlayer) voltarHome();
    else { buf = buf.slice(0, -1); atualizarDisplay(); clearTimeout(bufTmr); }
  } else if (c === 'Escape' || c === 'GoBack') {
    e.preventDefault();
    if (naPlayer) voltarHome();
  } else if (c === 'ArrowUp' || c === 'PageUp' || c === 'ChannelUp') {
    e.preventDefault();
    if (naPlayer) canalCima();
  } else if (c === 'ArrowDown' || c === 'PageDown' || c === 'ChannelDown') {
    e.preventDefault();
    if (naPlayer) canalBaixo();
  } else if (naPlayer) {
    var vid = document.getElementById('vid');
    if (c === '+' || c === 'VolumeUp') {
      var nv = Math.min(1, (vid.muted ? 0 : vid.volume) + 0.1);
      vid.volume = nv; vid.muted = false; sincVolSlider(); mostrarVolume(); e.preventDefault();
    } else if (c === '-' || c === 'VolumeDown') {
      var nv2 = Math.max(0, (vid.muted ? 0 : vid.volume) - 0.1);
      vid.volume = nv2; vid.muted = (nv2 === 0); sincVolSlider(); mostrarVolume(); e.preventDefault();
    } else if (c === 'm' || c === 'M' || c === 'VolumeMute') {
      vid.muted = !vid.muted;
      if (!vid.muted && vid.volume === 0) vid.volume = 0.5;
      sincVolSlider(); mostrarVolume(); e.preventDefault();
    }
  }
});

// Keycodes TV — fallback para controles remotos com keyCodes não-padrão
document.addEventListener('keydown', function(e) {
  var k = e.keyCode || e.which;
  var naPlayer = document.getElementById('tela-player').style.display === 'block';
  var cima   = k === 38 || k === 33 || k === 427;
  var baixo  = k === 40 || k === 34 || k === 428;
  var voltar = k === 27 || k === 36 || k === 88 || k === 166 || k === 461;
  var enter  = k === 13 || k === 179;
  if (naPlayer) {
    if (cima)   { e.preventDefault(); canalCima(); }
    if (baixo)  { e.preventDefault(); canalBaixo(); }
    if (voltar) { e.preventDefault(); voltarHome(); }
  } else {
    if (enter)  { e.preventDefault(); clearTimeout(bufTmr); irCanal(); }
  }
});

// ── Favoritos ──────────────────────────────────────────────────
function getFavs() { try { return JSON.parse(localStorage.getItem('k60fast_favs') || '[]'); } catch(e) { return []; } }
function saveFavs(f) { try { localStorage.setItem('k60fast_favs', JSON.stringify(f)); } catch(e) {} }
function isFavUrl(url) { return getFavs().some(function(f){ return f.url === url; }); }

function toggleFav() {
  if (curCh < 0) return;
  var ch = canais[curCh];
  var favs = getFavs();
  var idx = -1;
  for (var i = 0; i < favs.length; i++) if (favs[i].url === ch.url) { idx = i; break; }
  if (idx === -1) favs.push({ nome: ch.nome, url: ch.url, plat: ch.plat || '' });
  else favs.splice(idx, 1);
  saveFavs(favs);
  aplicarFiltro();
  // Reconecta curCh ao canal atual após reordenação
  curCh = canais.findIndex ? canais.findIndex(function(c){ return c.url === ch.url; })
    : (function(){ for(var j=0;j<canais.length;j++) if(canais[j].url===ch.url) return j; return -1; })();
  if (curCh >= 0) document.getElementById('osd-num').textContent = String(curCh + 1).padStart(3, '0');
  atualizarBtnFav();
  renderFavs();
}

function atualizarBtnFav() {
  var btn = document.getElementById('btn-fav');
  if (curCh >= 0 && canais[curCh] && isFavUrl(canais[curCh].url)) btn.classList.add('favoritado');
  else btn.classList.remove('favoritado');
}

function renderFavs() {
  var favs = getFavs();
  var el = document.getElementById('favs');
  if (!favs.length) {
    el.innerHTML = '<div id="favs-titulo">&#9733; Favoritos</div><div style="font-size:12px;color:#444;padding:8px">Nenhum favorito ainda.</div>';
    return;
  }
  var html = '<div id="favs-titulo">&#9733; Favoritos (' + favs.length + ')</div>';
  for (var i = 0; i < favs.length; i++) {
    html += '<div class="fav-item">'
      + (favs[i].plat ? '<span class="fav-plat">' + favs[i].plat + '</span>' : '')
      + '<span class="fav-nome" onclick="tocarFav(' + i + ')">' + favs[i].nome + '</span>'
      + '<button class="fav-del" onclick="deletarFav(' + i + ')" title="Remover">&#10005;</button>'
      + '</div>';
  }
  el.innerHTML = html;
}

function tocarFav(i) {
  var f = getFavs()[i]; if (!f) return;
  var idx = -1;
  for (var j = 0; j < canais.length; j++) if (canais[j].url === f.url) { idx = j; break; }
  if (idx !== -1) { tocar(idx); return; }
  // Canal não está na lista atual — adiciona e toca
  curCh = -1;
  var obj = { nome: f.nome, url: f.url, plat: f.plat || '', cats: [] };
  seenUrls[obj.url] = true;
  obj._num = nextNum++;
  canaisBrutos.push(obj);
  aplicarFiltro();
  for (var k = 0; k < canais.length; k++) if (canais[k].url === f.url) { tocar(k); return; }
}

function deletarFav(i) {
  var urlAtual = (curCh >= 0 && canais[curCh]) ? canais[curCh].url : null;
  var favs = getFavs();
  favs.splice(i, 1);
  saveFavs(favs);
  aplicarFiltro();
  if (urlAtual) {
    for (var j = 0; j < canais.length; j++) {
      if (canais[j].url === urlAtual) {
        curCh = j;
        document.getElementById('osd-num').textContent = String(j + 1).padStart(3, '0');
        break;
      }
    }
  }
  renderFavs();
  atualizarBtnFav();
}

document.getElementById('btn-fav').onclick = toggleFav;

// ── Volume ─────────────────────────────────────────────────────
var volTmr = null;

function atualizarIconeMute() {
  var vid = document.getElementById('vid');
  var btn = document.getElementById('btn-mute');
  var mudo = vid.muted || vid.volume === 0;
  btn.innerHTML = mudo ? '&#128264;' : (vid.volume < 0.4 ? '&#128265;' : '&#128266;');
}

function sincVolSlider() {
  var vid = document.getElementById('vid');
  var v = vid.muted ? 0 : Math.round(vid.volume * 100);
  document.getElementById('vol-slider').value = v;
  document.getElementById('vol-label').textContent = v + '%';
  atualizarIconeMute();
}

function mostrarVolume() {
  var ctrl = document.getElementById('volume-ctrl');
  ctrl.classList.remove('oculto');
  clearTimeout(volTmr);
  volTmr = setTimeout(function(){ ctrl.classList.add('oculto'); }, 3500);
}

document.getElementById('btn-mute').onclick = function() {

// ── Sintonizador de canais ─────────────────────────────────────
var sintRodando = false;
var sintAbortar = false;
var sintRelatorio = null; // guarda dados do último relatório

function sintonizarCanais() {
  var btn  = document.getElementById('btn-sintonizar');
  var prog = document.getElementById('sint-progresso');

  if (sintRodando) {
    sintAbortar = true;
    prog.innerHTML = 'Cancelando...';
    btn.innerHTML = '&#9209; Cancelando...';
    btn.disabled = true;
    return;
  }

  if (!pronto || canaisBrutos.length === 0) {
    prog.innerHTML = '<span class="err">Aguarde o carregamento dos canais.</span>';
    return;
  }

  sintRodando = true; sintAbortar = false;
  btn.innerHTML = '&#9209; Cancelar sintonia';
  btn.disabled = false;

  var lista = canaisBrutos.slice();
  var total = lista.length;
  var idx = 0, ok = 0, fail = 0, ativos = 0;
  var removidos = [];

  // Paralelo adaptativo: começa em 8, reduz se muitos proxies bloquearem
  var PARALELO = 8;
  var TIMEOUT  = 6000;
  // Lote por proxy: a cada 100 canais muda o proxy preferencial
  var LOTE_PROXY = 100;
  // Contador de 429 recentes para reduzir paralelo
  var erros429 = 0;
  // normalizarUrl está no escopo global — aplica macros dummy antes de testar

  prog.innerHTML = '&#9851; Testando ' + total + ' canais...';

  function atualizar(nome) {
    prog.innerHTML = 'Testando ' + Math.min(idx, total) + '/' + total
      + ' &nbsp;<span class="ok">&#10003; ' + ok + '</span>'
      + ' &nbsp;<span class="err">&#10005; ' + fail + '</span>'
      + (nome ? '<br><small style="color:#666">' + nome + '</small>' : '');
  }

  function testarCanal(ch, canalIdx, cb) {
    // Normaliza macros e persiste no objeto — garante URL limpa na reprodução também
    var urlNorm = normalizarUrl(ch.url);
    if (urlNorm !== ch.url) ch.url = urlNorm;
    var url = urlNorm;

    // Proxy preferencial para este lote (rodízio por lote)
    var loteProxy = Math.floor(canalIdx / LOTE_PROXY) % PROXIES.length;
    // Garante que não está bloqueado
    var agora = Date.now();
    if (proxyStats[loteProxy].bloqueado && agora < proxyStats[loteProxy].cooldown) {
      loteProxy = proximoProxy();
    }

    // Ordem de tentativa: direto → proxy do lote → outros proxies
    var ordemProxies = [loteProxy];
    for (var pi2 = 0; pi2 < PROXIES.length; pi2++) {
      if (pi2 !== loteProxy) ordemProxies.push(pi2);
    }

    var tentativas = [{ url: url, pi: -1 }];
    for (var oi = 0; oi < ordemProxies.length; oi++) {
      var px = ordemProxies[oi];
      var ps = proxyStats[px];
      if (ps.bloqueado && Date.now() < ps.cooldown) continue;
      tentativas.push({ url: PROXIES[px] + encodeURIComponent(url), pi: px });
    }

    var ti = 0, resolvido = false;
    // Safety net global: se todas as tentativas falharem silenciosamente
    var tmr = setTimeout(function() { resolver(false); }, TIMEOUT * 2 + 2000);
    function resolver(s) {
      if (resolvido) return;
      resolvido = true;
      clearTimeout(tmr);
      try { cb(s); } catch(e) {}
    }
    function next() {
      if (ti >= tentativas.length) { resolver(false); return; }
      var t = tentativas[ti++];
      try {
        var r = new XMLHttpRequest();
        r.open('HEAD', t.url, true);
        try { r.timeout = Math.floor(TIMEOUT * 0.5); } catch(e) {}
        r.onreadystatechange = function() {
          if (r.readyState !== 4) return;
          if (r.status === 429 || r.status === 503) {
            if (t.pi >= 0) marcarErroProxy(t.pi);
            erros429++;
            if (erros429 > 10 && PARALELO > 2) { PARALELO = Math.max(2, PARALELO - 1); erros429 = 0; }
            next(); return;
          }
          if (r.status >= 200 && r.status < 400) {
            if (t.pi >= 0) marcarOkProxy(t.pi);
            resolver(true);
          } else if (r.status === 405) {
            // HEAD não permitido — tenta GET parcial (abort em headers)
            try {
              var r2 = new XMLHttpRequest();
              r2.open('GET', t.url, true);
              try { r2.timeout = Math.floor(TIMEOUT * 0.45); } catch(e) {}
              r2.onreadystatechange = function() {
                if (r2.readyState >= 2) {
                  try { r2.abort(); } catch(e) {}
                  if (r2.status >= 200 && r2.status < 400) {
                    if (t.pi >= 0) marcarOkProxy(t.pi);
                    resolver(true);
                  } else { next(); }
                }
              };
              r2.onerror = r2.ontimeout = function() { next(); };
              r2.send();
            } catch(e2) { next(); }
          } else {
            // 400/404/outros = problema do stream, não do proxy — não penaliza
            next();
          }
        };
        // onerror via proxy = falha de rede real do proxy
        r.onerror = function() { if (t.pi >= 0) marcarErroProxy(t.pi); next(); };
        // ontimeout via proxy = proxy lento — penaliza suavemente (0.5)
        r.ontimeout = function() {
          if (t.pi >= 0) { proxyStats[t.pi].erros = Math.min(proxyStats[t.pi].erros + 0.5, 19); }
          next();
        };
        r.send();
      } catch(e) { next(); }
    }
    next();
  }

  function removerUrl(url) {
    for (var i = canaisBrutos.length - 1; i >= 0; i--) {
      if (canaisBrutos[i].url === url) { canaisBrutos.splice(i, 1); break; }
    }
  }

  function lancar() {
    if (sintAbortar) {
      if (ativos === 0) { _fimSint('Sintonia cancelada.', ok, fail); }
      return;
    }
    if (idx >= total) {
      if (ativos === 0) { _fimSint('Sintonia concluída!', ok, fail); }
      return;
    }
    while (ativos < PARALELO && idx < total) {
      (function(ch, ci) {
        ativos++;
        atualizar(ch.nome);
        testarCanal(ch, ci, function(sucesso) {
          if (!sucesso) {
            fail++;
            removidos.push({ nome: ch.nome, plat: ch.plat, url: ch.url });
            removerUrl(ch.url);
            delete seenUrls[ch.url];
          } else {
            ok++;
          }
          ativos--;
          atualizar('');
          lancar();
        });
      })(lista[idx], idx);
      idx++;
    }
  }

  // Lança após pequeno delay para não bloquear render
  setTimeout(lancar, 200);

  function _fimSint(msg, ok, fail) {
    sintRodando = false;
    sintAbortar = false;
    btn.disabled = false;
    btn.innerHTML = '&#128225; Sintonizar canais';
    aplicarFiltro();
    atualizarTela();
    popularPlataformas();
    popularCategorias();
    prog.innerHTML = msg
      + (ok || fail ? ' &nbsp;<span class="ok">&#10003; ' + ok + '</span> <span class="err">&#10005; ' + fail + '</span>' : '');

    // Persiste a lista sintonizada no localStorage
    _salvarSintonia();

    // Gera relatório
    var agora = new Date();
    var dataStr = agora.toLocaleDateString('pt-BR') + ' ' + agora.toLocaleTimeString('pt-BR');
    var linhas = [];
    linhas.push('K60 FAST TV — ' + dataStr);
    linhas.push('STATUS: ' + msg);
    linhas.push('Testados: ' + total + '  |  OK: ' + ok + '  |  Removidos: ' + fail + '  |  Restantes: ' + canaisBrutos.length);
    linhas.push('');

    // Estatísticas dos proxies
    linhas.push('── Proxies ──');
    for (var xi = 0; xi < PROXIES.length; xi++) {
      var ps2 = proxyStats[xi];
      var pnome2 = PROXIES[xi].replace('https://','').split('/')[0];
      var estado2 = ps2.bloqueado ? '⚠ bloqueado' : '✓ ok';
      linhas.push('  ' + pnome2 + ' — usos:' + ps2.usos + ' erros:' + ps2.erros + ' ' + estado2);
    }
    linhas.push('');

    // Por plataforma
    var platOk = {}, platFail = {};
    for (var ri = 0; ri < lista.length; ri++) {
      var p = lista[ri].plat;
      if (removidos.some(function(r){ return r.url === lista[ri].url; })) {
        platFail[p] = (platFail[p] || 0) + 1;
      } else {
        platOk[p] = (platOk[p] || 0) + 1;
      }
    }
    var plats = Object.keys(platOk).concat(Object.keys(platFail).filter(function(k){ return !platOk[k]; }));
    plats = plats.filter(function(v,i,a){ return a.indexOf(v)===i; }).sort();

    var semOk = plats.filter(function(pn){ return (platOk[pn]||0) === 0; });
    if (semOk.length) { linhas.push('Sem canais OK: ' + semOk.join(', ')); linhas.push(''); }

    linhas.push('Plataforma         | OK  | Rem');
    linhas.push('-------------------|-----|-----');
    for (var pi3 = 0; pi3 < plats.length; pi3++) {
      var pn = plats[pi3];
      var po = platOk[pn] || 0;
      var pf = platFail[pn] || 0;
      var pad = pn.length < 18 ? pn + Array(19-pn.length).join(' ') : pn.substring(0,18);
      linhas.push(pad + '| ' + String(po).padStart(3) + ' | ' + String(pf).padStart(3));
    }

    sintRelatorio = linhas.join('\n');
    document.getElementById('btn-relatorio-wrap').style.display = 'block';
  }
}

function abrirRelatorio() {
  if (!sintRelatorio) return;
  document.getElementById('relatorio-txt').value = sintRelatorio;
  document.getElementById('modal-relatorio').style.display = 'block';
  document.getElementById('copiar-ok').textContent = '';
}
function fecharRelatorio() {
  document.getElementById('modal-relatorio').style.display = 'none';
}
function copiarRelatorio() {
  var txt = document.getElementById('relatorio-txt');
  txt.select();
  try {
    document.execCommand('copy');
    document.getElementById('copiar-ok').textContent = '✓ Copiado! Cole aqui no chat para análise.';
  } catch(e) {
    try {
      navigator.clipboard.writeText(txt.value).then(function(){
        document.getElementById('copiar-ok').textContent = '✓ Copiado!';
      });
    } catch(e2) {}
  }
}
