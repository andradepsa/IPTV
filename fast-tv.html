// ── Proxies com rodízio inteligente ───────────────────────────
var PROXIES = [

];

// Contadores de uso e bloqueio por proxy
var proxyStats = PROXIES.map(function() { return { usos: 0, erros: 0, bloqueado: false, cooldown: 0 }; });
var proxyIdx = 0; // índice do rodízio atual

// Retorna o próximo proxy disponível (rodízio, pula bloqueados)
function proximoProxy() {
  var agora = Date.now();
  for (var tentativas = 0; tentativas < PROXIES.length; tentativas++) {
    proxyIdx = (proxyIdx + 1) % PROXIES.length;
    var s = proxyStats[proxyIdx];
    if (s.bloqueado && agora < s.cooldown) continue; // ainda em cooldown
    if (s.bloqueado && agora >= s.cooldown) { s.bloqueado = false; s.erros = 0; } // reabilita
    return proxyIdx;
  }
  return 0; // fallback
}

function marcarErroProxy(pi) {
  var s = proxyStats[pi];
  s.erros++;
  if (s.erros >= 3) {
    s.bloqueado = true;
    s.cooldown = Date.now() + 30000; // 30s de cooldown
  }
}

function marcarOkProxy(pi) {
  proxyStats[pi].erros = 0;
  proxyStats[pi].bloqueado = false;
  proxyStats[pi].usos++;
}

// ── Estado ─────────────────────────────────────────────────────
var canais = [], seenUrls = {};
var buf = '', bufTmr = null, pBuf = '', pBufTmr = null;

function salvarRemovidas() {

// ── XHR com fallback proxy e rodízio ──────────────────────────
function fetchM3u(url, cb) {
  // Tenta direto primeiro, depois proxies em rodízio
  var tentativas = [{ url: url, pi: -1 }];
  // Monta lista de proxies disponíveis na ordem do rodízio atual
  var startIdx = proxyIdx;
  for (var i = 0; i < PROXIES.length; i++) {
    var pi = (startIdx + i) % PROXIES.length;
    if (!proxyStats[pi].bloqueado || Date.now() >= proxyStats[pi].cooldown) {
      tentativas.push({ url: PROXIES[pi] + encodeURIComponent(url), pi: pi });
    }
  }
  var ti = 0;
  function next() {
    if (ti >= tentativas.length) { cb('erro'); return; }
    var t = tentativas[ti++];
    var r = new XMLHttpRequest();
    r.open('GET', t.url, true);
    try { r.timeout = 15000; } catch(e){}
    r.onreadystatechange = function() {
      if (r.readyState !== 4) return;
      if (r.status === 429 || r.status === 503) {
        if (t.pi >= 0) marcarErroProxy(t.pi);
        next(); return;
      }
      if (r.status === 200 && r.responseText &&
          (r.responseText.indexOf('#EXTM3U') !== -1 || r.responseText.indexOf('#EXTINF') !== -1)) {
        if (t.pi >= 0) marcarOkProxy(t.pi);
        cb(null, r.responseText);
      } else {
        if (t.pi >= 0 && r.status >= 400) marcarErroProxy(t.pi);
        next();
      }
    };
    r.onerror = function() { if (t.pi >= 0) marcarErroProxy(t.pi); next(); };
    r.ontimeout = function() { if (t.pi >= 0) marcarErroProxy(t.pi); next(); };
    try { r.send(); } catch(e) { next(); }
  }
  next();
}

// ── Parse M3U ──────────────────────────────────────────────────
function parseM3u(txt, plat) {
  var result = [], cur = null;
  var lines = txt.split('\n');
  for (var i = 0; i < lines.length; i++) {
    var l = lines[i].trim();
    if (l.indexOf('#EXTINF') === 0) {
      var nm = l.match(/,(.+)$/);
      var gt = l.match(/group-title="([^"]*)"/i);
      var logo = l.match(/tvg-logo="([^"]*)"/i);
      var cats = [];
      if (gt && gt[1]) {
        var parts = gt[1].toLowerCase().split(/[;,/|]/);
        for (var p = 0; p < parts.length; p++) {
          var s = parts[p].trim(); if (s) cats.push(s);
        }
      }
      cur = {
        nome: nm ? nm[1].trim() : 'Canal',
        cats: cats,
        plat: plat,
        logo: (logo && logo[1]) ? logo[1] : null
      };
    } else if (l && l.indexOf('#') !== 0 && cur) {
      if (l.indexOf('http') === 0) { cur.url = l; result.push(cur); }
      cur = null;
    }
  }
  return result;
}

var nextNum = 1;
function atribuirNumero(url) {
  var n = nextNum++;
  return n;

// ── Adicionar canais ───────────────────────────────────────────
function addCanais(lista, plat) {
  var adicionados = 0;
  for (var i = 0; i < lista.length; i++) {
    var c = lista[i];
    if (!c || !c.url || seenUrls[c.url]) continue;
    if (urlsRemovidas[c.url]) { sintBloqueados++; continue; }
    seenUrls[c.url] = true;
    c._num = atribuirNumero(c.url);
    canaisBrutos.push(c);
    adicionados++;
  }
  if (adicionados) {
    aplicarFiltro();
    atualizarTela();
  }
  return adicionados;
}

// ── Filtros ────────────────────────────────────────────────────
function aplicarFiltro() {
  var urlAtual = (curCh >= 0 && canais[curCh]) ? canais[curCh].url : null;
  var todos = canaisBrutos.filter(function(c) {
    if (platFiltro && c.plat !== platFiltro) return false;
    if (catFiltro) {
      var ok = false;
      for (var i = 0; i < c.cats.length; i++) {
        if (c.cats[i].indexOf(catFiltro) !== -1) { ok = true; break; }
      }
      if (!ok) return false;
    }
    return true;
  });
  // Favoritos primeiro
  var favs = [];
  try { favs = JSON.parse(localStorage.getItem('k60fast_favs') || '[]'); } catch(e){}
  if (favs.length) {
    var favMap = {};
    for (var i = 0; i < favs.length; i++) favMap[favs[i].url] = i;
    var favCh = [], outros = [];
    for (var j = 0; j < todos.length; j++) {
      if (favMap.hasOwnProperty(todos[j].url)) favCh.push(todos[j]);
      else outros.push(todos[j]);
    }
    favCh.sort(function(a,b){ return favMap[a.url]-favMap[b.url]; });
    canais = favCh.concat(outros);
  } else {
    canais = todos;
  }
  // renumerar sequencialmente no filtro
  for (var k = 0; k < canais.length; k++) canais[k]._idx = k + 1;
  if (urlAtual) {
    for (var m = 0; m < canais.length; m++) {
      if (canais[m].url === urlAtual) { curCh = m; break; }
    }
  }
}

function carregar() {
  var total = FONTES.length, done = 0;
  function fimFonte() {
    done++;
    if (done === total) {
      var removCount = Object.keys(urlsRemovidas).length;
      if (removCount > 0) {
        setStatus('Carregamento completo — <span>' + canaisBrutos.length + '</span> canais únicos (&#128274; ' + sintBloqueados + '/' + removCount + ' filtrados)');
      } else {
        setStatus('Carregamento completo — <span>' + canaisBrutos.length + '</span> canais únicos');
      }
      popularPlataformas();
      popularCategorias();
      mostrarBtnLimparSint();
    }
  }
  for (var i = 0; i < FONTES.length; i++) {
    (function(fonte) {
      logFonte(fonte.nome, 'load');
      fetchM3u(fonte.url, function(e, txt) {
        if (e) { logFonte(fonte.nome, 'err'); fimFonte(); return; }
        var lista = parseM3u(txt, fonte.nome);
        var n = addCanais(lista, fonte.nome);
        logFonte(fonte.nome, 'ok', n);
        popularPlataformas();
        popularCategorias();
        fimFonte();
      });
    })(FONTES[i]);
  }
}

function iniciarStream(url) {
  var vid = document.getElementById('vid');
  clearTimeout(errTmr); clearTimeout(failTmr);
  if (hlsObj) { try { hlsObj.destroy(); } catch(e){} hlsObj = null; }
  vid.pause(); vid.src = '';
  errTmr = setTimeout(onFalha, 12000);
  if (Hls.isSupported()) {
    hlsObj = new Hls({ enableWorker: false });
    hlsObj.loadSource(url);
    hlsObj.attachMedia(vid);
    hlsObj.on(Hls.Events.MANIFEST_PARSED, function() {
      vid.play(); clearTimeout(errTmr);
      document.getElementById('osd-estado').textContent = 'Ao vivo';
      document.getElementById('carregando').style.display = 'none';
    });
    hlsObj.on(Hls.Events.ERROR, function(ev, data) {
      if (data.fatal) onFalha();
    });
  } else if (vid.canPlayType('application/vnd.apple.mpegurl')) {
    vid.src = url;
    vid.addEventListener('loadedmetadata', function() {
      vid.play(); clearTimeout(errTmr);
      document.getElementById('osd-estado').textContent = 'Ao vivo';
      document.getElementById('carregando').style.display = 'none';
    }, { once: true });
  } else {
    vid.src = url;
    vid.play();
    clearTimeout(errTmr);
  }
  vid.onplaying = function() {
    clearTimeout(errTmr);
    document.getElementById('osd-estado').textContent = 'Ao vivo';
    document.getElementById('carregando').style.display = 'none';
  };
}

function onFalha() {
  skipCount++;
  if (skipCount <= 3) {
    mostrarToastBreve();
    var prox = (curCh + 1) % canais.length;
    failTmr = setTimeout(function(){ tocarCanal(prox); }, 2000);
  } else {
    skipCount = 0;
    document.getElementById('osd-estado').textContent = 'Falhou';
    document.getElementById('carregando').textContent = 'Canal indisponível';
  }
}

// ── Sintonizador de canais (em LOTES com retomada) ─────────────
var sintRodando = false;
var sintAbortar = false;
var sintRelatorio = null; // guarda dados do último relatório

// Detecta TV / dispositivo limitado para reduzir paralelo
function _ehTV() {
  try {
    var ua = (navigator.userAgent || '').toLowerCase();
    if (/smart-tv|smarttv|googletv|appletv|hbbtv|pov_tv|netcast|nettv|webos|tizen|viera|bravia|aquos|crkey|chromecast|aftb|aftt|afts|aftn|aftm|silk|dtv|tv\s*build/.test(ua)) return true;
    if (window.innerWidth >= 1280 && !('ontouchstart' in window) && navigator.maxTouchPoints === 0 && /linux armv|arm; |aarch64/.test(ua)) return true;
  } catch(e) {}
  return false;
}

function sintonizarCanais() {
  var btn  = document.getElementById('btn-sintonizar');
  var prog = document.getElementById('sint-progresso');

  if (sintRodando) {
    sintAbortar = true;
    prog.innerHTML = 'Cancelando...';
    btn.innerHTML = '&#9209; Cancelando...';
    btn.disabled = true;
    return;
  }

  if (!pronto || canaisBrutos.length === 0) {
    prog.innerHTML = '<span class="err">Aguarde o carregamento dos canais.</span>';
    return;
  }

  sintRodando = true; sintAbortar = false;
  btn.innerHTML = '&#9209; Cancelar sintonia';
  btn.disabled = false;

  // Lista ESTÁVEL ordenada pela URL (para retomar pelo mesmo índice mesmo após reload)
  var lista = canaisBrutos.slice().sort(function(a,b){
    return a.url < b.url ? -1 : (a.url > b.url ? 1 : 0);
  });
  var total = lista.length;

  // ── Retomada: se houver progresso salvo, continua de onde parou
  var idxInicial = 0, okPrev = 0, failPrev = 0;
  try {
    var sp = localStorage.getItem('k60fast_sint_progresso');
    if (sp) {
      var p = JSON.parse(sp);
      if (p && p.total === total && typeof p.idx === 'number' && p.idx < total) {
        idxInicial = p.idx;
        okPrev = p.ok || 0;
        failPrev = p.fail || 0;
        console.log('Retomando sintonia de ' + idxInicial + '/' + total);
      } else {
        localStorage.removeItem('k60fast_sint_progresso');
      }
    }
  } catch(e) {}

  var idx = idxInicial, ok = okPrev, fail = failPrev, ativos = 0;
  var removidos = [];
  var ehTv = _ehTV();

  // Paralelo reduzido em TV; lote menor + pausa entre lotes para não travar a webview
  var PARALELO   = ehTv ? 2 : 4;
  var TIMEOUT    = ehTv ? 4000 : 6000;
  var LOTE       = ehTv ? 25 : 50;   // canais por pacote
  var PAUSA_LOTE = ehTv ? 500 : 200; // ms de respiro entre pacotes
  var LOTE_PROXY = 100;
  var erros429   = 0;
  var concluidosLote = 0; // contador desde o último save

  prog.innerHTML = '&#9851; Testando ' + total + ' canais'
    + (idxInicial > 0 ? ' (retomando em ' + idxInicial + ')' : '')
    + (ehTv ? ' [modo TV]' : '') + '...';

  function atualizar(nome) {
    prog.innerHTML = 'Testando ' + Math.min(idx, total) + '/' + total
      + ' &nbsp;<span class="ok">&#10003; ' + ok + '</span>'
      + ' &nbsp;<span class="err">&#10005; ' + fail + '</span>'
      + (nome ? '<br><small style="color:#666">' + nome + '</small>' : '');
  }

  function testarCanal(ch, canalIdx, cb) {
    var url = ch.url;

    // Proxy preferencial para este lote (rodízio por lote)
    var loteProxy = Math.floor(canalIdx / LOTE_PROXY) % PROXIES.length;
    // Garante que não está bloqueado
    var agora = Date.now();
    if (proxyStats[loteProxy].bloqueado && agora < proxyStats[loteProxy].cooldown) {
      loteProxy = proximoProxy();
    }

    // Ordem de tentativa: direto → proxy do lote → outros proxies
    var ordemProxies = [loteProxy];
    for (var pi2 = 0; pi2 < PROXIES.length; pi2++) {
      if (pi2 !== loteProxy) ordemProxies.push(pi2);
    }

    var tentativas = [{ url: url, pi: -1 }];
    for (var oi = 0; oi < ordemProxies.length; oi++) {
      var px = ordemProxies[oi];
      var ps = proxyStats[px];
      if (ps.bloqueado && Date.now() < ps.cooldown) continue;
      tentativas.push({ url: PROXIES[px] + encodeURIComponent(url), pi: px });
    }

    var ti = 0, resolvido = false;
    var tmr = setTimeout(function() { resolver(false); }, TIMEOUT + 3000);
    function resolver(s) {
      if (resolvido) return;
      resolvido = true;
      clearTimeout(tmr);
      try { cb(s); } catch(e) {}
    }
    function next() {
      if (ti >= tentativas.length) { resolver(false); return; }
      var t = tentativas[ti++];
      try {
        var r = new XMLHttpRequest();
        r.open('HEAD', t.url, true);
        try { r.timeout = Math.floor(TIMEOUT * 0.5); } catch(e) {}
        r.onreadystatechange = function() {
          if (r.readyState !== 4) return;
          if (r.status === 429) {
            if (t.pi >= 0) marcarErroProxy(t.pi);
            erros429++;
            // Reduz paralelo se muitos 429
            if (erros429 > 10 && PARALELO > 2) { PARALELO = Math.max(2, PARALELO - 1); erros429 = 0; }
            next(); return;
          }
          if (r.status >= 200 && r.status < 400) {
            if (t.pi >= 0) marcarOkProxy(t.pi);
            resolver(true);
          } else if (r.status === 405) {
            // HEAD não permitido, tenta GET parcial
            try {
              var r2 = new XMLHttpRequest();
              r2.open('GET', t.url, true);
              try { r2.timeout = Math.floor(TIMEOUT * 0.45); } catch(e) {}
              r2.onreadystatechange = function() {
                if (r2.readyState >= 2) {
                  try { r2.abort(); } catch(e) {}
                  if (r2.status >= 200 && r2.status < 400) {
                    if (t.pi >= 0) marcarOkProxy(t.pi);
                    resolver(true);
                  } else { next(); }
                }
              };
              r2.onerror = r2.ontimeout = function() { next(); };
              r2.send();
            } catch(e2) { next(); }
          } else {
            if (t.pi >= 0 && r.status >= 400 && r.status !== 404) marcarErroProxy(t.pi);
            next();
          }
        };
        r.onerror = function() { if (t.pi >= 0) marcarErroProxy(t.pi); next(); };
        r.ontimeout = function() { next(); };
        r.send();
      } catch(e) { next(); }
    }
    next();
  }

  function removerUrl(url) {
    urlsRemovidas[url] = 1;
    for (var i = canaisBrutos.length - 1; i >= 0; i--) {
      if (canaisBrutos[i].url === url) { canaisBrutos.splice(i, 1); break; }
    }
  }

  function salvarProgresso() {
    try {
      // Salva URLs removidas até agora (resultado parcial)
      localStorage.setItem('k60fast_removidos', JSON.stringify(urlsRemovidas));
      // Salva ponteiro para retomada
      localStorage.setItem('k60fast_sint_progresso', JSON.stringify({
        total: total, idx: idx, ok: ok, fail: fail, ts: Date.now()
      }));
    } catch(e) { console.error('Falha salvar progresso:', e); }
  }

  function lancar() {
    if (sintAbortar) {
      if (ativos === 0) { salvarProgresso(); _fimSint('Sintonia cancelada (progresso salvo).', ok, fail); }
      return;
    }
    if (idx >= total) {
      if (ativos === 0) { _fimSint('Sintonia concluída!', ok, fail); }
      return;
    }
    // Se completou um lote, salva e dá uma pausa para a TV respirar
    if (concluidosLote >= LOTE) {
      concluidosLote = 0;
      salvarProgresso();
      atualizar('[pausa entre lotes]');
      setTimeout(lancar, PAUSA_LOTE);
      return;
    }
    while (ativos < PARALELO && idx < total && concluidosLote < LOTE) {
      (function(ch, ci) {
        ativos++;
        atualizar(ch.nome);
        testarCanal(ch, ci, function(sucesso) {
          if (!sucesso) {
            fail++;
            removidos.push({ nome: ch.nome, plat: ch.plat, url: ch.url });
            removerUrl(ch.url);
            delete seenUrls[ch.url];
          } else {
            ok++;
          }
          ativos--;
          concluidosLote++;
          atualizar('');
          lancar();
        });
      })(lista[idx], idx);
      idx++;
    }
  }

  // Lança após pequeno delay para não bloquear render
  setTimeout(lancar, 200);

  function _fimSint(msg, ok, fail) {
    sintRodando = false;
    sintAbortar = false;
    btn.disabled = false;
    btn.innerHTML = '&#128225; Sintonizar canais';

    // Se chegou ao fim (não foi cancelado), apaga o ponteiro de retomada
    if (!/cancelada/i.test(msg)) {
      try { localStorage.removeItem('k60fast_sint_progresso'); } catch(e) {}
    }

    // Salva TUDO de uma vez no localStorage
    var totalRemovidos = Object.keys(urlsRemovidas).length;
    var salvoOk = false;
    try {
      var json = JSON.stringify(urlsRemovidas);
      localStorage.setItem('k60fast_removidos', json);
      // Verifica se salvou corretamente
      var check = localStorage.getItem('k60fast_removidos');
      if (check && check.length === json.length) {
        salvoOk = true;
      }
    } catch(e) {
      salvoOk = false;
    }

    aplicarFiltro();
    atualizarTela();
    popularPlataformas();
    popularCategorias();
    mostrarBtnLimparSint();

    var saveInfo = salvoOk
      ? ' &nbsp;&#128190; ' + totalRemovidos + ' URLs salvas'
      : ' &nbsp;<span class="err">&#9888; ERRO ao salvar no localStorage!</span>';
    prog.innerHTML = msg
      + (ok || fail ? ' &nbsp;<span class="ok">&#10003; ' + ok + '</span> <span class="err">&#10005; ' + fail + '</span>' : '')
      + saveInfo;

    // Gera relatório
    var agora = new Date();
    var dataStr = agora.toLocaleDateString('pt-BR') + ' ' + agora.toLocaleTimeString('pt-BR');
    var linhas = [];
    linhas.push('K60 FAST TV — ' + dataStr);
    linhas.push('STATUS: ' + msg);
    linhas.push('Testados: ' + total + '  |  OK: ' + ok + '  |  Removidos: ' + fail + '  |  Restantes: ' + canaisBrutos.length);
    linhas.push('');

    // Estatísticas dos proxies
    linhas.push('── Proxies ──');
    for (var xi = 0; xi < PROXIES.length; xi++) {
      var ps2 = proxyStats[xi];
      var pnome2 = PROXIES[xi].replace('https://','').split('/')[0];
      var estado2 = ps2.bloqueado ? '⚠ bloqueado' : '✓ ok';
      linhas.push('  ' + pnome2 + ' — usos:' + ps2.usos + ' erros:' + ps2.erros + ' ' + estado2);
    }
    linhas.push('');

    // Por plataforma
    var platOk = {}, platFail = {};
    for (var ri = 0; ri < lista.length; ri++) {
      var p = lista[ri].plat;
      if (removidos.some(function(r){ return r.url === lista[ri].url; })) {
        platFail[p] = (platFail[p] || 0) + 1;
      } else {
        platOk[p] = (platOk[p] || 0) + 1;
      }
    }
    var plats = Object.keys(platOk).concat(Object.keys(platFail).filter(function(k){ return !platOk[k]; }));
    plats = plats.filter(function(v,i,a){ return a.indexOf(v)===i; }).sort();

    var semOk = plats.filter(function(pn){ return (platOk[pn]||0) === 0; });
    if (semOk.length) { linhas.push('Sem canais OK: ' + semOk.join(', ')); linhas.push(''); }

    linhas.push('Plataforma         | OK  | Rem');
    linhas.push('-------------------|-----|-----');
    for (var pi3 = 0; pi3 < plats.length; pi3++) {
      var pn = plats[pi3];
      var po = platOk[pn] || 0;
      var pf = platFail[pn] || 0;
      var pad = pn.length < 18 ? pn + Array(19-pn.length).join(' ') : pn.substring(0,18);
      linhas.push(pad + '| ' + String(po).padStart(3) + ' | ' + String(pf).padStart(3));
    }

    sintRelatorio = linhas.join('\n');
    document.getElementById('btn-relatorio-wrap').style.display = 'block';
  }
}

function abrirRelatorio() {
  if (!sintRelatorio) return;
  document.getElementById('relatorio-txt').value = sintRelatorio;
  document.getElementById('modal-relatorio').style.display = 'block';
  document.getElementById('copiar-ok').textContent = '';
}
function fecharRelatorio() {
  document.getElementById('modal-relatorio').style.display = 'none';
}
function copiarRelatorio() {
  var txt = document.getElementById('relatorio-txt');
  txt.select();
  try {
    document.execCommand('copy');
    document.getElementById('copiar-ok').textContent = '✓ Copiado! Cole aqui no chat para análise.';
  } catch(e) {
    try {
      navigator.clipboard.writeText(txt.value).then(function(){
        document.getElementById('copiar-ok').textContent = '✓ Copiado!';
      });
    } catch(e2) {}
  }
}

// ── Limpar sintonização ────────────────────────────────────────
function limparSintonizacao() {
  if (!confirm('Limpar dados da sintonização anterior?\nTodos os canais removidos voltarão.')) return;
  urlsRemovidas = {};
  sintBloqueados = 0;
  try { localStorage.removeItem('k60fast_removidos'); } catch(e){}
  try { localStorage.removeItem('k60fast_sint_progresso'); } catch(e){}
  // Recarrega tudo do zero
  canaisBrutos = []; canais = []; seenUrls = {}; nextNum = 1; pronto = false;
  document.getElementById('btn-limpar-sint').style.display = 'none';
  carregar();
}

function mostrarBtnLimparSint() {
  var removCount = Object.keys(urlsRemovidas).length;
  var btn = document.getElementById('btn-limpar-sint');
  if (btn) btn.style.display = removCount > 0 ? 'inline-block' : 'none';
}

document.getElementById('btn-voltar').onclick = voltarHome;
document.getElementById('btn-ch-cima').onclick = canalCima;
document.getElementById('btn-ch-baixo').onclick = canalBaixo;

try { platFiltro = localStorage.getItem('k60fast_plat') || null; } catch(e){}
try { catFiltro = localStorage.getItem('k60fast_cat') || null; } catch(e){}

renderFavs();
carregar();
</script>
