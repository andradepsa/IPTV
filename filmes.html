<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>CineStream — Archive.org para TV</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/hls.js@1/dist/hls.min.js"></script>
<style>
:root {
  --red: #e50914;
  --red2: #b0060f;
  --teal: #00d4b4;
  --bg: #0a0a0f;
  --bg2: #111118;
  --bg3: #18181f;
  --bg4: #22222c;
  --text: #f0f0f5;
  --muted: #aaa;
  --border: #2a2a3a;
}
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Nunito', sans-serif;
  font-size: 18px;  /* um pouco maior para TV */
  min-height: 100vh;
}
/* CABEÇALHO */
.hd {
  background: linear-gradient(180deg, #000 0%, rgba(0,0,0,.8) 100%);
  padding: 0 20px;
  border-bottom: 3px solid var(--red);
  position: sticky;
  top: 0;
  z-index: 50;
  display: flex;
  align-items: center;
  gap: 16px;
  height: 64px;
}
.logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 32px;
  color: var(--red);
  letter-spacing: 1px;
  white-space: nowrap;
}
.logo span { color: var(--teal); font-size: 16px; }
.nav-tabs {
  display: flex;
  gap: 8px;
  flex: 1;
  overflow-x: auto;
}
.nt {
  padding: 8px 20px;
  background: transparent;
  color: var(--muted);
  font-size: 18px;
  font-weight: 700;
  cursor: pointer;
  border-radius: 40px;
  transition: all 0.2s;
  border: none;
  white-space: nowrap;
}
.nt.on { background: var(--red); color: white; }
.nt:hover { background: var(--bg4); color: var(--text); }
.btn-guide {
  padding: 8px 20px;
  border: 2px solid var(--teal);
  background: transparent;
  color: var(--teal);
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
  border-radius: 40px;
}
/* BARRA DE BUSCA */
.sb {
  padding: 14px 20px;
  background: var(--bg2);
  display: flex;
  gap: 12px;
  align-items: center;
  flex-wrap: wrap;
  border-bottom: 1px solid var(--border);
}
.sb input {
  flex: 3;
  min-width: 200px;
  padding: 12px 18px;
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text);
  font-size: 18px;
  border-radius: 40px;
  outline: none;
}
.sb button {
  padding: 12px 28px;
  background: var(--red);
  border: none;
  color: white;
  font-size: 18px;
  font-weight: bold;
  border-radius: 40px;
  cursor: pointer;
}
.src-badge {
  padding: 8px 16px;
  border-radius: 40px;
  font-size: 16px;
  font-weight: bold;
  white-space: nowrap;
}
/* CATEGORIAS */
.cats {
  padding: 12px 20px;
  background: var(--bg2);
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  border-bottom: 1px solid var(--border);
}
.cb {
  background: var(--bg4);
  border: 1px solid var(--border);
  color: var(--muted);
  padding: 6px 18px;
  font-size: 16px;
  font-weight: bold;
  border-radius: 40px;
  cursor: pointer;
  transition: 0.2s;
}
.cb.on, .cb:hover {
  background: var(--red);
  border-color: var(--red);
  color: white;
}
/* INFOS */
.ib {
  text-align: center;
  padding: 12px;
  font-size: 16px;
  color: var(--muted);
  background: var(--bg);
}
/* GRADE DE MINIATURAS - CORREÇÃO PARA TV */
.gr {
  padding: 20px 16px;
  max-width: 1600px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(130px, 140px)); /* fixo máximo 140px */
  gap: 20px;
  justify-content: center;
}
/* CARD INDIVIDUAL */
.cd {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 12px;
  cursor: pointer;
  transition: transform 0.2s, border-color 0.2s;
  overflow: hidden;
  width: 100%;
}
.cd:hover {
  transform: scale(1.02);
  border-color: var(--red);
  box-shadow: 0 8px 20px rgba(229,9,20,0.3);
}
/* IMAGEM MINIATURA FIXA */
.cd img {
  width: 100%;
  aspect-ratio: 2 / 3;
  display: block;
  object-fit: cover;
  background: #111;
}
.ci {
  padding: 8px;
}
.ct {
  font-size: 13px;
  font-weight: bold;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  color: var(--text);
}
.cm {
  font-size: 12px;
  color: var(--red);
  margin-top: 4px;
}
.cc {
  font-size: 10px;
  color: var(--muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.src-tag {
  position: absolute;
  top: 6px;
  left: 6px;
  background: rgba(229,9,20,0.9);
  padding: 3px 8px;
  border-radius: 20px;
  font-size: 10px;
  font-weight: bold;
}
/* demais modais (player, guia) permanecem similares mas com ajustes de fonte */
.mo, .gm {
  font-size: 18px;
}
.mv-vol button, .mv-vol input {
  font-size: 20px;
}
/* PAGINAÇÃO */
.pb {
  display: inline-block;
  background: var(--bg4);
  padding: 8px 16px;
  margin: 4px;
  border-radius: 30px;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
}
.pb.on, .pb:hover { background: var(--red); color: white; }
</style>
</head>
<body>

<div class="hd">
  <div class="logo">CINE<span>STREAM</span></div>
  <div class="nav-tabs">
    <button class="nt on" onclick="switchSource('archive')">🎬 FILMES</button>
    <button class="nt" onclick="switchSource('cartoons')">📺 CARTOONS</button>
    <button class="nt" onclick="switchSource('docs')">📽️ DOCS</button>
  </div>
  <button class="btn-guide" onclick="openGuide()">📡 APIs</button>
</div>

<div class="sb">
  <input type="text" id="si" placeholder="Buscar título...">
  <button id="btnBuscar">BUSCAR</button>
  <span class="src-badge" id="srcBadge" style="background:rgba(229,9,20,.15);color:#e50914;">ARCHIVE.ORG</span>
</div>

<div class="cats" id="cats"></div>
<div class="ib" id="ib">Carregando...</div>
<div class="gr" id="gr"><div class="ld" style="text-align:center;padding:60px">⏳ Carregando filmes...</div></div>
<div class="pg" id="pg"></div>

<!-- MODAL PLAYER (mesmo do original, mas com ajuste de tamanho) -->
<div class="mo" id="mo" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.98); z-index:100; align-items:center; justify-content:center;">
  <div style="width:95%; max-width:1200px; background:#000; border-radius:16px; overflow:hidden;">
    <div style="padding:12px 20px; background:#111; display:flex; justify-content:space-between; border-bottom:1px solid #333;">
      <h3 id="mt" style="font-size:20px;">Filme</h3>
      <span id="mx" style="font-size:32px; cursor:pointer;">&times;</span>
    </div>
    <div id="mbody"></div>
    <div id="minfo" style="padding:12px 20px; background:#111; font-size:14px; color:#aaa;"></div>
  </div>
</div>

<!-- GUIA (igual) -->
<div class="gm" id="gm" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.97); z-index:200; overflow:auto; padding:40px 20px;">
  <div style="max-width:900px; margin:0 auto; background:#0f0f15; border-radius:20px; padding:20px;">
    <span onclick="closeGuide()" style="float:right; font-size:36px; cursor:pointer;">&times;</span>
    <h2 style="font-size:32px;">GUIA DE <span style="color:var(--teal)">APIs</span></h2>
    <p style="margin:10px 0 30px;">Conteúdo público do Internet Archive. Miniaturas otimizadas para TV.</p>
    <button onclick="closeGuide()" style="background:var(--red); width:100%; padding:14px; border:none; color:white; font-size:18px; border-radius:40px;">FECHAR</button>
  </div>
</div>

<script>
(function(){
let state = { source:'archive', cat:'', q:'', page:1, tot:0, loading:false };
const PP = 24;  // mais itens por página na TV

const FMT_PRIORIDADE = ['MPEG4','512Kb MPEG4','H.264 IA','H.264','HiRes MPEG4','Ogg Video','HLS'];
const EXT_VALIDAS = ['mp4','m4v','ogv','mkv','m3u8'];

const gr = document.getElementById('gr');
const ib = document.getElementById('ib');
const si = document.getElementById('si');
const pgd = document.getElementById('pg');
const mo = document.getElementById('mo');
const mt = document.getElementById('mt');
const mbody = document.getElementById('mbody');
const minfo = document.getElementById('minfo');
const srcBadge = document.getElementById('srcBadge');
const catsDiv = document.getElementById('cats');

let hlsObj = null, curArchId = null;

// ========== MINIATURA CORRETA (thumbnail pequena) ==========
function getThumbnailUrl(identifier) {
  // método mais leve e rápido para TV
  return `https://archive.org/services/img/${encodeURIComponent(identifier)}?size=small`;
  // alternativamente: `https://archive.org/download/${identifier}/${identifier}_thumb.jpg`
}

// ========== CARDS COM IMAGEM OTIMIZADA ==========
function renderCards(docs) {
  if(!docs.length) { gr.innerHTML = '<div class="ld" style="text-align:center; padding:60px">Nenhum resultado</div>'; return; }
  let html = '';
  for(let d of docs) {
    let id = d.identifier;
    let titulo = d.title || 'Sem título';
    let curto = titulo.length > 50 ? titulo.substr(0,47)+'…' : titulo;
    let ano = d.year || '?';
    let downloads = d.downloads ? Number(d.downloads).toLocaleString() : '—';
    let creator = d.creator ? String(d.creator).substr(0,40) : '';
    let thumbUrl = getThumbnailUrl(id);
    html += `<div class="cd" data-id="${esc(id)}" data-titulo="${esc(titulo)}" data-ano="${esc(ano)}" data-creator="${esc(creator)}" data-views="${esc(downloads)}">
      <img src="${thumbUrl}" loading="lazy" onerror="this.src='https://archive.org/images/notfound.png'; this.style.objectFit='contain'">
      <div class="ci">
        <div class="ct">${esc(curto)}</div>
        <div class="cm">${esc(ano)}</div>
        <div class="cc">${esc(creator)}</div>
      </div>
    </div>`;
  }
  gr.innerHTML = html;
  document.querySelectorAll('.cd').forEach(el => {
    el.onclick = () => {
      let id = el.dataset.id, titulo = el.dataset.titulo, ano = el.dataset.ano, creator = el.dataset.creator, views = el.dataset.views;
      abrirPlayer(id, titulo, `<strong>${esc(titulo)}</strong> ${ano!='?'?`(${ano})`:''} · ${creator} · ${views} acessos · <a href="https://archive.org/details/${encodeURIComponent(id)}" target="_blank">Detalhes ↗</a>`);
    };
  });
}

// ========== BUSCA E METADADOS ==========
function load() {
  if(state.loading) return;
  state.loading = true;
  gr.innerHTML = '<div class="ld" style="text-align:center;padding:60px"><div style="width:40px;height:40px;border:3px solid #333;border-top:3px solid red;border-radius:50%;margin:0 auto 12px;animation:spin 0.8s linear infinite"></div>Buscando...</div>';
  pgd.innerHTML = '';
  ib.textContent = 'Carregando arquivo...';
  
  let query = buildQuery();
  let url = `https://archive.org/advancedsearch.php?q=${encodeURIComponent(query)}&fl[]=identifier&fl[]=title&fl[]=year&fl[]=creator&fl[]=downloads&sort[]=downloads+desc&rows=${PP}&page=${state.page}&output=json`;
  
  fetchJSONP(url, (data) => {
    state.loading = false;
    if(!data || data.error || !data.response) {
      gr.innerHTML = '<div class="ld">Erro de conexão com Archive.org</div>';
      ib.textContent = 'Falha';
      return;
    }
    let docs = data.response.docs || [];
    state.tot = data.response.numFound || 0;
    ib.textContent = `${state.tot.toLocaleString()} itens · Pág.${state.page} · Archive.org (Miniaturas TV)`;
    renderCards(docs);
    renderPag();
  });
}

function buildQuery() {
  let q = state.q, cat = state.cat, src = state.source;
  let col = '';
  if(src === 'docs') {
    col = cat ? `collection:${cat}` : '(collection:feature_films OR collection:prelinger OR collection:german_cinema OR collection:classic_tv)';
    col += ' AND mediatype:movies';
  } else if(src === 'cartoons') {
    col = cat ? `collection:${cat}` : 'collection:animationandcartoons';
    col += ' AND mediatype:movies';
  } else {
    col = cat ? `collection:${cat}` : '(collection:feature_films OR collection:Comedy_Films OR collection:Film_Noir OR collection:SciFi_Horror OR collection:silent_films OR collection:short_films OR collection:prelinger OR collection:animationandcartoons)';
    col += ' AND mediatype:movies';
  }
  if(q) col = `(${col}) AND title:(${q})`;
  return col;
}

function fetchJSONP(url, cb) {
  let name = '_cb_' + Date.now() + '_' + Math.floor(Math.random()*99999);
  let script = document.createElement('script');
  let timeout = setTimeout(() => { cleanup(); cb({error:'timeout'}); }, 15000);
  window[name] = (data) => { clearTimeout(timeout); cleanup(); cb(data); };
  function cleanup() { delete window[name]; if(script.parentNode) script.parentNode.removeChild(script); }
  script.onerror = () => { clearTimeout(timeout); cleanup(); cb({error:'network'}); };
  script.src = url + '&callback=' + name;
  document.head.appendChild(script);
}

function renderPag() {
  let total = Math.ceil(state.tot / PP);
  if(total <= 1) { pgd.innerHTML = ''; return; }
  let html = `<span class="pb" data-page="${state.page-1}" ${state.page===1?'disabled':''}>◀</span>`;
  for(let i=1; i<=total && i<=8; i++) {
    html += `<span class="pb ${i===state.page?'on':''}" data-page="${i}">${i}</span>`;
  }
  html += `<span class="pb" data-page="${state.page+1}" ${state.page>=total?'disabled':''}>▶</span>`;
  pgd.innerHTML = html;
  document.querySelectorAll('.pb').forEach(btn => {
    let p = parseInt(btn.dataset.page);
    if(!isNaN(p) && p>=1 && p<=total) btn.onclick = () => { state.page = p; load(); window.scrollTo(0,0); };
  });
}

// ========== PLAYER IDÊNTICO AO ORIGINAL (resumido) ==========
function pararPlayer() { if(hlsObj) hlsObj.destroy(); let vid=document.getElementById('cv'); if(vid){vid.pause();vid.src='';} }
function montarPlayerHTML() { return `<div style="position:relative;width:100%;padding-bottom:56.25%;background:#000"><video id="cv" controls playsinline style="position:absolute;width:100%;height:100%"></video><div id="cv-err" style="display:none;position:absolute;inset:0;background:#000;flex-direction:column;align-items:center;justify-content:center"><p>Erro ao carregar</p><button id="btn-embed">Usar alternativo</button><button id="btn-direct">Abrir no Archive</button></div></div>`; }
function abrirPlayer(id, titulo, infoHtml) {
  curArchId = id; mt.textContent = titulo; minfo.innerHTML = infoHtml;
  mbody.innerHTML = montarPlayerHTML();
  mo.style.display = 'flex';
  document.getElementById('btn-embed').onclick = () => usarEmbed(id);
  document.getElementById('btn-direct').onclick = () => window.open(`https://archive.org/details/${encodeURIComponent(id)}`, '_blank');
  carregarVideo(id);
}
function carregarVideo(id) {
  fetch(`https://archive.org/metadata/${encodeURIComponent(id)}`).then(r=>r.json()).then(data=>{
    let files = data.files || [];
    let url = null;
    for(let fmt of FMT_PRIORIDADE) {
      let f = files.find(f=>f.format===fmt && EXT_VALIDAS.some(ext=>f.name.endsWith(ext)));
      if(f) { url = `https://archive.org/download/${encodeURIComponent(id)}/${encodeURIComponent(f.name)}`; break; }
    }
    if(!url) url = files.find(f=>f.name && f.name.endsWith('.mp4'))?.name && `https://archive.org/download/${encodeURIComponent(id)}/${encodeURIComponent(files.find(f=>f.name.endsWith('.mp4')).name)}`;
    if(url) tocarUrl(url, id);
    else usarEmbed(id);
  }).catch(()=>usarEmbed(id));
}
function tocarUrl(url,id) {
  let vid = document.getElementById('cv');
  if(!vid) return;
  vid.src = url; vid.load(); vid.play().catch(()=>vid.muted=true&&vid.play());
}
function usarEmbed(id) {
  let container = document.querySelector('#mbody > div');
  if(container) container.innerHTML = `<iframe src="https://archive.org/embed/${encodeURIComponent(id)}?autoplay=1" allowfullscreen style="position:absolute;width:100%;height:100%;border:none"></iframe>`;
}
function fecharModal() { pararPlayer(); mo.style.display = 'none'; mbody.innerHTML = ''; }
document.getElementById('mx').onclick = fecharModal;
mo.onclick = (e) => { if(e.target===mo) fecharModal(); };

// ========== CATEGORIAS & MUDANÇA DE FONTE ==========
const CATS = {
  archive: [{k:'',l:'TODOS'},{k:'feature_films',l:'LONGAS'},{k:'Comedy_Films',l:'COMÉDIA'},{k:'SciFi_Horror',l:'SCI-FI'},{k:'silent_films',l:'MUDOS'},{k:'short_films',l:'CURTAS'},{k:'animationandcartoons',l:'ANIMAÇÃO'},{k:'prelinger',l:'PRELINGER'},{k:'classic_tv',l:'TV'},{k:'german_cinema',l:'ALEMÃO'}],
  cartoons: [{k:'',l:'TODOS'},{k:'animationandcartoons',l:'ANIMAÇÃO'},{k:'short_films',l:'CURTAS'}],
  docs: [{k:'',l:'TODOS'},{k:'feature_films',l:'LONGAS'},{k:'prelinger',l:'HISTÓRIA'},{k:'classic_tv',l:'TV CLÁSSICA'}]
};
function renderCats() {
  let list = CATS[state.source] || [];
  catsDiv.innerHTML = list.map(c => `<span class="cb ${c.k===state.cat?'on':''}" data-k="${c.k}">${c.l}</span>`).join('');
  document.querySelectorAll('.cb').forEach(el => el.onclick = () => { state.cat = el.dataset.k; state.page=1; renderCats(); load(); });
}
window.switchSource = function(src) {
  document.querySelectorAll('.nt').forEach(b=>b.classList.remove('on'));
  if(src==='archive') document.querySelectorAll('.nt')[0].classList.add('on');
  else if(src==='cartoons') document.querySelectorAll('.nt')[1].classList.add('on');
  else document.querySelectorAll('.nt')[2].classList.add('on');
  state.source = src;
  state.cat = (src==='cartoons') ? 'animationandcartoons' : '';
  state.q = ''; state.page = 1; si.value = '';
  let badgeText = {archive:'ARCHIVE.ORG', cartoons:'ARCHIVE.ORG', docs:'ARCHIVE.ORG'};
  srcBadge.textContent = badgeText[src];
  renderCats();
  load();
};

function esc(s) { if(!s) return ''; return String(s).replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

document.getElementById('btnBuscar').onclick = () => { state.q = si.value.trim(); state.page=1; load(); };
si.onkeydown = e => { if(e.key==='Enter') { state.q=si.value.trim(); state.page=1; load(); } };
window.openGuide = () => { document.getElementById('gm').style.display='block'; };
window.closeGuide = () => { document.getElementById('gm').style.display='none'; };

renderCats();
load();
})();
</script>
</body>
</html>
