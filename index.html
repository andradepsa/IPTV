<script>
// ============================================================
// IPTV K10 TV - MODO ADAPTATIVO
// ✅ Detecta se está em TV ou Computador
// ✅ Computador: verificação massiva (10 canais/vez)
// ✅ TV: verificação leve (2 canais/vez)
// ============================================================

// ============================================================
// DETECÇÃO DE DISPOSITIVO
// ============================================================
function isTV() {
  // Detecta TV por user agent e recursos
  var ua = navigator.userAgent.toLowerCase();
  var isTvDevice = ua.includes('tv') || ua.includes('smarttv') || ua.includes('webos') || 
                   ua.includes('tizen') || ua.includes('vidaa') || ua.includes('android.tv');
  
  // Detecta por resolução (TVs geralmente têm telas grandes)
  var isLargeScreen = window.screen.width >= 1920 || window.screen.height >= 1080;
  
  // Detecta por falta de toque (TV usa controle remoto)
  var hasTouch = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
  
  // Se tem toque E é tela pequena, provavelmente é celular/tablet
  // Se é tela grande E não tem toque, provavelmente é TV
  var isProbablyTV = (isLargeScreen && !hasTouch) || isTvDevice;
  
  return isProbablyTV;
}

var modoTV = isTV();
var CONCORRENCIA = modoTV ? 2 : 8; // TV: 2 canais/vez, PC: 8 canais/vez
var TIMEOUT_TESTE = modoTV ? 5000 : 4000; // TV: 5s, PC: 4s
var PAUSA_ENTRE_TESTES = modoTV ? 300 : 100; // TV mais lento

// Atualizar badge na tela
var modeBadge = document.getElementById('modeBadge');
if (modoTV) {
  modeBadge.innerHTML = '📺 Modo TV (leve)';
  modeBadge.classList.add('tv');
} else {
  modeBadge.innerHTML = '💻 Modo Computador (rápido)';
}

console.log('Modo detectado:', modoTV ? 'TV (verificação leve)' : 'Computador (verificação massiva)');
console.log('Concorrência:', CONCORRENCIA, 'canais por vez');

// ============================================================
// PROXIES CORS
// ============================================================
var CORS_PROXIES = [
  function(url) { return 'https://corsproxy.io/?url=' + encodeURIComponent(url); },
  function(url) { return 'https://api.allorigins.win/raw?url=' + encodeURIComponent(url); },
  function(url) { return 'https://thingproxy.freeboard.io/fetch/' + url; }
];

// ============================================================
// CONFIGURAÇÃO
// ============================================================
var API_SERVERS = [
  'https://iptv-org.github.io/api',
  'https://cdn.jsdelivr.net/gh/iptv-org/api@gh-pages',
  'https://raw.githubusercontent.com/iptv-org/api/gh-pages'
];

var FLAGS = {
  BR:'🇧🇷', US:'🇺🇸', GB:'🇬🇧', FR:'🇫🇷', DE:'🇩🇪', ES:'🇪🇸', IT:'🇮🇹',
  PT:'🇵🇹', AR:'🇦🇷', MX:'🇲🇽', JP:'🇯🇵', KR:'🇰🇷', RU:'🇷🇺', IN:'🇮🇳',
  CN:'🇨🇳', AU:'🇦🇺', CA:'🇨🇦', NL:'🇳🇱', TR:'🇹🇷', SA:'🇸🇦', AE:'🇦🇪',
  PL:'🇵🇱', ZA:'🇿🇦', EG:'🇪🇬', NG:'🇳🇬', KE:'🇰🇪'
};

// Todas as categorias
var CATS = [
  {G:'🌍 ACESSO GERAL'},
  {id:'mundial',e:'📺',n:'IPTV Mundial',s:'+10k canais · todos os países',t:'api',c:null},
  {G:'🇧🇷 BRASIL'},
  {id:'brasil',e:'🇧🇷',n:'IPTV Brasil',s:'Canais abertos brasileiros',t:'api',c:null},
  {G:'📰 INFORMAÇÃO'},
  {id:'noti',e:'📰',n:'Notícias',s:'Jornalismo ao vivo',t:'api',c:['news']},
  {id:'nego',e:'💼',n:'Negócios & Clima',s:'Business · economia',t:'api',c:['business','weather']},
  {G:'⚽ ESPORTES'},
  {id:'esp',e:'⚽',n:'Esportes',s:'Futebol · basquete · tênis',t:'api',c:['sports']},
  {G:'🎭 ENTRETENIMENTO'},
  {id:'entr',e:'🎭',n:'Entretenimento',s:'Comédia · variedades',t:'api',c:['entertainment','comedy','general']},
  {id:'fil',e:'🎬',n:'Filmes & Séries',s:'Filmes · séries · animação',t:'api',c:['movies','series','animation']},
  {id:'mus',e:'🎵',n:'Música',s:'Canais de música ao vivo',t:'api',c:['music']},
  {G:'🌿 ESTILO DE VIDA'},
  {id:'docs',e:'🎥',n:'Documentários',s:'Documentários do mundo',t:'api',c:['documentary']},
  {id:'kids',e:'🧸',n:'Kids & Família',s:'Infantil · família',t:'api',c:['kids','family']},
  {id:'edu',e:'🎓',n:'Educação & Cultura',s:'Educação · ciência',t:'api',c:['education','culture','science']},
  {id:'life',e:'🌿',n:'Lifestyle',s:'Culinária · viagem',t:'api',c:['cooking','travel','lifestyle']}
];

// Estado global
var SCR = 'menu';
var mItems = [], mIdx = 0;
var cItems = [], cIdx = 0;
var channels = [];
var channelsParaExibir = [];
var retryFn = null;
var hls = null;
var ovTmr = null;
var failTmr = null;
var playing = false;
var apiCache = null;
var currentCategory = null;
var verificando = false;

// LocalStorage
var STORAGE_CANAL_STATUS = 'iptv_k10_status_v6';
var STORAGE_LAST_FULL_VERIFY = 'iptv_k10_full_verify_v6';
var DIAS_VERIFICACAO = 7;

function loadCanalStatus() {
  try { var s = localStorage.getItem(STORAGE_CANAL_STATUS); return s ? JSON.parse(s) : {}; } catch(e) { return {}; }
}
var canalStatus = loadCanalStatus();
function saveCanalStatus() { localStorage.setItem(STORAGE_CANAL_STATUS, JSON.stringify(canalStatus)); }

function precisaVerificarCompleta() {
  var lastVerify = localStorage.getItem(STORAGE_LAST_FULL_VERIFY);
  if (!lastVerify) return true;
  return (Date.now() - parseInt(lastVerify)) / (1000 * 60 * 60 * 24) >= DIAS_VERIFICACAO;
}

function marcarVerificacaoCompleta() { localStorage.setItem(STORAGE_LAST_FULL_VERIFY, Date.now().toString()); }

// ============================================================
// TESTE DE CANAL VIA PROXY
// ============================================================
function testarCanalComProxy(channel, callback) {
  var url = channel.url;
  var tentativas = 0;
  
  function tentarComProxy(proxyIndex) {
    if (proxyIndex >= CORS_PROXIES.length) {
      callback(false, 'Todos os proxies falharam');
      return;
    }
    
    var proxyUrl = CORS_PROXIES[proxyIndex](url);
    var xhr = new XMLHttpRequest();
    var timeout = setTimeout(function() {
      if (xhr) { try { xhr.abort(); } catch(e) {} }
      tentarComProxy(proxyIndex + 1);
    }, TIMEOUT_TESTE);
    
    xhr.open('HEAD', proxyUrl, true);
    xhr.timeout = TIMEOUT_TESTE;
    
    xhr.onload = function() {
      clearTimeout(timeout);
      callback(true, null);
    };
    
    xhr.onerror = function() {
      clearTimeout(timeout);
      tentarComProxy(proxyIndex + 1);
    };
    
    xhr.ontimeout = function() {
      clearTimeout(timeout);
      tentarComProxy(proxyIndex + 1);
    };
    
    try { xhr.send(); } catch(e) { tentarComProxy(proxyIndex + 1); }
  }
  
  tentarComProxy(0);
}

// ============================================================
// VERIFICAÇÃO DE TODOS OS CANAIS DE TODAS AS CATEGORIAS
// ============================================================
var verificacaoTotalAtiva = false;
var canaisTotais = [];
var categoriaAtualIndex = 0;

function verificarTodosCanais() {
  if (verificacaoTotalAtiva) return;
  verificacaoTotalAtiva = true;
  
  var verifyBtn = document.getElementById('c-verify-all');
  var progressDiv = document.getElementById('verify-progress');
  var statusDiv = document.getElementById('verifyStatus');
  
  verifyBtn.classList.add('verificando');
  verifyBtn.textContent = '⏳ Verificando Tudo...';
  progressDiv.style.display = 'block';
  statusDiv.innerHTML = '📡 Carregando todas as categorias...';
  
  // Coletar todos os canais de todas as categorias
  var todasCategorias = CATS.filter(function(cat) { return cat.id; });
  var totalCategorias = todasCategorias.length;
  var categoriaAtual = 0;
  var todosCanais = [];
  var categoriasMap = {};
  
  function carregarProximaCategoria() {
    if (categoriaAtual >= totalCategorias) {
      // Todas as categorias carregadas, começar verificação
      iniciarVerificacaoMassiva();
      return;
    }
    
    var cat = todasCategorias[categoriaAtual];
    statusDiv.innerHTML = '📡 Carregando: ' + cat.n + ' (' + (categoriaAtual+1) + '/' + totalCategorias + ')';
    progressDiv.innerHTML = '📂 Carregando categoria ' + (categoriaAtual+1) + '/' + totalCategorias + '<br>' + cat.n;
    
    fetchApiWithFallback(function(err, data) {
      if (!err && data) {
        var chs = buildChannelList(data, cat.c);
        if (cat.id === 'brasil') {
          chs = chs.filter(function(ch) { return ch.country === 'BR'; });
        }
        
        for (var i = 0; i < chs.length; i++) {
          todosCanais.push({
            channel: chs[i],
            categoriaId: cat.id,
            categoriaNome: cat.n
          });
        }
        
        if (!categoriasMap[cat.id]) {
          categoriasMap[cat.id] = {};
        }
      }
      
      categoriaAtual++;
      setTimeout(carregarProximaCategoria, 100);
    });
  }
  
  function iniciarVerificacaoMassiva() {
    canaisTotais = todosCanais;
    var total = canaisTotais.length;
    
    statusDiv.innerHTML = '🔍 Verificando ' + total + ' canais... (' + (modoTV ? 'Modo TV leve' : 'Modo PC rápido') + ')';
    progressDiv.innerHTML = '🔍 0/' + total + ' canais | 0 bons, 0 ruins';
    
    var testados = 0;
    var bons = 0;
    var ruins = 0;
    var index = 0;
    var ativos = 0;
    
    function testarProximo() {
      if (index >= total) {
        if (ativos === 0) {
          marcarVerificacaoCompleta();
          saveCanalStatus();
          progressDiv.style.display = 'none';
          statusDiv.innerHTML = '✅ Completo! ' + bons + ' bons, ' + ruins + ' ruins';
          verifyBtn.classList.remove('verificando');
          verifyBtn.textContent = '⚡ Verificar Tudo';
          verificacaoTotalAtiva = false;
          
          // Se estamos em alguma categoria, recarregar
          if (currentCategory) {
            carregarCanaisFiltrados();
          }
          
          setTimeout(function() { 
            if (statusDiv.innerHTML !== '🔍 Verificando...') {
              statusDiv.innerHTML = '✅ Pronto';
            }
          }, 5000);
        }
        return;
      }
      
      if (ativos >= CONCORRENCIA) {
        setTimeout(testarProximo, 100);
        return;
      }
      
      var item = canaisTotais[index];
      var ch = item.channel;
      var catId = item.categoriaId;
      var idxAtual = index;
      index++;
      ativos++;
      
      progressDiv.innerHTML = '🔍 ' + idxAtual + '/' + total + '<br>' + ch.name.substring(0, 35) + '<br>✅ ' + bons + ' | ❌ ' + ruins;
      
      testarCanalComProxy(ch, function(funciona, erro) {
        ativos--;
        testados++;
        
        if (!canalStatus[catId]) canalStatus[catId] = {};
        
        if (funciona) {
          bons++;
          canalStatus[catId][ch.id] = { status: 'bom', lastCheck: Date.now(), name: ch.name };
        } else {
          ruins++;
          canalStatus[catId][ch.id] = { status: 'ruim', lastCheck: Date.now(), name: ch.name };
        }
        
        if (testados % 20 === 0) saveCanalStatus();
        
        var tempoPausa = modoTV ? PAUSA_ENTRE_TESTES : 50;
        setTimeout(testarProximo, tempoPausa);
      });
      
      setTimeout(testarProximo, 50);
    }
    
    testarProximo();
  }
  
  carregarProximaCategoria();
}

// ============================================================
// FUNÇÕES DE REDE E UI
// ============================================================
function get(url, cb, timeoutMs) {
  timeoutMs = timeoutMs || 15000;
  var x = new XMLHttpRequest();
  x.open('GET', url);
  x.timeout = timeoutMs;
  x.onreadystatechange = function() {
    if (x.readyState !== 4) return;
    if (x.status >= 200 && x.status < 300) cb(null, x.responseText);
    else cb('HTTP ' + x.status);
  };
  x.ontimeout = function() { cb('timeout'); };
  x.onerror = function() { cb('erro'); };
  try { x.send(); } catch(e) { cb(e.message); }
}

function getJSON(url, cb) {
  get(url, function(e, t) {
    if (e) return cb(e);
    try { cb(null, JSON.parse(t)); }
    catch(x) { cb('JSON inválido'); }
  });
}

function fetchApiWithFallback(cb) {
  if (apiCache) return cb(null, apiCache);
  
  var idx = 0;
  var lastErr = null;
  
  function tryNext() {
    if (idx >= API_SERVERS.length) {
      cb(lastErr || 'Todos os servidores falharam');
      return;
    }
    
    var server = API_SERVERS[idx++];
    var done = 0;
    var chs = null, strs = null;
    var err = null;
    
    function checkDone() {
      if (++done < 2) return;
      if (err) { lastErr = err; tryNext(); }
      else { apiCache = { chs: chs, strs: strs }; cb(null, apiCache); }
    }
    
    getJSON(server + '/channels.json', function(e, d) { if (e) { err = e; checkDone(); } else { chs = d; checkDone(); } });
    getJSON(server + '/streams.json', function(e, d) { if (e) { err = e; checkDone(); } else { strs = d; checkDone(); } });
  }
  tryNext();
}

function buildChannelList(data, filterCats) {
  var streamMap = {};
  for (var i = 0; i < data.strs.length; i++) { streamMap[data.strs[i].channel] = data.strs[i].url; }
  
  var out = [];
  for (var j = 0; j < data.chs.length && out.length < 500; j++) {
    var ch = data.chs[j];
    var url = streamMap[ch.id];
    if (!url) continue;
    
    var chCats = ch.categories || [];
    var isAdult = false;
    for (var k = 0; k < chCats.length; k++) {
      if (chCats[k] === 'xxx' || chCats[k] === 'adult' || chCats[k] === 'porn') { isAdult = true; break; }
    }
    if (isAdult) continue;
    
    if (filterCats && filterCats.length > 0) {
      var hasCat = false;
      for (var c = 0; c < chCats.length; c++) {
        if (filterCats.indexOf(chCats[c]) !== -1) { hasCat = true; break; }
      }
      if (!hasCat) continue;
    }
    
    var country = (ch.country || '').toUpperCase();
    out.push({
      id: ch.id,
      name: ch.name,
      logo: ch.logo || '',
      country: country,
      flag: FLAGS[country] || '🌐',
      cat: chCats.join(', '),
      url: url
    });
  }
  return out;
}

function carregarCanaisFiltrados() {
  if (!currentCategory) return;
  var catStatus = canalStatus[currentCategory.id] || {};
  
  var canaisFiltrados = channels.filter(function(ch) {
    var status = catStatus[ch.id];
    if (!status) return true;
    if (status.status === 'bom') return true;
    return false;
  });
  
  renderList(canaisFiltrados);
}

// ============================================================
// UI FUNCTIONS
// ============================================================
function esc(s) { return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

function setState(state, msg) {
  document.getElementById('c-load').style.display = state === 'load' ? 'flex' : 'none';
  document.getElementById('c-err').style.display = state === 'err' ? 'flex' : 'none';
  document.getElementById('c-list').style.display = state === 'list' ? 'block' : 'none';
  if (state === 'load') document.getElementById('l-txt').textContent = msg || '';
  if (state === 'err') {
    document.getElementById('e-txt').textContent = msg || '';
    cItems = [document.getElementById('c-back'), document.getElementById('c-retry')];
    cIdx = 1;
    setFoc(cItems[1]);
  }
}

function showScr(name) {
  ['menu', 'channels', 'player'].forEach(function(s) {
    document.getElementById('s-' + s).classList[s === name ? 'add' : 'remove']('on');
  });
  SCR = name;
  if (name === 'menu' && mItems.length) setFoc(mItems[mIdx]);
  if (name === 'player') setFoc(document.getElementById('p-back'));
  if (name === 'channels' && cItems.length > 0 && cIdx < cItems.length) {
    setTimeout(function() { setFoc(cItems[cIdx]); }, 50);
  }
}

function setFoc(el) {
  if (!el) return;
  document.querySelectorAll('.foc').forEach(function(x) { x.classList.remove('foc'); });
  el.classList.add('foc');
  try { el.focus(); } catch(e) {}
  try { el.scrollIntoView({ block: 'nearest' }); } catch(e) {}
}

// ============================================================
// CARREGAR CATEGORIA INDIVIDUAL
// ============================================================
function loadCat(cat) {
  currentCategory = cat;
  showScr('channels');
  document.getElementById('c-title').textContent = cat.e + ' ' + cat.n;
  document.getElementById('c-cnt').textContent = '';
  setState('load', 'Carregando canais...');
  retryFn = function() { loadCat(cat); };
  
  fetchApiWithFallback(function(err, data) {
    if (err) { setState('err', 'Falha na API.\n' + err); return; }
    var chs = buildChannelList(data, cat.c);
    if (cat.id === 'brasil') { chs = chs.filter(function(ch) { return ch.country === 'BR'; }); }
    if (chs.length === 0) { setState('err', 'Nenhum canal encontrado.'); return; }
    channels = chs;
    carregarCanaisFiltrados();
  });
}

function renderList(chs) {
  channelsParaExibir = chs;
  var list = document.getElementById('c-list');
  list.innerHTML = '';
  setState('list');
  document.getElementById('c-cnt').textContent = chs.length + ' canais';
  cItems = [document.getElementById('c-back')];
  
  for (var i = 0; i < chs.length; i++) {
    var ch = chs[i];
    var el = document.createElement('div');
    el.className = 'ch';
    el.tabIndex = 0;
    el.setAttribute('data-i', i);
    
    el.innerHTML = (ch.logo ? 
      '<img class="ch-lg" src="' + esc(ch.logo) + '" onerror="this.style.display=\'none\'" alt="">' :
      '<span class="ch-fl">' + ch.flag + '</span>'
    ) + '<div><div class="ch-nm">' + esc(ch.name) + '</div>' +
      (ch.cat ? '<div class="ch-ct">' + ch.flag + ' ' + esc(ch.cat) + '</div>' : '') + '</div>';
    
    (function(idx, item) {
      el.addEventListener('click', function() { play(idx); });
      el.addEventListener('mouseover', function() {
        var i = cItems.indexOf(item);
        if (i >= 0) cIdx = i;
        setFoc(item);
      });
    })(i, el);
    
    list.appendChild(el);
    cItems.push(el);
  }
  
  cIdx = 1;
  setFoc(cItems[1] || cItems[0]);
  
  document.getElementById('c-verify-all').onclick = function() {
    if (document.getElementById('c-verify-all').classList.contains('verificando')) return;
    verificarTodosCanais();
  };
}

// ============================================================
// PLAYER
// ============================================================
function stopHls() { if (hls) { try { hls.destroy(); } catch(e) {} hls = null; } }

function voltaCanais() {
  if (playing) return;
  clearTimeout(failTmr);
  stopHls();
  showScr('channels');
  if (cItems && cItems.length > 0 && cIdx < cItems.length) {
    setTimeout(function() { setFoc(cItems[cIdx]); }, 50);
  }
}

function play(idx) {
  var ch = channelsParaExibir ? channelsParaExibir[idx] : null;
  if (!ch) return;
  
  playing = false;
  clearTimeout(failTmr);
  stopHls();
  
  document.getElementById('p-nm').textContent = ch.flag + ' ' + ch.name;
  document.getElementById('p-inf').textContent = ch.cat || ch.country || '';
  document.getElementById('p-st').textContent = '⏳ Conectando...';
  showScr('player');
  showOv();
  
  var vid = document.getElementById('vid');
  vid.src = '';
  
  failTmr = setTimeout(function() {
    if (!playing) { document.getElementById('p-st').textContent = '❌ Canal offline'; voltaCanais(); }
  }, 20000);
  
  var url = ch.url;
  
  if (url.indexOf('.m3u8') !== -1 || url.indexOf('m3u8') !== -1) {
    if (typeof Hls !== 'undefined' && Hls.isSupported()) {
      hls = new Hls({ maxBufferLength: 30, startLevel: -1, debug: false });
      hls.loadSource(url);
      hls.attachMedia(vid);
      hls.on(Hls.Events.MANIFEST_PARSED, function() { clearTimeout(failTmr); playing = true; document.getElementById('p-st').textContent = '▶ Ao vivo'; try { vid.play(); } catch(e) {} });
      hls.on(Hls.Events.ERROR, function(ev, data) { if (data.fatal) { document.getElementById('p-st').textContent = '❌ Erro'; voltaCanais(); } });
    } else {
      vid.src = url;
      vid.oncanplay = function() { clearTimeout(failTmr); playing = true; document.getElementById('p-st').textContent = '▶ Ao vivo'; };
      vid.onerror = function() { document.getElementById('p-st').textContent = '❌ Erro'; voltaCanais(); };
      try { vid.load(); vid.play(); } catch(e) {}
    }
  } else {
    vid.src = url;
    vid.oncanplay = function() { clearTimeout(failTmr); playing = true; document.getElementById('p-st').textContent = '▶ Ao vivo'; };
    vid.onerror = function() { document.getElementById('p-st').textContent = '❌ Erro'; voltaCanais(); };
    try { vid.load(); vid.play(); } catch(e) {}
  }
}

function showOv() {
  var ov = document.getElementById('p-ov');
  ov.classList.remove('hide');
  clearTimeout(ovTmr);
  ovTmr = setTimeout(function() { ov.classList.add('hide'); }, 4000);
}

// ============================================================
// TECLADO
// ============================================================
document.addEventListener('keydown', function(e) {
  var k = e.keyCode || e.which;
  var UP = k === 38, DN = k === 40, OK = k === 13 || k === 32, BK = k === 8 || k === 27;
  var teclas = [4,8,13,27,32,36,37,38,39,40,88,166,196,457,461,1009,10009,10182];
  if (teclas.indexOf(k) !== -1) e.preventDefault();
  
  if (SCR === 'menu') {
    if (UP && mIdx > 0) { mIdx--; setFoc(mItems[mIdx]); }
    else if (DN && mIdx < mItems.length - 1) { mIdx++; setFoc(mItems[mIdx]); }
    else if (OK && mItems[mIdx] && mItems[mIdx]._cat) { loadCat(mItems[mIdx]._cat); }
  }
  else if (SCR === 'channels') {
    if (BK) { stopHls(); showScr('menu'); }
    else if (UP && cIdx > 0) { cIdx--; setFoc(cItems[cIdx]); }
    else if (DN && cIdx < cItems.length - 1) { cIdx++; setFoc(cItems[cIdx]); }
    else if (OK && cItems[cIdx]) {
      var el = cItems[cIdx];
      if (el.id === 'c-back') showScr('menu');
      else if (el.id === 'c-retry') { if (retryFn) retryFn(); }
      else if (el.id === 'c-verify-all') verificarTodosCanais();
      else {
        var idx = parseInt(el.getAttribute('data-i') || '-1');
        if (idx >= 0) play(idx);
      }
    }
  }
  else if (SCR === 'player') {
    if (BK) { stopHls(); showScr('channels'); }
    else showOv();
  }
});

// ============================================================
// MONTAR MENU
// ============================================================
(function() {
  var side = document.getElementById('m-side');
  for (var i = 0; i < CATS.length; i++) {
    var d = CATS[i];
    if (d.G) {
      var g = document.createElement('div');
      g.className = 'm-grp';
      g.textContent = d.G;
      side.appendChild(g);
    } else {
      var el = document.createElement('div');
      el.className = 'm-item';
      el.tabIndex = 0;
      el.innerHTML = '<span class="m-ico">' + d.e + '</span><div><div class="m-lbl">' + esc(d.n) + '</div><div class="m-sub">' + esc(d.s) + '</div></div>';
      el._cat = d;
      (function(cat, item, idx) {
        el.addEventListener('click', function() { loadCat(cat); });
        el.addEventListener('mouseover', function() { mIdx = idx; setFoc(item); });
      })(d, el, mItems.length);
      side.appendChild(el);
      mItems.push(el);
    }
  }
  document.getElementById('c-back').addEventListener('click', function() { showScr('menu'); });
  document.getElementById('c-retry').addEventListener('click', function() { if (retryFn) retryFn(); });
  document.getElementById('p-back').addEventListener('click', function() { stopHls(); showScr('channels'); });
  document.getElementById('s-player').addEventListener('mousemove', showOv);
  if (mItems.length) setFoc(mItems[0]);
  
  // Verificação automática no computador
  if (!modoTV && precisaVerificarCompleta()) {
    setTimeout(function() {
      verificarTodosCanais();
    }, 3000);
  }
})();
