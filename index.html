<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K60 — TV & Rádio</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');

*{margin:0;padding:0;box-sizing:border-box}

:root{
  --green: #00ff88;
  --amber: #ffaa00;
  --red:   #ff3355;
  --bg:    #050505;
  --card:  #0a0a0a;
  --line:  #1a1a1a;
}

html,body{
  height:100%;
  background:var(--bg);
  color:#fff;
  font-family:'Share Tech Mono', monospace;
  overflow:hidden;
}

/* ── SCANLINES overlay ── */
body::before{
  content:'';
  position:fixed;inset:0;
  background:repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,.18) 2px,
    rgba(0,0,0,.18) 4px
  );
  pointer-events:none;
  z-index:999;
}

/* ── NOISE grain ── */
body::after{
  content:'';
  position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events:none;
  z-index:998;
  opacity:.35;
}

/* ── LAYOUT ── */
.stage{
  position:relative;
  height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:0;
  padding:20px;
}

/* ── HEADER ── */
.brand{
  text-align:center;
  margin-bottom:48px;
  animation: fadeDown .8s ease both;
}
.brand-k60{
  font-family:'Orbitron',monospace;
  font-size:clamp(48px,10vw,96px);
  font-weight:900;
  color:var(--green);
  letter-spacing:8px;
  line-height:1;
  text-shadow:0 0 30px rgba(0,255,136,.5), 0 0 80px rgba(0,255,136,.2);
  position:relative;
}
.brand-k60::after{
  content:'BROADCAST';
  position:absolute;
  bottom:-16px;
  left:50%;
  transform:translateX(-50%);
  font-size:11px;
  letter-spacing:10px;
  color:#333;
  font-weight:400;
  white-space:nowrap;
}
.brand-tagline{
  margin-top:28px;
  font-size:12px;
  letter-spacing:4px;
  color:#444;
  text-transform:uppercase;
}

/* ── CARDS ROW ── */
.cards{
  display:flex;
  gap:28px;
  align-items:stretch;
}

.card{
  position:relative;
  width:clamp(200px,38vw,300px);
  padding:36px 28px 32px;
  background:var(--card);
  border:1px solid #1e1e1e;
  border-radius:4px;
  cursor:pointer;
  text-decoration:none;
  color:#fff;
  overflow:hidden;
  transition:transform .2s, border-color .2s;
  animation: fadeUp .7s ease both;
}
.card:nth-child(1){ animation-delay:.15s; }
.card:nth-child(2){ animation-delay:.3s; }

/* corner accents */
.card::before,.card::after{
  content:'';
  position:absolute;
  width:12px;height:12px;
}
.card::before{ top:8px;left:8px; border-top:2px solid var(--accent); border-left:2px solid var(--accent); }
.card::after{  bottom:8px;right:8px; border-bottom:2px solid var(--accent); border-right:2px solid var(--accent); }

.card:hover{
  transform:translateY(-6px);
  border-color:var(--accent);
}
.card:hover .card-glow{ opacity:1; }
.card:hover .card-icon{ animation:pulse-icon 1.2s ease-in-out infinite; }

/* glow layer */
.card-glow{
  position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 0%, var(--accent-dim) 0%, transparent 70%);
  opacity:0;
  transition:opacity .4s;
  pointer-events:none;
}

/* accent line top */
.card-line{
  position:absolute;
  top:0;left:0;right:0;
  height:2px;
  background:linear-gradient(90deg, transparent, var(--accent), transparent);
  opacity:0;
  transition:opacity .3s;
}
.card:hover .card-line{ opacity:1; }

/* TV card */
.card-tv{
  --accent:     var(--amber);
  --accent-dim: rgba(255,170,0,.08);
}
/* Radio card */
.card-radio{
  --accent:     var(--green);
  --accent-dim: rgba(0,255,136,.08);
}

.card-icon{
  font-size:52px;
  margin-bottom:20px;
  display:block;
  filter:drop-shadow(0 0 10px var(--accent));
}

.card-title{
  font-family:'Orbitron',monospace;
  font-size:22px;
  font-weight:700;
  letter-spacing:3px;
  color:var(--accent);
  margin-bottom:10px;
}

.card-desc{
  font-size:11px;
  color:#555;
  line-height:1.8;
  letter-spacing:1px;
}

.card-cta{
  margin-top:24px;
  display:inline-flex;
  align-items:center;
  gap:8px;
  font-size:11px;
  letter-spacing:3px;
  color:var(--accent);
  opacity:.7;
  transition:opacity .2s, gap .2s;
}
.card:hover .card-cta{ opacity:1; gap:12px; }

/* signal badge */
.card-badge{
  position:absolute;
  top:14px;right:14px;
  font-size:9px;
  letter-spacing:2px;
  color:var(--accent);
  opacity:.5;
  display:flex;
  align-items:center;
  gap:4px;
}
.badge-dot{
  width:5px;height:5px;
  border-radius:50%;
  background:var(--accent);
  animation:blink 1.6s ease-in-out infinite;
}
.card:nth-child(2) .badge-dot{ animation-delay:.8s; }

/* ── FOOTER ── */
.footer{
  position:absolute;
  bottom:20px;
  font-size:9px;
  letter-spacing:3px;
  color:#222;
  text-transform:uppercase;
  animation: fadeUp 1s ease .6s both;
}

/* ── DECORATIVE horizontal rules ── */
.hbar{
  width:clamp(300px,70vw,700px);
  height:1px;
  background:linear-gradient(90deg,transparent,#1e1e1e,transparent);
  margin:24px 0;
  animation:fadeUp .7s ease .05s both;
}

/* ── ANIMATIONS ── */
@keyframes fadeDown{
  from{opacity:0;transform:translateY(-24px)}
  to  {opacity:1;transform:translateY(0)}
}
@keyframes fadeUp{
  from{opacity:0;transform:translateY(20px)}
  to  {opacity:1;transform:translateY(0)}
}
@keyframes blink{
  0%,100%{opacity:.3} 50%{opacity:1}
}
@keyframes pulse-icon{
  0%,100%{filter:drop-shadow(0 0 10px var(--accent))}
  50%    {filter:drop-shadow(0 0 22px var(--accent)) drop-shadow(0 0 6px #fff)}
}

/* ── MOBILE ── */
@media(max-width:540px){
  html,body{overflow-y:auto}
  .cards{flex-direction:column;gap:16px}
  .card{width:100%;max-width:340px}
  .brand-k60::after{font-size:9px;letter-spacing:7px}
  .brand{margin-bottom:32px}
}
</style>
</head>
<body>
<div class="stage">

  <header class="brand">
    <div class="brand-k60">K60</div>
    <div class="brand-tagline">Selecione um serviço para continuar</div>
  </header>

  <div class="hbar"></div>

  <div class="cards">

    <!-- TV -->
    <a href="tv.html" class="card card-tv">
      <div class="card-glow"></div>
      <div class="card-line"></div>
      <div class="card-badge"><div class="badge-dot"></div>AO VIVO</div>
      <span class="card-icon">📺</span>
      <div class="card-title">TV</div>
      <div class="card-desc">Canais ao vivo<br>do mundo todo</div>
      <div class="card-cta">ACESSAR &#8594;</div>
    </a>

    <!-- RÁDIO -->
    <a href="radio.html" class="card card-radio">
      <div class="card-glow"></div>
      <div class="card-line"></div>
      <div class="card-badge"><div class="badge-dot"></div>AO VIVO</div>
      <span class="card-icon">📻</span>
      <div class="card-title">RÁDIO</div>
      <div class="card-desc">Estações de rádio<br>em todos os idiomas</div>
      <div class="card-cta">ACESSAR &#8594;</div>
    </a>

  </div>

  <div class="hbar"></div>

  <footer class="footer">K60 Broadcast &nbsp;·&nbsp; Ao vivo &nbsp;·&nbsp; Mundial</footer>

</div>
</body>
</html>
