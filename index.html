<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>K60 — Controle TV AOC</title>
<style>
    /* --- ESTILOS (mantidos para dar o visual e destacar o foco) --- */
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        user-select: none;
    }
    :root {
        --green: #00ff88;
        --amber: #ffaa00;
        --red: #ff3355;
        --bg: #050505;
        --card: #0a0a0a;
    }
    html, body {
        height: 100%;
        background: var(--bg);
        color: #fff;
        font-family: 'Share Tech Mono', monospace;
        overflow: hidden;
        /* Esconde o cursor do mouse na TV */
        cursor: none;
    }
    /* Scanlines e ruído (efeito visual) */
    body::before {
        content: '';
        position: fixed; inset: 0;
        background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,.18) 2px, rgba(0,0,0,.18) 4px);
        pointer-events: none;
        z-index: 999;
    }
    .stage {
        position: relative;
        height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 0;
        padding: 20px;
    }
    .brand {
        text-align: center;
        margin-bottom: 48px;
    }
    .brand-k60 {
        font-family: 'Orbitron', monospace;
        font-size: clamp(48px, 10vw, 96px);
        font-weight: 900;
        color: var(--green);
        letter-spacing: 8px;
        text-shadow: 0 0 30px rgba(0,255,136,.5);
        position: relative;
    }
    .brand-k60::after {
        content: 'BROADCAST';
        position: absolute;
        bottom: -16px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 11px;
        letter-spacing: 10px;
        color: #333;
    }
    .cards {
        display: flex;
        gap: 28px;
        align-items: stretch;
        flex-wrap: wrap;
        justify-content: center;
    }
    .card {
        position: relative;
        width: clamp(200px, 38vw, 300px);
        padding: 36px 28px 32px;
        background: var(--card);
        border: 2px solid #1e1e1e;
        border-radius: 4px;
        text-decoration: none;
        color: #fff;
        transition: all 0.1s ease;
        text-align: center;
        cursor: pointer;
        outline: none;
    }
    /* ESTILO DE FOCO FORTE PARA A TV */
    .card:focus-visible, .card:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(0,0,0,0.5), 0 0 0 6px var(--accent), 0 0 20px var(--accent);
        transform: scale(1.02);
        background: #111;
        outline: none;
    }
    /* Cores individuais */
    .card-tv    { --accent: #ffaa00; }
    .card-radio { --accent: #00ff88; }
    .card-filmes{ --accent: #ff44cc; }
    .card-icon { font-size: 52px; margin-bottom: 20px; filter: drop-shadow(0 0 8px var(--accent)); }
    .card-title { font-family: 'Orbitron'; font-size: 22px; font-weight: 700; letter-spacing: 3px; color: var(--accent); margin-bottom: 10px; }
    .card-desc { font-size: 11px; color: #aaa; line-height: 1.6; }
    .card-cta { margin-top: 24px; font-size: 11px; letter-spacing: 3px; color: var(--accent); opacity: .7; }
    .card:focus .card-cta { opacity: 1; }
    .card-badge {
        position: absolute;
        top: 14px; right: 14px;
        font-size: 9px;
        color: var(--accent);
        display: flex;
        align-items: center;
        gap: 4px;
    }
    .badge-dot {
        width: 5px; height: 5px;
        border-radius: 50%;
        background: var(--accent);
        animation: blink 1.6s infinite;
    }
    .hbar {
        width: clamp(300px, 70vw, 700px);
        height: 1px;
        background: linear-gradient(90deg, transparent, #1e1e1e, transparent);
        margin: 24px 0;
    }
    .footer {
        position: absolute;
        bottom: 20px;
        font-size: 9px;
        letter-spacing: 3px;
        color: #222;
    }
    @keyframes blink {
        0%,100% { opacity: .3; }
        50% { opacity: 1; }
    }
    .help-text {
        position: fixed;
        bottom: 55px;
        left: 0;
        right: 0;
        text-align: center;
        font-size: 12px;
        color: #88ffcc;
        background: rgba(0,0,0,0.7);
        padding: 8px;
        font-family: monospace;
        z-index: 10000;
    }
    @media (max-width: 540px) {
        .cards { flex-direction: column; align-items: center; }
        .card { width: 90%; }
    }
</style>
</head>
<body>

<div class="stage">
    <header class="brand">
        <div class="brand-k60">K60</div>
        <div class="brand-tagline">Selecione um serviço</div>
    </header>
    <div class="hbar"></div>
    <div class="cards">
        <a href="#" class="card card-tv" data-url="tv.html">
            <div class="card-badge"><div class="badge-dot"></div>AO VIVO</div>
            <span class="card-icon">📺</span>
            <div class="card-title">TV</div>
            <div class="card-desc">Canais ao vivo</div>
            <div class="card-cta">SELECIONAR →</div>
        </a>
        <a href="#" class="card card-radio" data-url="radio.html">
            <div class="card-badge"><div class="badge-dot"></div>AO VIVO</div>
            <span class="card-icon">📻</span>
            <div class="card-title">RÁDIO</div>
            <div class="card-desc">Estações de rádio</div>
            <div class="card-cta">SELECIONAR →</div>
        </a>
        <a href="#" class="card card-filmes" data-url="filmes.html">
            <div class="card-badge"><div class="badge-dot"></div>LANÇAMENTOS</div>
            <span class="card-icon">🎬</span>
            <div class="card-title">FILMES</div>
            <div class="card-desc">Cinema em casa</div>
            <div class="card-cta">SELECIONAR →</div>
        </a>
    </div>
    <div class="hbar"></div>
    <footer class="footer">K60 Broadcast · Use as SETAS do controle para mudar · OK para selecionar</footer>
</div>
<div class="help-text" id="help-text">
    🎮 SETAS: ESQUERDA / DIREITA → Navegar │ OK → Selecionar
</div>

<script>
    // --- CÓDIGO DE NAVEGAÇÃO OTIMIZADO PARA TV AOC ---
    (function() {
        // 1. Lista dos cards
        const cards = Array.from(document.querySelectorAll('.card'));
        let currentIndex = 0;

        // 2. Função para atualizar o foco
        function setFocus(index) {
            if (index < 0) index = cards.length - 1;
            if (index >= cards.length) index = 0;
            currentIndex = index;
            cards[currentIndex].focus();
        }

        // 3. Inicia com o foco no primeiro card (TV)
        setFocus(0);

        // 4. Lida com o clique (OK no controle ou Enter no teclado)
        function confirmSelection() {
            const selectedCard = cards[currentIndex];
            if (selectedCard && selectedCard.getAttribute('data-url')) {
                window.location.href = selectedCard.getAttribute('data-url');
            } else {
                alert("Ação ainda não configurada!");
            }
        }

        // 5. A MAGIA ESTÁ AQUI: escutamos os códigos que a TV AOC pode enviar.
        window.addEventListener('keydown', function(event) {
            // Obtém o código da tecla pressionada. Este é o método mais abrangente.
            const keyPressed = event.keyCode || event.which || event.key;
            
            // Mapeamos os códigos mais comuns para as teclas de seta e OK.
            // keyCode 37 = Esquerda | 39 = Direita | 13 = Enter / OK
            if (keyPressed === 37) { // Seta Esquerda
                event.preventDefault();
                setFocus(currentIndex - 1);
            } 
            else if (keyPressed === 39) { // Seta Direita
                event.preventDefault();
                setFocus(currentIndex + 1);
            }
            else if (keyPressed === 13) { // OK / Enter
                event.preventDefault();
                confirmSelection();
            }
            
            // Fallback para navegadores modernos (caso seja uma TV mais nova)
            else if (event.key === 'ArrowLeft') {
                event.preventDefault();
                setFocus(currentIndex - 1);
            }
            else if (event.key === 'ArrowRight') {
                event.preventDefault();
                setFocus(currentIndex + 1);
            }
            else if (event.key === 'Enter' || event.key === ' ') {
                event.preventDefault();
                confirmSelection();
            }
        });
        
        // Previne o scroll da página com a barra de espaços
        window.addEventListener('keyup', function(e) {
            if (e.key === ' ' || e.key === 'Space' || e.key === 'Enter') {
                e.preventDefault();
            }
        });

        // Atualiza o índice se o foco mudar (ex: por clique do mouse)
        cards.forEach((card, idx) => {
            card.addEventListener('focus', () => {
                currentIndex = idx;
            });
        });
    })();
</script>
</body>
</html>
