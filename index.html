<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>IPTV K10 TV</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;width:100%;overflow:hidden}
body{background:#07090f;color:#e2e8f0;font-family:Arial,sans-serif;position:fixed;inset:0}
.scr{display:none;position:fixed;inset:0}
.scr.on{display:flex}
#s-menu{background:#07090f}
.m-side{width:300px;background:#0b0f1c;border-right:1px solid #1a2540;overflow-y:auto;display:flex;flex-direction:column;flex-shrink:0}
.m-logo{padding:20px 18px 12px;border-bottom:1px solid #1a2540}
.m-logo h1{font-size:24px;color:#38bdf8;font-weight:700}
.m-logo p{font-size:11px;color:#475569;margin-top:3px}
.m-grp{font-size:10px;color:#334155;font-weight:700;letter-spacing:2px;padding:12px 18px 4px;text-transform:uppercase}
.m-item{display:flex;align-items:center;gap:10px;padding:11px 18px;cursor:pointer;border-left:3px solid transparent;user-select:none}
.m-item:hover,.m-item.foc{background:#111e38;border-left-color:#38bdf8}
.m-ico{font-size:19px;width:26px;text-align:center;flex-shrink:0}
.m-lbl{font-size:14px;font-weight:600;color:#cbd5e1}
.m-sub{font-size:11px;color:#475569;margin-top:1px}
.m-hint{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px}
.m-hint .big{font-size:72px}
.m-hint .t1{font-size:18px;color:#1e293b}
.m-hint .t2{font-size:12px;color:#0f172a}
#s-channels{flex-direction:column;background:#07090f}
.c-head{display:flex;align-items:center;gap:12px;padding:12px 20px;background:#0b0f1c;border-bottom:1px solid #1a2540;flex-shrink:0}
#c-back{background:#111e38;border:2px solid #38bdf8;color:#38bdf8;font-size:16px;padding:6px 14px;border-radius:7px;cursor:pointer;flex-shrink:0}
#c-back.foc,#c-back:hover{background:#38bdf8;color:#07090f;outline:none}
#c-title{font-size:20px;font-weight:700;color:#f1f5f9}
#c-cnt{font-size:12px;color:#475569;margin-left:auto}
.c-body{flex:1;overflow:hidden;position:relative}
#c-load,#c-err{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px}
#c-load{display:flex}
#c-err{display:none}
.spin{width:44px;height:44px;border:4px solid #1a2540;border-top-color:#38bdf8;border-radius:50%;animation:sp .8s linear infinite}
.ltxt{font-size:16px;color:#475569}
.etxt{font-size:14px;color:#f87171;text-align:center;max-width:360px;padding:0 20px;line-height:1.5}
#c-retry{background:#111e38;border:2px solid #38bdf8;color:#38bdf8;font-size:15px;padding:10px 24px;border-radius:8px;cursor:pointer}
#c-retry.foc,#c-retry:hover{background:#38bdf8;color:#07090f}
#c-list{position:absolute;inset:0;overflow-y:auto;padding:8px;display:none}
.ch{display:flex;align-items:center;gap:8px;padding:9px 12px;border-radius:7px;cursor:pointer;margin-bottom:3px;border:2px solid transparent}
.ch:hover,.ch.foc{background:#111e38;border-color:#38bdf8}
.ch-fl{font-size:22px;width:36px;text-align:center;flex-shrink:0}
.ch-lg{width:42px;height:26px;object-fit:contain;background:#1e293b;border-radius:3px;flex-shrink:0}
.ch-info{flex:1;min-width:0}
.ch-nm{font-size:14px;font-weight:600;color:#e2e8f0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ch-details{display:flex;gap:8px;margin-top:2px;flex-wrap:wrap}
.ch-lang{font-size:9px;padding:2px 6px;border-radius:10px;background:#1a2540;color:#94a3b8}
.ch-cat{font-size:9px;color:#475569}
.ch-country{font-size:9px;color:#10b981}
.ch-actions{display:flex;gap:6px;flex-shrink:0}
.ch-fav{background:none;border:none;font-size:18px;cursor:pointer;padding:4px;color:#64748b;transition:all 0.2s}
.ch-fav:hover{color:#f59e0b;transform:scale(1.1)}
.ch-fav.active{color:#f59e0b;text-shadow:0 0 4px #f59e0b}
.ch-delete{background:none;border:none;font-size:16px;cursor:pointer;padding:4px;color:#64748b;transition:all 0.2s}
.ch-delete:hover{color:#ef4444;transform:scale(1.1)}
.ch-favorito{background:#1a2a1a;border-color:#f59e0b}
#s-player{background:#000;position:relative}
#vid{width:100%;height:100%;object-fit:contain}
.p-ov{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:space-between;transition:opacity .4s}
.p-ov.hide{opacity:0;pointer-events:none}
.p-top{background:linear-gradient(#000b,transparent);padding:16px 24px}
.p-top h2{font-size:24px;color:#fff;text-shadow:0 2px 6px #000}
.p-top p{font-size:12px;color:#94a3b8;margin-top:2px}
.p-bot{background:linear-gradient(transparent,#000b);padding:14px 24px;display:flex;justify-content:space-between;align-items:flex-end}
.p-st{font-size:12px;color:#64748b}
#p-back{background:#111e38;border:2px solid #38bdf8;color:#38bdf8;font-size:14px;padding:8px 18px;border-radius:7px;cursor:pointer}
#p-back.foc,#p-back:hover{background:#38bdf8;color:#000}
.verify-status{position:fixed;bottom:10px;right:10px;background:#111e38;padding:5px 12px;border-radius:20px;font-size:10px;color:#38bdf8;z-index:100}
#verify-progress{position:fixed;bottom:50px;right:10px;background:#0b0f1c;padding:8px 15px;border-radius:20px;font-size:11px;color:#10b981;z-index:100;display:none;border:1px solid #38bdf8;max-width:300px;text-align:center}

/* Indicador de Telemetria */
.telemetry-indicator {
  position: fixed;
  bottom: 15px;
  left: 15px;
  background: #0a2a1a;
  border-radius: 20px;
  padding: 5px 12px;
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 10px;
  z-index: 1000;
  border: 1px solid #10b981;
}
.telemetry-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #10b981;
  animation: pulse 1.5s infinite;
}
.telemetry-text {
  color: #4ade80;
  font-weight: 600;
}
.mode-badge {
  position: fixed;
  bottom: 15px;
  right: 15px;
  background: #1a2540;
  border-radius: 20px;
  padding: 5px 12px;
  font-size: 10px;
  z-index: 1000;
  border: 1px solid #38bdf8;
  color: #38bdf8;
  font-weight: 600;
}
@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(0.8); }
}
@keyframes sp{to{transform:rotate(360deg)}}

/* ====== SUPORTE A MOUSE / TOUCH PARA TV ====== */
.m-item,.ch,.ch-fav,.ch-delete,#c-back,#c-retry,#p-back,button{cursor:pointer}
#c-list{scroll-behavior:smooth}
#c-list::-webkit-scrollbar{width:8px}
#c-list::-webkit-scrollbar-track{background:#0b0f1c}
#c-list::-webkit-scrollbar-thumb{background:#38bdf8;border-radius:4px}
#c-list::-webkit-scrollbar-thumb:hover{background:#7dd3fc}
.m-side::-webkit-scrollbar{width:6px}
.m-side::-webkit-scrollbar-track{background:#07090f}
.m-side::-webkit-scrollbar-thumb{background:#1a2540;border-radius:3px}
body.cursor-off,body.cursor-off *{cursor:none!important}
.scroll-zone{position:absolute;left:0;right:0;height:70px;z-index:10;pointer-events:none;opacity:0;transition:opacity .3s}
.scroll-zone.top{top:0;background:linear-gradient(#0b0f1c,transparent)}
.scroll-zone.bot{bottom:0;background:linear-gradient(transparent,#0b0f1c)}
.scroll-zone.active{opacity:1;pointer-events:auto}
.ch{transition:transform .1s}
.ch:hover{transform:scale(1.005)}
</style>
</head>
<body>

<div id="s-menu" class="scr on">
  <div class="m-side" id="m-side">

  <div class="p-ov" id="p-ov">

</div>

<div id="verify-progress"></div>

<!-- Indicadores -->

<script>
// HLS.js carregado sob demanda (lazy) como no original CENTRAL.html
var hlsLoaded=false;
// ============================================================
// IPTV K10 TV - COMPLETO COM CLICK FUNCIONANDO
// ✅ Idiomas dos canais
// ✅ Favoritos (★)
// ✅ Excluir canal (🗑️)
// ✅ Verificação com proxy CORS
// ✅ Telemetria ativa
// ✅ Clique funcionando (CORRIGIDO)
// ============================================================

// tela cheia na primeira interação
function fs(){var e=document.documentElement,f=e.requestFullscreen||e.webkitRequestFullscreen||e.mozRequestFullScreen||e.msRequestFullscreen;try{if(f)f.call(e)}catch(x){}}
document.addEventListener('keydown',fs,{once:true});
document.addEventListener('click',fs,{once:true});

// ============================================================
// DETECÇÃO DE DISPOSITIVO
// ============================================================
function isTV() {
  var ua = navigator.userAgent.toLowerCase();
  return ua.includes('tv') || ua.includes('smarttv') || ua.includes('webos') || 
         ua.includes('tizen') || ua.includes('vidaa') || ua.includes('android.tv');
}

var modoTV = isTV();

var modeBadge = document.getElementById('modeBadge');
if (modoTV) {
  modeBadge.innerHTML = '📺 Modo TV (leve)';
} else {
  modeBadge.innerHTML = '💻 Modo Computador (rápido)';
}

// ============================================================
// PROXIES CORS
// ============================================================
var CORS_PROXIES = [
  function(u){return 'https://corsproxy.io/?url='+encodeURIComponent(u)},
  function(u){return 'https://api.allorigins.win/raw?url='+encodeURIComponent(u)},
  function(u){return 'https://thingproxy.freeboard.io/fetch/'+u}
];

// ============================================================
// CONFIGURAÇÃO ORIGINAL
// ============================================================
var API=['https://iptv-org.github.io/api','https://cdn.jsdelivr.net/gh/iptv-org/api@gh-pages','https://raw.githubusercontent.com/iptv-org/api/gh-pages'];
var FL={BR:'🇧🇷',US:'🇺🇸',GB:'🇬🇧',FR:'🇫🇷',DE:'🇩🇪',ES:'🇪🇸',IT:'🇮🇹',PT:'🇵🇹',AR:'🇦🇷',MX:'🇲🇽',JP:'🇯🇵',KR:'🇰🇷',RU:'🇷🇺',IN:'🇮🇳',CN:'🇨🇳',AU:'🇦🇺',CA:'🇨🇦',NL:'🇳🇱',TR:'🇹🇷',SA:'🇸🇦',AE:'🇦🇪',PL:'🇵🇱'};

// Mapeamento de idiomas para emoji
var LANG_EMOJI = {
  'português':'🇵🇹', 'portuguese':'🇵🇹', 'pt':'🇵🇹',
  'inglês':'🇬🇧', 'english':'🇬🇧', 'en':'🇬🇧',
  'espanhol':'🇪🇸', 'spanish':'🇪🇸', 'es':'🇪🇸',
  'francês':'🇫🇷', 'french':'🇫🇷', 'fr':'🇫🇷',
  'alemão':'🇩🇪', 'german':'🇩🇪', 'de':'🇩🇪',
  'italiano':'🇮🇹', 'italian':'🇮🇹', 'it':'🇮🇹',
  'russo':'🇷🇺', 'russian':'🇷🇺', 'ru':'🇷🇺',
  'japonês':'🇯🇵', 'japanese':'🇯🇵', 'ja':'🇯🇵',
  'chinês':'🇨🇳', 'chinese':'🇨🇳', 'zh':'🇨🇳',
  'árabe':'🇸🇦', 'arabic':'🇸🇦', 'ar':'🇸🇦',
  'hindi':'🇮🇳', 'hindi':'🇮🇳', 'hi':'🇮🇳'
};

function getIdiomaEmoji(lang) {
  if (!lang) return '🌐';
  var lower = lang.toLowerCase();
  for (var key in LANG_EMOJI) {
    if (lower.includes(key)) return LANG_EMOJI[key];
  }
  return '🌐';
}

// Categorias originais
var CATS=[
  {G:'🌍 ACESSO GERAL'},
  {id:'mundial',e:'📺',n:'IPTV Mundial',s:'+10k canais · todos os países',t:'api',c:null},
  {id:'freetv',e:'📡',n:'Free-TV',s:'Verificados & Estáveis',t:'m3u',u:['https://raw.githubusercontent.com/Free-TV/IPTV/master/playlist.m3u8','https://raw.githubusercontent.com/Free-TV/IPTV/master/playlist.m3u']},
  {id:'fluxus',e:'🔄',n:'Fluxustv',s:'Atualizada Diariamente',t:'m3u',u:['https://iptv-org.github.io/iptv/index.m3u','https://raw.githubusercontent.com/iptv-org/iptv/gh-pages/index.m3u']},
  {G:'🇧🇷 BRASIL'},
  {id:'brasil',e:'🇧🇷',n:'IPTV Brasil',s:'Canais abertos brasileiros',t:'m3u',u:['https://iptv-org.github.io/iptv/countries/br.m3u','https://raw.githubusercontent.com/rjpontes/iptv-brasil/main/lista.m3u','https://raw.githubusercontent.com/Greasy-Canteen/iptv-brasil/main/brasil.m3u']},
  {G:'📰 INFORMAÇÃO'},
  {id:'noti',e:'📰',n:'Notícias',s:'Jornalismo ao vivo',t:'api',c:['news']},
  {id:'nego',e:'💼',n:'Negócios & Clima',s:'Business · economia · clima',t:'api',c:['business','weather']},
  {id:'docs',e:'🎥',n:'Documentários',s:'Documentários do mundo',t:'api',c:['documentary']},
  {G:'🎭 ENTRETENIMENTO'},
  {id:'entr',e:'🎭',n:'Entretenimento',s:'Entretenimento · comédia · geral',t:'api',c:['entertainment','comedy','general']},
  {id:'esp',e:'⚽',n:'Esportes',s:'Futebol · basquete · tênis',t:'api',c:['sports']},
  {id:'mus',e:'🎵',n:'Música',s:'Canais de música ao vivo',t:'api',c:['music']},
  {id:'fil',e:'🎬',n:'Filmes & Séries',s:'Filmes · séries · animação',t:'api',c:['movies','series','animation','classic']},
  {id:'kids',e:'🧸',n:'Kids & Família',s:'Infantil · família · animação',t:'api',c:['kids','family','animation']},
  {G:'🌿 ESTILO DE VIDA'},
  {id:'edu',e:'🎓',n:'Educação & Cultura',s:'Educação · cultura · ciência',t:'api',c:['education','culture','science']},
  {id:'life',e:'🌿',n:'Lifestyle',s:'Culinária · viagem · lifestyle',t:'api',c:['cooking','travel','lifestyle','outdoor']},
  {id:'rel',e:'⛪',n:'Religioso',s:'Canais religiosos do mundo',t:'api',c:['religious']},
  {id:'auto',e:'🚗',n:'Auto & Variedades',s:'Auto · compras · legislativo',t:'api',c:['auto','shop','legislative']}
];

// ============================================================
// ESTADO GLOBAL
// ============================================================
var SCR='menu',mItems=[],mIdx=0,cItems=[],cIdx=0;
var channels=[],currentChannelsList=[],retryFn=null,hls=null,ovTmr=null,failTmr=null,playing=false,apiCache=null;
var currentCategory=null;

// LocalStorage
var STORAGE_CANAL_STATUS = 'iptv_k10_status_v6';
var STORAGE_FAVORITOS = 'iptv_k10_favoritos_v6';
var STORAGE_EXCLUIDOS = 'iptv_k10_excluidos_v6';

function loadFavoritos() {
  try { var s = localStorage.getItem(STORAGE_FAVORITOS); return s ? JSON.parse(s) : {}; } catch(e) { return {}; }
}
function loadExcluidos() {
  try { var s = localStorage.getItem(STORAGE_EXCLUIDOS); return s ? JSON.parse(s) : {}; } catch(e) { return {}; }
}
function loadCanalStatus() {
  try { var s = localStorage.getItem(STORAGE_CANAL_STATUS); return s ? JSON.parse(s) : {}; } catch(e) { return {}; }
}

var favoritos = loadFavoritos();
var excluidos = loadExcluidos();
var canalStatus = loadCanalStatus();

function saveFavoritos() { localStorage.setItem(STORAGE_FAVORITOS, JSON.stringify(favoritos)); }
function saveExcluidos() { localStorage.setItem(STORAGE_EXCLUIDOS, JSON.stringify(excluidos)); }
function saveCanalStatus() { localStorage.setItem(STORAGE_CANAL_STATUS, JSON.stringify(canalStatus)); }

function toggleFavorito(channelId, event) {
  event.stopPropagation();
  if (favoritos[channelId]) {
    delete favoritos[channelId];
  } else {
    favoritos[channelId] = true;
  }
  saveFavoritos();
  carregarCanaisFiltrados();
}

function excluirCanal(channelId, event) {
  event.stopPropagation();
  if (confirm('❌ Tem certeza que deseja excluir este canal permanentemente?')) {
    excluidos[channelId] = true;
    saveExcluidos();
    carregarCanaisFiltrados();
    document.getElementById('verifyStatus').innerHTML = '🗑️ Canal excluído';
    setTimeout(function() { document.getElementById('verifyStatus').innerHTML = '✅ Pronto'; }, 2000);
  }
}


// ============================================================
// TELEMETRIA POR CANAL (verifica apenas o canal aberto)
// ============================================================
var currentPlayingChannel = null;
var channelStartTime = 0;

function registrarTelemetria(ch, status) {
  if (!ch || !ch.id || !currentCategory) return;
  if (!canalStatus[currentCategory]) canalStatus[currentCategory] = {};
  
  var duracao = channelStartTime ? Math.round((Date.now() - channelStartTime) / 1000) : 0;
  canalStatus[currentCategory][ch.id] = {
    status: status,
    lastCheck: Date.now(),
    name: ch.name,
    duracao: duracao
  };
  saveCanalStatus();
  
  // Atualizar indicador de telemetria
  var telDiv = document.getElementById('telemetryIndicator');
  var statusDiv = document.getElementById('verifyStatus');
  if (status === 'bom') {
    telDiv.querySelector('.telemetry-text').textContent = '📡 ' + (ch.name || '').substring(0, 20) + ' ✅';
    statusDiv.innerHTML = '✅ ' + ch.name.substring(0, 25) + ' · Online';
  } else {
    telDiv.querySelector('.telemetry-text').textContent = '📡 ' + (ch.name || '').substring(0, 20) + ' ❌';
    statusDiv.innerHTML = '❌ ' + ch.name.substring(0, 25) + ' · Offline';
    setTimeout(function() { statusDiv.innerHTML = '✅ Pronto'; }, 4000);
  }
  
  console.log('📊 Telemetria:', ch.name, '→', status, duracao ? '(' + duracao + 's)' : '');
}

// ============================================================
// VERIFICAÇÃO DE QUALIDADE (vídeo + áudio)
// Roda ~4s depois do canal começar a tocar
// - Vídeo movendo → ✅ canal normal
// - Imagem estática + áudio → 🎵 rádio/música (bom)
// - Imagem estática + sem áudio → ❌ canal morto (ruim)
// ============================================================
var qualityTimer1 = null, qualityTimer2 = null;

function cancelarVerificacao() {
  if (qualityTimer1) { clearTimeout(qualityTimer1); qualityTimer1 = null; }
  if (qualityTimer2) { clearTimeout(qualityTimer2); qualityTimer2 = null; }
}

function verificarQualidade(ch, vid) {
  cancelarVerificacao();
  
  // Espera 4s pra stream estabilizar, captura frame 1
  qualityTimer1 = setTimeout(function() {
    if (!playing) return;
    
    var w = 64, h = 36; // resolução pequena = rápido
    var frame1 = null;
    var audioBytes1 = vid.webkitAudioDecodedByteCount || 0;
    
    // Captura frame 1
    try {
      var c = document.createElement('canvas');
      c.width = w; c.height = h;
      var ctx = c.getContext('2d');
      ctx.drawImage(vid, 0, 0, w, h);
      frame1 = ctx.getImageData(0, 0, w, h).data;
    } catch(e) { frame1 = null; /* CORS bloqueou canvas */ }
    
    // Espera 3s, captura frame 2 e compara
    qualityTimer2 = setTimeout(function() {
      if (!playing) return;
      
      // === VERIFICAR ÁUDIO ===
      var audioBytes2 = vid.webkitAudioDecodedByteCount || 0;
      var temAudio;
      
      if (typeof vid.webkitAudioDecodedByteCount !== 'undefined') {
        // Chrome: bytes de áudio decodificados aumentando = tem áudio
        temAudio = (audioBytes2 - audioBytes1) > 100;
      } else if (typeof vid.mozHasAudio !== 'undefined') {
        // Firefox
        temAudio = vid.mozHasAudio;
      } else {
        // Não consegue detectar → benefício da dúvida
        temAudio = true;
      }
      
      // === VERIFICAR VÍDEO (frames mudando) ===
      var videoMovendo = true; // padrão: assume que move
      
      if (frame1) {
        try {
          var c = document.createElement('canvas');
          c.width = w; c.height = h;
          var ctx = c.getContext('2d');
          ctx.drawImage(vid, 0, 0, w, h);
          var frame2 = ctx.getImageData(0, 0, w, h).data;
          
          var diffPixels = 0;
          for (var i = 0; i < frame1.length; i += 4) {
            var d = Math.abs(frame1[i] - frame2[i]) + 
                    Math.abs(frame1[i+1] - frame2[i+1]) + 
                    Math.abs(frame1[i+2] - frame2[i+2]);
            if (d > 30) diffPixels++;
          }
          var pct = (diffPixels / (w * h)) * 100;
          videoMovendo = pct > 0.5;
          
          console.log('📊 Frames:', pct.toFixed(1) + '% mudança →', videoMovendo ? 'ATIVO' : 'ESTÁTICO');
        } catch(e) { 
          videoMovendo = true; // CORS na 2ª captura, assume ok
        }
      } else {
        console.log('📊 Canvas CORS, verificação visual indisponível');
      }
      
      console.log('📊 Áudio:', temAudio ? 'SIM' : 'NÃO');
      
      // === DECISÃO ===
      var statusEl = document.getElementById('p-st');
      
      if (videoMovendo) {
        statusEl.textContent = '▶ Ao vivo';
        // Já está marcado como 'bom', nada a fazer
        
      } else if (temAudio) {
        // Imagem estática MAS tem áudio = canal de rádio/música
        statusEl.textContent = '🎵 Rádio / Só áudio';
        console.log('📊', ch.name, '→ Rádio/música (estático + áudio)');
        // Continua como 'bom', não remove da lista
        
      } else {
        // Estático + sem áudio = canal morto
        statusEl.textContent = '❌ Sem vídeo e sem áudio';
        console.log('📊', ch.name, '→ Canal morto');
        registrarTelemetria(ch, 'ruim');
        currentPlayingChannel = null;
        setTimeout(function() { stopHls(); showScr('channels'); }, 2500);
      }
    }, 3000);
  }, 4000);
}

function carregarCanaisFiltrados() {
  if (!currentCategory) return;
  var catStatus = canalStatus[currentCategory] || {};
  
  var canaisFiltrados = channels.filter(function(ch) {
    if (excluidos[ch.id]) return false;
    var status = catStatus[ch.id];
    if (status && status.status === 'ruim') return false;
    return true;
  });
  
  canaisFiltrados.sort(function(a, b) {
    var aFav = favoritos[a.id] ? 1 : 0;
    var bFav = favoritos[b.id] ? 1 : 0;
    if (aFav !== bFav) return bFav - aFav;
    return (a.name || '').localeCompare(b.name || '');
  });
  
  currentChannelsList = canaisFiltrados;
  renderList(canaisFiltrados);
}

// FUNÇÕES DE REDE (ORIGINAIS)
// ============================================================
function get(url,cb){
  var x=new XMLHttpRequest();
  x.open('GET',url);x.timeout=16000;
  x.onreadystatechange=function(){if(x.readyState!==4)return;x.status>=200&&x.status<300?cb(null,x.responseText):cb('HTTP '+x.status)};
  x.ontimeout=function(){cb('timeout')};
  x.onerror=function(){cb('erro')};
  try{x.send()}catch(e){cb(e.message)}
}
function getJSON(url,cb){get(url,function(e,t){if(e)return cb(e);try{cb(null,JSON.parse(t))}catch(x){cb('JSON inválido')}})}

function getApi(cb){
  if(apiCache)return cb(null,apiCache);
  var si=0;
  (function next(){
    if(si>=API.length)return cb('Todos os servidores falharam');
    var base=API[si++],done=0,chs,strs,err;
    function check(){if(++done<2)return;if(err)return next();apiCache={chs:chs,strs:strs};cb(null,apiCache)}
    getJSON(base+'/channels.json',function(e,d){if(e){err=e;check()}else{chs=d;check()}});
    getJSON(base+'/streams.json',function(e,d){if(e){err=e;check()}else{strs=d;check()}});
  })();
}

function getM3u(urls,cb){
  var tries=[];
  for(var i=0;i<urls.length;i++){tries.push(urls[i]);for(var j=0;j<CORS_PROXIES.length;j++)tries.push(CORS_PROXIES[j](urls[i]))}
  var ti=0;
  (function next(){
    if(ti>=tries.length)return cb('Todas as fontes falharam');
    get(tries[ti++],function(e,t){(!e&&t&&(t.indexOf('#EXTM3U')!==-1||t.indexOf('#EXTINF')!==-1))?cb(null,t):next()});
  })();
}

function parseM3u(txt){
  var lines=txt.split('\n'),out=[],cur=null;
  for(var i=0;i<lines.length&&out.length<1500;i++){
    var l=lines[i].trim();
    if(l.indexOf('#EXTINF:')===0){
      var nm=l.match(/,(.+)$/),lg=l.match(/tvg-logo="([^"]+)"/),co=l.match(/tvg-country="([^"]+)"/),gr=l.match(/group-title="([^"]+)"/),c=co?co[1].split(';')[0].toUpperCase():'';
      cur={name:nm?nm[1].trim():'Canal',logo:lg?lg[1]:'',country:c,flag:FL[c]||'🌐',cat:gr?gr[1]:''};
    }else if(l&&l.indexOf('#')!==0&&cur){cur.url=l;out.push(cur);cur=null}
  }
  return out;
}

function buildApi(data,cats){
  var sm={};
  for(var i=0;i<data.strs.length;i++)if(!sm[data.strs[i].channel])sm[data.strs[i].channel]=data.strs[i].url;
  var out=[];
  for(var j=0;j<data.chs.length&&out.length<2000;j++){
    var ch=data.chs[j];if(!sm[ch.id])continue;
    if(cats){var ok=false;for(var k=0;k<(ch.categories||[]).length;k++)if(cats.indexOf(ch.categories[k])!==-1){ok=true;break}if(!ok)continue}
    var co=(ch.country||'').toUpperCase();
    var language = (ch.languages && ch.languages[0]) || '';
    var langDisplay = language ? getIdiomaEmoji(language) + ' ' + language : '🌐';
    out.push({id:ch.id, name:ch.name, logo:ch.logo||'', country:co, flag:FL[co]||'🌐', cat:(ch.categories||[]).join(', '), url:sm[ch.id], language:language, langDisplay:langDisplay});
  }
  return out;
}

function loadCat(cat){
  currentCategory = cat.id;
  showScr('channels');
  document.getElementById('c-title').textContent=cat.e+' '+cat.n;
  document.getElementById('c-cnt').textContent='';
  setState('load','Carregando canais...');
  retryFn=function(){loadCat(cat)};
  
  if(cat.t==='m3u'){
    getM3u(cat.u,function(e,txt){
      if(e)return setState('err','Falha M3U.\n'+e);
      var chs=parseM3u(txt);
      if(!chs.length)return setState('err','Nenhum canal encontrado.');
      channels=chs;
      carregarCanaisFiltrados();
    });
  }else{
    getApi(function(e,data){
      if(e)return setState('err','Falha na API.\n'+e);
      var chs=buildApi(data,cat.c);
      if(!chs.length)return setState('err','Nenhum canal nesta categoria.');
      channels=chs;
      carregarCanaisFiltrados();
    });
  }
}

// CARREGAMENTO PROGRESSIVO (10 canais por vez)
// ============================================================
var BATCH_SIZE = 10;
var renderAllChannels = [];   // lista completa atual
var renderOffset = 0;         // quantos já foram renderizados
var batchSentinel = null;     // div sentinela para IntersectionObserver
var batchObserver = null;     // IntersectionObserver

function criarElementoCanal(ch, i) {
  var isFav = favoritos[ch.id];
  var el = document.createElement('div');
  el.className = 'ch' + (isFav ? ' ch-favorito' : '');
  el.setAttribute('data-idx', i);

  var logoHtml = ch.logo
    ? '<img class="ch-lg" src="'+esc(ch.logo)+'" onerror="this.style.display=\'none\'" alt="">'
    : '<span class="ch-fl">'+ch.flag+'</span>';
  var langHtml    = '<span class="ch-lang">'+(ch.langDisplay || '🌐')+'</span>';
  var countryHtml = '<span class="ch-country">'+ch.flag+' '+(ch.country || 'Mundo')+'</span>';
  var catHtml     = ch.cat ? '<span class="ch-cat">'+esc(ch.cat.split(',')[0])+'</span>' : '';

  el.innerHTML = logoHtml +
    '<div class="ch-info">'+
      '<div class="ch-nm">'+esc(ch.name)+'</div>'+
      '<div class="ch-details">'+langHtml+countryHtml+catHtml+'</div>'+
    '</div>'+
    '<div class="ch-actions">'+
      '<button class="ch-fav'+(isFav?' active':'')+'" data-id="'+ch.id+'">'+(isFav?'★':'☆')+'</button>'+
      '<button class="ch-delete" data-id="'+ch.id+'">🗑️</button>'+
    '</div>';

  (function(idx, item, channelId){
    el.addEventListener('click', function(e){
      if(e.target.classList && (e.target.classList.contains('ch-fav') || e.target.classList.contains('ch-delete'))) return;
      play(idx);
    });
    el.querySelector('.ch-fav').addEventListener('click', function(e){ toggleFavorito(channelId, e); });
    el.querySelector('.ch-delete').addEventListener('click', function(e){ excluirCanal(channelId, e); });
    el.addEventListener('mouseover', function(){
      var pos = cItems.indexOf(item);
      if(pos >= 0) cIdx = pos;
      setFoc(item);
    });
  })(i, el, ch.id);

  return el;
}

function removerSentinela() {
  if(batchObserver){ batchObserver.disconnect(); batchObserver = null; }
  if(batchSentinel && batchSentinel.parentNode){ batchSentinel.parentNode.removeChild(batchSentinel); }
  batchSentinel = null;
}

function adicionarSentinela(list) {
  removerSentinela();
  if(renderOffset >= renderAllChannels.length) return; // tudo renderizado

  batchSentinel = document.createElement('div');
  batchSentinel.style.cssText = 'height:40px;display:flex;align-items:center;justify-content:center;color:#334155;font-size:12px;';
  batchSentinel.textContent = '⏳ Carregando mais canais...';
  list.appendChild(batchSentinel);

  if(typeof IntersectionObserver !== 'undefined'){
    batchObserver = new IntersectionObserver(function(entries){
      if(entries[0].isIntersecting) renderProximoLote();
    }, { root: list, threshold: 0.1 });
    batchObserver.observe(batchSentinel);
  }
}

function renderProximoLote() {
  var list = document.getElementById('c-list');
  removerSentinela();

  var fim = Math.min(renderOffset + BATCH_SIZE, renderAllChannels.length);
  for(var i = renderOffset; i < fim; i++){
    var el = criarElementoCanal(renderAllChannels[i], i);
    list.appendChild(el);
    cItems.push(el);
  }
  renderOffset = fim;

  // Atualiza contador
  document.getElementById('c-cnt').textContent =
    renderOffset + (renderOffset < renderAllChannels.length ? '/'+renderAllChannels.length : '') + ' canais';

  if(renderOffset < renderAllChannels.length){
    adicionarSentinela(list);
  } else {
    document.getElementById('c-cnt').textContent = renderAllChannels.length + ' canais';
  }
}

function renderList(chs){
  var list = document.getElementById('c-list');
  list.innerHTML = '';
  removerSentinela();

  renderAllChannels = chs;
  renderOffset = 0;

  setState('list');
  document.getElementById('c-cnt').textContent = '0/'+chs.length+' canais';
  cItems = [document.getElementById('c-back')];

  // Renderiza primeiro lote
  renderProximoLote();

  cIdx = 1;
  setFoc(cItems[1] || cItems[0]);
}

// ============================================================
// PLAYER (CORRIGIDO - usa currentChannelsList)
// ============================================================
function voltaCanais(){
  if(playing)return;
  clearTimeout(failTmr);cancelarVerificacao();stopHls();
  if(currentPlayingChannel) registrarTelemetria(currentPlayingChannel, 'ruim');
  currentPlayingChannel=null;
  showScr('channels');
}

function stopHls(){if(hls){try{hls.destroy()}catch(e){}hls=null}}

function play(idx){
  var ch = currentChannelsList[idx];
  if(!ch){ console.log('Canal não encontrado:', idx); return; }
  
  playing=false;clearTimeout(failTmr);
  currentPlayingChannel=ch;
  channelStartTime=Date.now();
  
  document.getElementById('p-nm').textContent=ch.flag+' '+ch.name;
  var langInfo = ch.language ? ' · Idioma: ' + ch.language : '';
  document.getElementById('p-inf').textContent=(ch.country || 'Mundo')+langInfo;
  document.getElementById('p-st').textContent='⏳ Conectando...';
  document.getElementById('verifyStatus').innerHTML='🔍 Testando: '+ch.name.substring(0,25);
  showScr('player');showOv();
  
  var vid=document.getElementById('vid');
  stopHls();vid.src='';
  
  var url=ch.url;
  if(!url){ document.getElementById('p-st').textContent='❌ URL inválida'; registrarTelemetria(ch,'ruim'); currentPlayingChannel=null; setTimeout(function(){showScr('channels')},2000); return; }
  
  failTmr=setTimeout(function(){if(!playing){registrarTelemetria(ch,'ruim');currentPlayingChannel=null;document.getElementById('p-st').textContent='❌ Timeout';showScr('channels')}},10000);
  
  // ESTRATÉGIA DO CENTRAL.HTML: nativo primeiro → HLS fallback
  var tried=false;
  vid.onerror=function(){
    if(!tried){tried=true;tryHls()}
    else{document.getElementById('p-st').textContent='❌ Erro';registrarTelemetria(ch,'ruim');currentPlayingChannel=null;showScr('channels')}
  };
  vid.oncanplay=function(){
    playing=true;clearTimeout(failTmr);
    document.getElementById('p-st').textContent='▶ Ao vivo · verificando...';
    registrarTelemetria(ch,'bom');
    verificarQualidade(ch, vid);
  };
  vid.src=url;
  try{vid.load();var p=vid.play();if(p&&p.catch)p.catch(function(){})}catch(e){}
  
  function tryHls(){
    if(typeof Hls==='undefined'){
      if(hlsLoaded){registrarTelemetria(ch,'ruim');currentPlayingChannel=null;showScr('channels');return}
      hlsLoaded=true;
      document.getElementById('p-st').textContent='⏳ Carregando HLS...';
      var s=document.createElement('script');
      s.src='https://cdn.jsdelivr.net/npm/hls.js@1/dist/hls.min.js';
      s.onload=tryHls;s.onerror=function(){document.getElementById('p-st').textContent='❌ HLS indisponível';registrarTelemetria(ch,'ruim');currentPlayingChannel=null;showScr('channels')};
      document.head.appendChild(s);return;
    }
    if(!Hls.isSupported()){registrarTelemetria(ch,'ruim');currentPlayingChannel=null;showScr('channels');return}
    hls=new Hls({maxBufferLength:30,startLevel:-1,debug:false});
    hls.loadSource(url);hls.attachMedia(vid);
    hls.on(Hls.Events.MANIFEST_PARSED,function(){clearTimeout(failTmr);playing=true;document.getElementById('p-st').textContent='▶ Ao vivo · verificando...';registrarTelemetria(ch,'bom');verificarQualidade(ch,vid);try{var p=vid.play();if(p&&p.catch)p.catch(function(){})}catch(e){}});
    hls.on(Hls.Events.ERROR,function(ev,d){if(d.fatal){document.getElementById('p-st').textContent='❌ Erro HLS';registrarTelemetria(ch,'ruim');currentPlayingChannel=null;showScr('channels')}});
  }
}

function showOv(){
  var ov=document.getElementById('p-ov');
  ov.classList.remove('hide');clearTimeout(ovTmr);
  ovTmr=setTimeout(function(){ov.classList.add('hide')},4000);
}

// ============================================================
// TECLADO / CONTROLE REMOTO
// ============================================================
document.addEventListener('keydown',function(e){
  var k=e.keyCode||e.which;
  var UP=k===38,DN=k===40,OK=k===13||k===32;
  var BK=k===8||k===27||k===36||k===88||k===166||k===196||k===457||k===461||k===1009||k===4||k===10009||k===10182;
  if([4,8,13,27,32,36,37,38,39,40,88,166,196,457,461,1009,10009,10182].indexOf(k)!==-1)e.preventDefault();
  
  if(SCR==='menu'){
    if(UP&&mIdx>0){mIdx--;setFoc(mItems[mIdx])}
    else if(DN&&mIdx<mItems.length-1){mIdx++;setFoc(mItems[mIdx])}
    else if(OK&&mItems[mIdx]&&mItems[mIdx]._cat)loadCat(mItems[mIdx]._cat);
  }else if(SCR==='channels'){
    if(BK){stopHls();showScr('menu')}
    else if(UP&&cIdx>0){cIdx--;setFoc(cItems[cIdx])}
    else if(DN){
      if(cIdx>=cItems.length-3&&renderOffset<renderAllChannels.length)renderProximoLote();
      if(cIdx<cItems.length-1){cIdx++;setFoc(cItems[cIdx]);}
    }
    else if(OK&&cItems[cIdx]){
      var el=cItems[cIdx];
      if(el.id==='c-back')showScr('menu');
      else if(el.id==='c-retry'){if(retryFn)retryFn()}
      else{var idx=parseInt(el.getAttribute('data-idx')||'-1');if(idx>=0)play(idx)}
    }
  }else if(SCR==='player'){
    if(BK){currentPlayingChannel=null;stopHls();showScr('channels')}else showOv();
  }
});

// ============================================================
// SUPORTE A MOUSE / PONTEIRO / TOUCH NA TV
// ============================================================
(function(){
  // --- 1. AUTO-HIDE DO CURSOR após 4s de inatividade ---
  var cursorTimer=null;
  function mostrarCursor(){
    document.body.classList.remove('cursor-off');
    clearTimeout(cursorTimer);
    cursorTimer=setTimeout(function(){
      if(SCR==='player') document.body.classList.add('cursor-off');
    },4000);
  }
  document.addEventListener('mousemove',mostrarCursor);
  document.addEventListener('pointermove',mostrarCursor);

  // --- 2. AUTO-SCROLL nas bordas da lista ao mover o mouse ---
  var listEl=document.getElementById('c-list');
  var szTop=document.getElementById('sz-top');
  var szBot=document.getElementById('sz-bot');
  var autoScrollTimer=null;

  function pararAutoScroll(){
    clearInterval(autoScrollTimer);autoScrollTimer=null;
    szTop.classList.remove('active');
    szBot.classList.remove('active');
  }

  function iniciarAutoScroll(dir){
    if(autoScrollTimer)return;
    autoScrollTimer=setInterval(function(){
      listEl.scrollTop+=dir*18;
      // Carrega mais se rolar perto do fim
      if(dir>0){
        var restante=listEl.scrollHeight-listEl.scrollTop-listEl.clientHeight;
        if(restante<200&&renderOffset<renderAllChannels.length) renderProximoLote();
      }
    },30);
  }

  if(szTop){
    szTop.addEventListener('mouseenter',function(){szTop.classList.add('active');iniciarAutoScroll(-1)});
    szTop.addEventListener('mouseleave',pararAutoScroll);
    szTop.addEventListener('pointerenter',function(){szTop.classList.add('active');iniciarAutoScroll(-1)});
    szTop.addEventListener('pointerleave',pararAutoScroll);
  }
  if(szBot){
    szBot.addEventListener('mouseenter',function(){szBot.classList.add('active');iniciarAutoScroll(1)});
    szBot.addEventListener('mouseleave',pararAutoScroll);
    szBot.addEventListener('pointerenter',function(){szBot.classList.add('active');iniciarAutoScroll(1)});
    szBot.addEventListener('pointerleave',pararAutoScroll);
  }

  // --- 3. SCROLL por roda do mouse / trackpad ---
  listEl.addEventListener('wheel',function(e){
    e.preventDefault();
    listEl.scrollTop+=e.deltaY>0?80:-80;
    // Carrega mais se perto do fim
    var restante=listEl.scrollHeight-listEl.scrollTop-listEl.clientHeight;
    if(restante<300&&renderOffset<renderAllChannels.length) renderProximoLote();
  },{passive:false});

  // --- 4. TOUCH — swipe vertical na lista de canais ---
  var touchStartY=0,touchStartScroll=0,touchMoved=false;
  listEl.addEventListener('touchstart',function(e){
    touchStartY=e.touches[0].clientY;
    touchStartScroll=listEl.scrollTop;
    touchMoved=false;
  },{passive:true});
  listEl.addEventListener('touchmove',function(e){
    var dy=touchStartY-e.touches[0].clientY;
    listEl.scrollTop=touchStartScroll+dy;
    if(Math.abs(dy)>5) touchMoved=true;
    // Carrega mais se perto do fim
    var restante=listEl.scrollHeight-listEl.scrollTop-listEl.clientHeight;
    if(restante<300&&renderOffset<renderAllChannels.length) renderProximoLote();
  },{passive:true});

  // --- 5. TOUCH tap na lista (sem arrastar) dispara play ---
  listEl.addEventListener('touchend',function(e){
    if(touchMoved) return; // foi swipe, não tap
    var target=e.changedTouches[0];
    var el=document.elementFromPoint(target.clientX,target.clientY);
    if(!el) return;
    var ch=el.closest('.ch');
    if(ch){
      var fav=el.closest('.ch-fav');
      var del=el.closest('.ch-delete');
      if(fav){ fav.click(); return; }
      if(del){ del.click(); return; }
      var idx=parseInt(ch.getAttribute('data-idx')||'-1');
      if(idx>=0) play(idx);
    }
  },{passive:true});

  // --- 6. TOUCH no menu lateral ---
  var menuSide=document.getElementById('m-side');
  var menuTouchMoved=false,menuTouchStartY=0;
  menuSide.addEventListener('touchstart',function(e){menuTouchStartY=e.touches[0].clientY;menuTouchMoved=false;},{passive:true});
  menuSide.addEventListener('touchmove',function(e){if(Math.abs(e.touches[0].clientY-menuTouchStartY)>5)menuTouchMoved=true;},{passive:true});
  menuSide.addEventListener('touchend',function(e){
    if(menuTouchMoved) return;
    var el=document.elementFromPoint(e.changedTouches[0].clientX,e.changedTouches[0].clientY);
    if(!el) return;
    var item=el.closest('.m-item');
    if(item&&item._cat) loadCat(item._cat);
  },{passive:true});

  // --- 7. POINTER (TV Magic Remote LG, Tizen, etc.) ---
  // Garante que pointerdown em elementos interativos dispara click
  document.addEventListener('pointerdown',function(e){
    if(e.pointerType==='mouse') return; // mouse já tem click nativo
    var target=e.target;
    // botões já têm click, só precisamos do canal
    var ch=target.closest&&target.closest('.ch');
    if(ch&&!target.closest('.ch-fav')&&!target.closest('.ch-delete')){
      var idx=parseInt(ch.getAttribute('data-idx')||'-1');
      if(idx>=0){ e.preventDefault(); play(idx); }
    }
    var mitem=target.closest&&target.closest('.m-item');
    if(mitem&&mitem._cat){ e.preventDefault(); loadCat(mitem._cat); }
  });

})();
