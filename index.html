<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>IPTV K10 TV - Simplificado</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;width:100%;overflow:hidden}
body{background:#07090f;color:#e2e8f0;font-family:Arial,sans-serif;position:fixed;top:0;right:0;bottom:0;left:0}
.scr{display:none;position:fixed;top:0;right:0;bottom:0;left:0}
.scr.on{display:flex;flex-direction:column}

/* ----- TELA DE MENU (CATEGORIAS) ----- */
#s-menu{background:#07090f}
.menu-list{flex:1;overflow-y:auto;padding:20px 10px}
.m-item{background:#0b0f1c;margin-bottom:8px;padding:15px 20px;border-radius:12px;cursor:pointer;border-left:4px solid transparent;transition:0.1s}
.m-item .m-ico{font-size:28px;margin-right:12px}
.m-item .m-lbl{font-size:18px;font-weight:bold;color:#cbd5e1}
.m-item .m-sub{font-size:12px;color:#475569;margin-top:4px}
.m-item:hover,.m-item.foc{background:#111e38;border-left-color:#38bdf8}
.m-grp{font-size:12px;color:#334155;font-weight:bold;letter-spacing:2px;padding:15px 10px 5px;text-transform:uppercase}

/* ----- TELA DE CANAIS (LISTA PAGINADA) ----- */
#s-channels{background:#07090f}
.c-head{display:flex;align-items:center;padding:12px 16px;background:#0b0f1c;border-bottom:1px solid #1a2540;flex-shrink:0}
#c-back{background:#111e38;border:2px solid #38bdf8;color:#38bdf8;font-size:16px;padding:6px 14px;border-radius:7px;cursor:pointer;margin-right:12px}
#c-back.foc,#c-back:hover{background:#38bdf8;color:#07090f}
#c-title{font-size:20px;font-weight:700;color:#f1f5f9;flex:1}
#c-cnt{font-size:12px;color:#475569}
.c-body{flex:1;display:flex;flex-direction:column;position:relative}
#c-load,#c-err{position:absolute;top:0;right:0;bottom:0;left:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#07090f;z-index:2}
#c-load{display:flex}
#c-err{display:none}
.spin{width:40px;height:40px;border:4px solid #1a2540;border-top-color:#38bdf8;border-radius:50%;animation:sp .8s linear infinite}
.ltxt{font-size:14px;color:#475569;margin-top:10px}
.etxt{font-size:14px;color:#f87171;text-align:center;max-width:300px}
#c-retry{margin-top:15px;background:#111e38;border:2px solid #38bdf8;color:#38bdf8;padding:8px 20px;border-radius:8px;cursor:pointer}
#c-list{flex:1;padding:8px;overflow-y:hidden; /* barra de rolagem removida */ display:block}
.ch{display:flex;align-items:center;padding:10px 12px;border-radius:8px;cursor:pointer;margin-bottom:4px;border:1px solid transparent;background:#0b0f1c}
.ch:hover,.ch.foc{background:#111e38;border-color:#38bdf8}
.ch-fl{font-size:26px;width:44px;text-align:center}
.ch-lg{width:48px;height:28px;background:#1e293b;border-radius:4px;object-fit:cover}
.ch-info{flex:1;margin-left:10px}
.ch-nm{font-size:14px;font-weight:600;color:#e2e8f0}
.ch-details{display:flex;flex-wrap:wrap;margin-top:2px;gap:6px}
.ch-lang{font-size:9px;padding:2px 6px;border-radius:10px;background:#1a2540;color:#94a3b8}
.ch-country{font-size:9px;color:#10b981}
.ch-actions{display:flex;gap:6px}
.ch-fav{background:none;border:none;font-size:20px;cursor:pointer;color:#64748b}
.ch-fav.active{color:#f59e0b}
.ch-delete{background:none;border:none;font-size:18px;cursor:pointer;color:#64748b}
.ch-delete:hover{color:#ef4444}
.paginacao{display:flex;justify-content:space-between;align-items:center;padding:8px 16px;background:#0b0f1c;border-top:1px solid #1a2540;flex-shrink:0}
.paginacao button{background:#111e38;border:2px solid #38bdf8;color:#38bdf8;font-size:18px;padding:8px 16px;border-radius:8px;cursor:pointer;min-width:100px}
.paginacao button:disabled{opacity:0.3;cursor:not-allowed}
.paginacao span{color:#94a3b8;font-size:14px}
#btn-scroll-up, #btn-scroll-dn { /* renomeados mas manteremos os IDs originais para compatibilidade */ }

/* ----- TELA DE PLAYER ----- */
#s-player{background:#000}
#vid{width:100%;height:100%}
.p-ov{position:absolute;top:0;right:0;bottom:0;left:0;display:flex;flex-direction:column;justify-content:space-between;transition:opacity .4s}
.p-ov.hide{opacity:0;pointer-events:none}
.p-top{background:linear-gradient(rgba(0,0,0,.7),transparent);padding:16px 24px}
.p-top h2{font-size:22px;color:#fff;text-shadow:0 2px 6px #000}
.p-top p{font-size:12px;color:#94a3b8}
.p-bot{background:linear-gradient(transparent,rgba(0,0,0,.7));padding:14px 24px;display:flex;justify-content:space-between;align-items:flex-end}
.p-st{font-size:12px;color:#cbd5e1}
#p-back{background:#111e38;border:2px solid #38bdf8;color:#38bdf8;font-size:14px;padding:8px 18px;border-radius:7px;cursor:pointer}
#p-back:hover{background:#38bdf8;color:#000}
.verify-status{position:fixed;bottom:10px;right:10px;background:#111e38;padding:5px 12px;border-radius:20px;font-size:10px;color:#38bdf8;z-index:100}
.telemetry-indicator{position:fixed;bottom:15px;left:15px;background:#0a2a1a;border-radius:20px;padding:5px 12px;display:flex;align-items:center;gap:8px;font-size:10px;z-index:1000;border:1px solid #10b981}
.telemetry-dot{width:8px;height:8px;border-radius:50%;background:#10b981;animation:pulse 1.5s infinite}
.telemetry-text{color:#4ade80}
.mode-badge{position:fixed;bottom:15px;right:15px;background:#1a2540;border-radius:20px;padding:5px 12px;font-size:10px;border:1px solid #38bdf8;color:#38bdf8}
@keyframes sp{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(0.8)}}
body.cursor-off,body.cursor-off *{cursor:none!important}
</style>
</head>
<body>

<div id="s-menu" class="scr on">
  <div class="menu-list" id="menu-list"></div>
</div>

<div id="s-channels" class="scr">
  <div class="c-head">
    <button id="c-back">◀ Voltar</button>
    <span id="c-title">Canais</span>
    <span id="c-cnt"></span>
  </div>
  <div class="c-body">
    <div id="c-load"><div class="spin"></div><div class="ltxt">Carregando...</div></div>
    <div id="c-err"><div style="font-size:40px">⚠</div><div class="etxt" id="e-txt"></div><button id="c-retry">⟳ Tentar novamente</button></div>
    <div id="c-list"></div>
    <div class="paginacao">
      <button id="btn-scroll-up">▲ Anterior</button>
      <span id="pag-info">Página 1</span>
      <button id="btn-scroll-dn">Próximo ▼</button>
    </div>
  </div>
</div>

<div id="s-player" class="scr">
  <video id="vid" autoplay></video>
  <div class="p-ov" id="p-ov">
    <div class="p-top"><h2 id="p-nm">—</h2><p id="p-inf"></p></div>
    <div class="p-bot"><span class="p-st" id="p-st">⏳ Conectando...</span><button id="p-back">◀ Voltar</button></div>
  </div>
</div>

<div class="verify-status" id="verifyStatus">✓ Pronto</div>
<div id="telemetryIndicator" class="telemetry-indicator"><div class="telemetry-dot"></div><span class="telemetry-text">📡 Telemetria</span></div>
<div id="modeBadge" class="mode-badge">💻 Modo Computador</div>

<script>
// ==================== POLYFILLS MÍNIMOS ====================
if(!Element.prototype.closest){
  Element.prototype.closest=function(s){
    var el=this;
    while(el&&el.nodeType===1){
      if(el.matches?el.matches(s):(el.msMatchesSelector?el.msMatchesSelector(s):false))return el;
      el=el.parentNode;
    }
    return null;
  };
}
if(!String.prototype.includes){String.prototype.includes=function(s){return this.indexOf(s)!==-1};}
if(typeof NodeList!=='undefined'&&NodeList.prototype&&!NodeList.prototype.forEach){
  NodeList.prototype.forEach=function(cb){for(var i=0;i<this.length;i++)cb(this[i],i,this);};
}

// ==================== CONFIGURAÇÕES ====================
var modoTV = /tv|smarttv|webos|tizen|android.tv/i.test(navigator.userAgent);
document.getElementById('modeBadge').innerHTML = modoTV ? '📺 Modo TV' : '💻 Modo Computador';

var CORS_PROXIES = [
  function(u){return 'https://corsproxy.io/?url='+encodeURIComponent(u);},
  function(u){return 'https://api.allorigins.win/raw?url='+encodeURIComponent(u);},
  function(u){return 'https://api.codetabs.com/v1/proxy?quest='+encodeURIComponent(u);}
];

var FL_EMOJI = {BR:'🇧🇷',US:'🇺🇸',GB:'🇬🇧',FR:'🇫🇷',DE:'🇩🇪',ES:'🇪🇸',IT:'🇮🇹',PT:'🇵🇹',AR:'🇦🇷',MX:'🇲🇽',JP:'🇯🇵',KR:'🇰🇷',RU:'🇷🇺',IN:'🇮🇳',CN:'🇨🇳',AU:'🇦🇺',CA:'🇨🇦',NL:'🇳🇱',TR:'🇹🇷',SA:'🇸🇦',AE:'🇦🇪',PL:'🇵🇱'};
function getFlag(c){return FL_EMOJI[c]||'🌍';}

var LANG_MAP = {portugu:'PT','portuguese':'PT','pt':'PT',ingl:'GB','english':'GB','en':'GB',espanh:'ES','spanish':'ES','es':'ES',fran:'FR','french':'FR','fr':'FR',alem:'DE','german':'DE','de':'DE',italian:'IT','it':'IT',russ:'RU','ru':'RU',japan:'JP','ja':'JP',chin:'CN','zh':'CN',arab:'SA','ar':'SA',hindi:'IN','hi':'IN'};
function getIdiomaFlag(lang){
  if(!lang) return '🌍';
  var l=lang.toLowerCase();
  for(var k in LANG_MAP) if(l.indexOf(k)!==-1) return getFlag(LANG_MAP[k]);
  return '🌍';
}

var CATS = [
  {G:'ACESSO GERAL'},
  {id:'mundial', e:'🌍', n:'IPTV Mundial', s:'+10k canais', t:'api', c:null},
  {id:'freetv', e:'📡', n:'Free-TV (M3U)', s:'Listas estáveis', t:'m3u', u:['https://iptv-org.github.io/iptv/index.m3u','https://raw.githubusercontent.com/iptv-org/iptv/gh-pages/index.m3u']},
  {G:'BRASIL'},
  {id:'brasil', e:'🇧🇷', n:'IPTV Brasil', s:'Canais abertos', t:'m3u', u:['https://iptv-org.github.io/iptv/countries/br.m3u','https://raw.githubusercontent.com/iptv-org/iptv/master/streams/br.m3u']},
  {G:'INFORMAÇÃO'},
  {id:'noti', e:'📰', n:'Notícias', s:'Jornalismo', t:'api', c:['news']},
  {id:'nego', e:'💼', n:'Negócios', s:'Economia', t:'api', c:['business','weather']},
  {G:'ENTRETENIMENTO'},
  {id:'entr', e:'🎭', n:'Entretenimento', s:'Comédia/geral', t:'api', c:['entertainment','comedy','general']},
  {id:'esp', e:'⚽', n:'Esportes', s:'Futebol, basquete', t:'api', c:['sports']},
  {id:'mus', e:'🎵', n:'Música', s:'Canais musicais', t:'api', c:['music']},
  {id:'fil', e:'🎬', n:'Filmes & Séries', s:'Cinema', t:'api', c:['movies','series','animation']},
  {id:'kids', e:'🧒', n:'Kids', s:'Infantil', t:'api', c:['kids','family']}
];

// ==================== ESTADO GLOBAL ====================
var SCR = 'menu';
var mItems = [], mIdx = 0;
var channels = [], currentChannelsList = [], currentCategory = null;
var favoritos = {}, excluidos = {}, canalStatus = {};
var STORAGE_FAV = 'iptv_k10_fav', STORAGE_EXC = 'iptv_k10_exc', STORAGE_STAT = 'iptv_k10_stat';
try{ favoritos = JSON.parse(localStorage.getItem(STORAGE_FAV)||'{}'); }catch(e){}
try{ excluidos = JSON.parse(localStorage.getItem(STORAGE_EXC)||'{}'); }catch(e){}
try{ canalStatus = JSON.parse(localStorage.getItem(STORAGE_STAT)||'{}'); }catch(e){}
function saveFav(){ localStorage.setItem(STORAGE_FAV,JSON.stringify(favoritos)); }
function saveExc(){ localStorage.setItem(STORAGE_EXC,JSON.stringify(excluidos)); }
function saveStat(){ localStorage.setItem(STORAGE_STAT,JSON.stringify(canalStatus)); }

// Paginação da lista de canais
var ITENS_POR_PAGINA = 10;
var paginaAtual = 1;
var totalPaginas = 0;

// Player
var hls = null, playing = false, failTmr = null, ovTmr = null, currentPlayingChannel = null, channelStartTime = 0;
var qualityTimer = null;

// ==================== FUNÇÕES AUXILIARES ====================
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function toggleFavorito(id, ev){
  if(ev && ev.stopPropagation) ev.stopPropagation();
  if(favoritos[id]) delete favoritos[id];
  else favoritos[id]=true;
  saveFav();
  carregarCanaisFiltrados();
}
function excluirCanal(id, ev){
  if(ev && ev.stopPropagation) ev.stopPropagation();
  if(confirm('Excluir permanentemente?')){
    excluidos[id]=true; saveExc();
    carregarCanaisFiltrados();
    document.getElementById('verifyStatus').innerHTML='Canal excluído';
    setTimeout(function(){document.getElementById('verifyStatus').innerHTML='✓ Pronto';},2000);
  }
}

function setFoc(el){
  if(!el) return;
  document.querySelectorAll('.foc').forEach(function(e){ e.classList.remove('foc'); });
  el.classList.add('foc');
  try{ el.focus(); }catch(e){}
  try{ el.scrollIntoView({block:'nearest'}); }catch(e){}
}

function showScr(name){
  var screens = ['menu','channels','player'];
  screens.forEach(function(s){
    document.getElementById('s-'+s).classList.toggle('on', s===name);
  });
  SCR = name;
  if(name==='menu') setFoc(mItems[mIdx]);
  if(name==='player') setFoc(document.getElementById('p-back'));
  if(name==='channels') setFoc(document.getElementById('c-back'));
}

// ==================== REQUISIÇÕES COM PROXY ====================
function req(url, cb){
  var x = new XMLHttpRequest();
  x.open('GET', url);
  x.timeout = 15000;
  x.onreadystatechange = function(){
    if(x.readyState!==4) return;
    if(x.status>=200 && x.status<300) cb(null, x.responseText);
    else cb('HTTP '+x.status);
  };
  x.ontimeout = function(){ cb('timeout'); };
  x.onerror = function(){ cb('erro rede'); };
  try{ x.send(); }catch(e){ cb(e.message); }
}

function getWithProxy(urls, cb){
  var tentativas = [];
  urls.forEach(function(u){
    tentativas.push(u);
    CORS_PROXIES.forEach(function(p){ tentativas.push(p(u)); });
  });
  var idx=0;
  (function next(){
    if(idx>=tentativas.length) return cb('Todas as fontes falharam');
    req(tentativas[idx++], function(err, data){
      if(!err && data && data.length>10) cb(null, data);
      else next();
    });
  })();
}

function getApi(cb){
  var base = 'https://iptv-org.github.io/api';
  var chUrl = base+'/channels.json';
  var stUrl = base+'/streams.json';
  var chs=null, strs=null, err=null, done=0;
  function check(){
    if(++done===2){
      if(err) cb(err);
      else cb(null, {chs:chs, strs:strs});
    }
  }
  getWithProxy([chUrl], function(e,d){
    if(e){ err=e; check(); return; }
    try{ chs=JSON.parse(d); check(); }catch(e){ err='JSON inválido (canais)'; check(); }
  });
  getWithProxy([stUrl], function(e,d){
    if(e){ err=e; check(); return; }
    try{ strs=JSON.parse(d); check(); }catch(e){ err='JSON inválido (streams)'; check(); }
  });
}

function getM3u(urls, cb){
  getWithProxy(urls, function(err, data){
    if(err) return cb(err);
    if(data.indexOf('#EXTM3U')===-1 && data.indexOf('#EXTINF')===-1) return cb('Não é M3U');
    cb(null, data);
  });
}

function parseM3u(txt){
  var linhas = txt.split('\n'), out = [], cur = null;
  for(var i=0;i<linhas.length && out.length<1500;i++){
    var l = linhas[i].trim();
    if(l.indexOf('#EXTINF:')===0){
      var nm = l.match(/,(.+)$/);
      var lg = l.match(/tvg-logo="([^"]+)"/);
      var co = l.match(/tvg-country="([^"]+)"/);
      var pais = co ? co[1].split(';')[0].toUpperCase() : '';
      cur = { name: nm ? nm[1].trim() : 'Canal', logo: lg ? lg[1] : '', country: pais, flag: getFlag(pais) };
    } else if(l && l.indexOf('#')!==0 && cur){
      cur.url = l;
      out.push(cur);
      cur = null;
    }
  }
  return out;
}

function buildApi(data, cats){
  var streams = {};
  for(var i=0;i<data.strs.length;i++) if(data.strs[i].channel) streams[data.strs[i].channel] = data.strs[i].url;
  var out = [];
  for(var j=0;j<data.chs.length && out.length<2000;j++){
    var ch = data.chs[j];
    if(!streams[ch.id]) continue;
    if(cats){
      var ok = false;
      for(var k=0;k<(ch.categories||[]).length;k++) if(cats.indexOf(ch.categories[k])!==-1){ ok=true; break; }
      if(!ok) continue;
    }
    var lang = (ch.languages && ch.languages[0]) || '';
    out.push({
      id: ch.id,
      name: ch.name,
      logo: ch.logo || '',
      country: (ch.country||'').toUpperCase(),
      flag: getFlag(ch.country),
      url: streams[ch.id],
      language: lang,
      langDisplay: lang ? getIdiomaFlag(lang)+' '+lang : '🌍'
    });
  }
  return out;
}

function carregarCanaisFiltrados(){
  if(!currentCategory) return;
  var catStat = canalStatus[currentCategory] || {};
  var filtrados = [];
  for(var i=0;i<channels.length;i++){
    var ch = channels[i];
    if(excluidos[ch.id]) continue;
    if(catStat[ch.id] && catStat[ch.id].status==='ruim') continue;
    filtrados.push(ch);
  }
  filtrados.sort(function(a,b){
    var af = favoritos[a.id]?1:0, bf = favoritos[b.id]?1:0;
    if(af!==bf) return bf-af;
    return (a.name||'').localeCompare(b.name||'');
  });
  currentChannelsList = filtrados;
  totalPaginas = Math.ceil(currentChannelsList.length / ITENS_POR_PAGINA);
  paginaAtual = 1;
  renderPagina();
}

function renderPagina(){
  var inicio = (paginaAtual-1) * ITENS_POR_PAGINA;
  var fim = Math.min(inicio + ITENS_POR_PAGINA, currentChannelsList.length);
  var canaisPagina = currentChannelsList.slice(inicio, fim);
  var container = document.getElementById('c-list');
  container.innerHTML = '';
  for(var i=0;i<canaisPagina.length;i++){
    var ch = canaisPagina[i];
    var div = document.createElement('div');
    div.className = 'ch' + (favoritos[ch.id] ? ' ch-favorito' : '');
    div.setAttribute('data-idx', inicio+i);
    var logoHtml = ch.logo ? '<img class="ch-lg" src="'+esc(ch.logo)+'" onerror="this.style.display=\'none\'">' : '<span class="ch-fl">'+ch.flag+'</span>';
    div.innerHTML = logoHtml +
      '<div class="ch-info">'+
        '<div class="ch-nm">'+esc(ch.name)+'</div>'+
        '<div class="ch-details">'+
          '<span class="ch-lang">'+ch.langDisplay+'</span>'+
          '<span class="ch-country">'+ch.flag+' '+(ch.country||'Mundo')+'</span>'+
        '</div>'+
      '</div>'+
      '<div class="ch-actions">'+
        '<button class="ch-fav'+(favoritos[ch.id]?' active':'')+'" data-id="'+esc(ch.id)+'">'+(favoritos[ch.id]?'★':'☆')+'</button>'+
        '<button class="ch-delete" data-id="'+esc(ch.id)+'">🗑</button>'+
      '</div>';
    var idxGlobal = inicio+i;
    div.onclick = (function(idx){
      return function(e){
        var t = e.target;
        if(t.classList && (t.classList.contains('ch-fav')||t.classList.contains('ch-delete'))) return;
        play(idx);
      };
    })(idxGlobal);
    var favBtn = div.querySelector('.ch-fav');
    if(favBtn) favBtn.onclick = (function(id){ return function(e){ e.stopPropagation(); toggleFavorito(id,e); }; })(ch.id);
    var delBtn = div.querySelector('.ch-delete');
    if(delBtn) delBtn.onclick = (function(id){ return function(e){ e.stopPropagation(); excluirCanal(id,e); }; })(ch.id);
    container.appendChild(div);
  }
  document.getElementById('c-cnt').innerHTML = currentChannelsList.length + ' canais';
  document.getElementById('pag-info').innerHTML = 'Página '+paginaAtual+' de '+totalPaginas;
  // Estado dos botões de paginação
  document.getElementById('btn-scroll-up').disabled = (paginaAtual <= 1);
  document.getElementById('btn-scroll-dn').disabled = (paginaAtual >= totalPaginas);
  // Rolar para o topo da lista visualmente
  document.getElementById('c-list').scrollTop = 0;
}

function paginaAnterior(){
  if(paginaAtual > 1){
    paginaAtual--;
    renderPagina();
  }
}
function paginaProxima(){
  if(paginaAtual < totalPaginas){
    paginaAtual++;
    renderPagina();
  }
}

// ==================== PLAYER ====================
function stopHls(){ if(hls){ try{ hls.destroy(); }catch(e){} hls=null; } }
function cancelarQualidade(){ if(qualityTimer){ clearTimeout(qualityTimer); qualityTimer=null; } }

function verificarQualidade(ch, vid){
  cancelarQualidade();
  qualityTimer = setTimeout(function(){
    if(!playing) return;
    var statusDiv = document.getElementById('p-st');
    // Verificação simples: se o vídeo está rodando há 5 segundos, consideramos ok
    if(vid.currentTime > 0 || vid.readyState >= 2){
      statusDiv.innerHTML = '▶ Ao vivo';
      registrarTelemetria(ch, 'bom');
    } else {
      statusDiv.innerHTML = '⚠ Sem sinal';
      registrarTelemetria(ch, 'ruim');
    }
  }, 5000);
}

function registrarTelemetria(ch, status){
  if(!ch || !ch.id || !currentCategory) return;
  if(!canalStatus[currentCategory]) canalStatus[currentCategory]={};
  var duracao = channelStartTime ? Math.round((Date.now()-channelStartTime)/1000) : 0;
  canalStatus[currentCategory][ch.id] = {status:status, lastCheck:Date.now(), name:ch.name, duracao:duracao};
  saveStat();
  var telSpan = document.querySelector('#telemetryIndicator .telemetry-text');
  if(telSpan) telSpan.innerHTML = (status==='bom') ? '📡 '+ch.name.substring(0,15)+' OK' : '📡 '+ch.name.substring(0,15)+' X';
}

function play(idx){
  var ch = currentChannelsList[idx];
  if(!ch) return;
  playing = false;
  clearTimeout(failTmr);
  cancelarQualidade();
  currentPlayingChannel = ch;
  channelStartTime = Date.now();
  document.getElementById('p-nm').innerHTML = ch.flag+' '+esc(ch.name);
  document.getElementById('p-inf').innerHTML = (ch.country||'Mundo') + (ch.language?' · '+ch.language:'');
  document.getElementById('p-st').innerHTML = '⏳ Conectando...';
  showScr('player');
  showOv();
  var vid = document.getElementById('vid');
  stopHls();
  vid.src = '';
  var url = ch.url;
  if(!url){
    document.getElementById('p-st').innerHTML = '❌ URL inválida';
    registrarTelemetria(ch,'ruim');
    setTimeout(function(){ showScr('channels'); }, 2000);
    return;
  }
  var failTimeout = setTimeout(function(){
    if(!playing){
      registrarTelemetria(ch,'ruim');
      showScr('channels');
    }
  }, 12000);
  failTmr = failTimeout;
  var tentouHls = false;
  vid.onerror = function(){
    if(!tentouHls){
      tentouHls = true;
      tentarHls();
    } else {
      document.getElementById('p-st').innerHTML = '❌ Falha total';
      registrarTelemetria(ch,'ruim');
      setTimeout(function(){ showScr('channels'); }, 2000);
    }
  };
  vid.oncanplay = function(){
    playing = true;
    clearTimeout(failTmr);
    document.getElementById('p-st').innerHTML = '▶ Verificando...';
    verificarQualidade(ch, vid);
  };
  vid.src = url;
  vid.load();
  var playPromise = vid.play();
  if(playPromise && playPromise.catch) playPromise.catch(function(e){});
  function tentarHls(){
    if(typeof Hls === 'undefined'){
      var script = document.createElement('script');
      script.src = 'https://cdn.jsdelivr.net/npm/hls.js@1/dist/hls.min.js';
      script.onload = tentarHls;
      script.onerror = function(){
        document.getElementById('p-st').innerHTML = '❌ HLS não suportado';
        registrarTelemetria(ch,'ruim');
        setTimeout(function(){ showScr('channels'); }, 2000);
      };
      document.head.appendChild(script);
      return;
    }
    if(!Hls.isSupported()){
      document.getElementById('p-st').innerHTML = '❌ HLS não suportado';
      registrarTelemetria(ch,'ruim');
      setTimeout(function(){ showScr('channels'); }, 2000);
      return;
    }
    hls = new Hls({ maxBufferLength: 30 });
    hls.loadSource(url);
    hls.attachMedia(vid);
    hls.on(Hls.Events.MANIFEST_PARSED, function(){
      clearTimeout(failTmr);
      playing = true;
      document.getElementById('p-st').innerHTML = '▶ Verificando...';
      verificarQualidade(ch, vid);
      vid.play().catch(function(e){});
    });
    hls.on(Hls.Events.ERROR, function(ev, data){
      if(data.fatal){
        document.getElementById('p-st').innerHTML = '❌ Erro HLS';
        registrarTelemetria(ch,'ruim');
        setTimeout(function(){ showScr('channels'); }, 2000);
      }
    });
  }
}

function showOv(){
  var ov = document.getElementById('p-ov');
  ov.classList.remove('hide');
  clearTimeout(ovTmr);
  ovTmr = setTimeout(function(){ ov.classList.add('hide'); }, 3500);
}

// ==================== CARREGAR CATEGORIA ====================
function loadCat(cat){
  currentCategory = cat.id;
  showScr('channels');
  document.getElementById('c-title').textContent = cat.n;
  document.getElementById('c-cnt').textContent = '';
  document.getElementById('c-load').style.display = 'flex';
  document.getElementById('c-err').style.display = 'none';
  document.getElementById('c-list').style.display = 'block';
  function erro(msg){
    document.getElementById('c-load').style.display = 'none';
    document.getElementById('c-err').style.display = 'flex';
    document.getElementById('e-txt').textContent = msg;
  }
  if(cat.t === 'm3u'){
    getM3u(cat.u, function(err, data){
      if(err) return erro('M3U: '+err);
      var chs = parseM3u(data);
      if(!chs.length) return erro('Nenhum canal encontrado');
      channels = chs;
      carregarCanaisFiltrados();
      document.getElementById('c-load').style.display = 'none';
    });
  } else {
    getApi(function(err, data){
      if(err) return erro('API: '+err);
      var chs = buildApi(data, cat.c);
      if(!chs.length) return erro('Nenhum canal nesta categoria');
      channels = chs;
      carregarCanaisFiltrados();
      document.getElementById('c-load').style.display = 'none';
    });
  }
}

// ==================== MONTAR MENU (TELA CHEIA) ====================
function buildMenu(){
  var container = document.getElementById('menu-list');
  container.innerHTML = '';
  mItems = [];
  for(var i=0;i<CATS.length;i++){
    var d = CATS[i];
    if(d.G){
      var grp = document.createElement('div');
      grp.className = 'm-grp';
      grp.innerText = d.G;
      container.appendChild(grp);
    } else {
      var item = document.createElement('div');
      item.className = 'm-item';
      item.innerHTML = '<div style="display:flex;align-items:center"><span class="m-ico">'+d.e+'</span><div><div class="m-lbl">'+esc(d.n)+'</div><div class="m-sub">'+esc(d.s)+'</div></div></div>';
      item._cat = d;
      (function(cat, el, idx){
        el.onclick = function(){ loadCat(cat); };
        el.onmouseover = function(){ mIdx=idx; setFoc(el); };
      })(d, item, mItems.length);
      container.appendChild(item);
      mItems.push(item);
    }
  }
  if(mItems.length) setFoc(mItems[0]);
}

// ==================== EVENTOS GLOBAIS ====================
document.getElementById('c-back').onclick = function(){ showScr('menu'); };
document.getElementById('c-retry').onclick = function(){ if(retryFn) retryFn(); };
document.getElementById('p-back').onclick = function(){ currentPlayingChannel=null; stopHls(); showScr('channels'); };
document.getElementById('s-player').onmousemove = showOv;
document.getElementById('btn-scroll-up').onclick = paginaAnterior;
document.getElementById('btn-scroll-dn').onclick = paginaProxima;

var retryFn = null;

// Teclado
document.onkeydown = function(e){
  e = e || window.event;
  var k = e.keyCode || e.which;
  var UP = (k===38), DN = (k===40), OK = (k===13||k===32);
  var BK = (k===8||k===27||k===36||k===461);
  var block = [8,13,27,32,36,37,38,39,40,461];
  if(block.indexOf(k)!==-1){ if(e.preventDefault)e.preventDefault(); else e.returnValue=false; }
  if(SCR==='menu'){
    if(UP && mIdx>0){ mIdx--; setFoc(mItems[mIdx]); }
    else if(DN && mIdx<mItems.length-1){ mIdx++; setFoc(mItems[mIdx]); }
    else if(OK && mItems[mIdx] && mItems[mIdx]._cat) loadCat(mItems[mIdx]._cat);
  }
  else if(SCR==='channels'){
    if(BK){ showScr('menu'); }
    else if(UP){
      var upBtn = document.getElementById('btn-scroll-up');
      if(!upBtn.disabled) paginaAnterior();
    }
    else if(DN){
      var dnBtn = document.getElementById('btn-scroll-dn');
      if(!dnBtn.disabled) paginaProxima();
    }
    else if(OK){
      var focos = document.querySelectorAll('#c-list .ch.foc');
      if(focos.length){
        var idx = parseInt(focos[0].getAttribute('data-idx'));
        if(!isNaN(idx)) play(idx);
      }
    }
  }
  else if(SCR==='player'){
    if(BK){ currentPlayingChannel=null; stopHls(); showScr('channels'); }
    else showOv();
  }
};

// Auto-hide cursor
var cursorTimer;
document.onmousemove = function(){
  document.body.classList.remove('cursor-off');
  clearTimeout(cursorTimer);
  cursorTimer = setTimeout(function(){
    if(SCR==='player') document.body.classList.add('cursor-off');
  }, 4000);
};

buildMenu();
window.retryFn = function(){ if(currentCategory) loadCat(CATS.find(function(c){return c.id===currentCategory;})); };
console.log('IPTV K10 - Versão simplificada com paginação e menu fullscreen');
</script>
