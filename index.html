<!DOCTYPE html>
<html lang="pt-BR">
<head>

<title>IPTV K10 TV - Smart Channel Manager</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;width:100%;overflow:hidden}
body{background:#07090f;color:#e2e8f0;font-family:Arial,sans-serif;position:fixed;inset:0}

.scr.on{display:flex}

#s-player{background:#000;position:relative}

<div class="progress-bar" id="progressBar"></div>
<div class="status-bar" id="statusBar">✅ Pronto</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@1/dist/hls.min.js"></script>
<script>
// ============================================================
// IPTV K10 TV - SMART CHANNEL MANAGER
// ✅ Remove canais ruins
// ✅ Recupera canais que voltaram
// ✅ Detecta canais novos
// ✅ Desbane canais quando voltam
// ✅ Sincroniza via Matrix
// ============================================================

// Configuração
var API_SERVERS = [
  'https://iptv-org.github.io/api',
  'https://cdn.jsdelivr.net/gh/iptv-org/api@gh-pages',
  'https://raw.githubusercontent.com/iptv-org/api/gh-pages'
];

var FLAGS = {
  BR:'🇧🇷', US:'🇺🇸', GB:'🇬🇧', FR:'🇫🇷', DE:'🇩🇪', ES:'🇪🇸', IT:'🇮🇹',
  PT:'🇵🇹', AR:'🇦🇷', MX:'🇲🇽', JP:'🇯🇵', KR:'🇰🇷', RU:'🇷🇺', IN:'🇮🇳',
  CN:'🇨🇳', AU:'🇦🇺', CA:'🇨🇦', NL:'🇳🇱', TR:'🇹🇷', SA:'🇸🇦', AE:'🇦🇪',
  PL:'🇵🇱', ZA:'🇿🇦', EG:'🇪🇬', NG:'🇳🇬', KE:'🇰🇪'
};

// Categorias
var CATS = [
  {G:'🌍 ACESSO GERAL'},
  {id:'mundial',e:'📺',n:'IPTV Mundial',s:'+10k canais · todos os países',t:'api',c:null},
  {G:'🇧🇷 BRASIL'},
  {id:'brasil',e:'🇧🇷',n:'IPTV Brasil',s:'Canais abertos brasileiros',t:'api',c:null},
  {G:'📰 INFORMAÇÃO'},
  {id:'noti',e:'📰',n:'Notícias',s:'Jornalismo ao vivo',t:'api',c:['news']},
  {id:'nego',e:'💼',n:'Negócios & Clima',s:'Business · economia',t:'api',c:['business','weather']},
  {G:'⚽ ESPORTES'},
  {id:'esp',e:'⚽',n:'Esportes',s:'Futebol · basquete · tênis',t:'api',c:['sports']},
  {G:'🎭 ENTRETENIMENTO'},
  {id:'entr',e:'🎭',n:'Entretenimento',s:'Comédia · variedades',t:'api',c:['entertainment','comedy','general']},
  {id:'fil',e:'🎬',n:'Filmes & Séries',s:'Filmes · séries · animação',t:'api',c:['movies','series','animation']},
  {id:'mus',e:'🎵',n:'Música',s:'Canais de música ao vivo',t:'api',c:['music']},
  {G:'🌿 ESTILO DE VIDA'},
  {id:'docs',e:'🎥',n:'Documentários',s:'Documentários do mundo',t:'api',c:['documentary']},
  {id:'kids',e:'🧸',n:'Kids & Família',s:'Infantil · família',t:'api',c:['kids','family']},
  {id:'edu',e:'🎓',n:'Educação & Cultura',s:'Educação · ciência',t:'api',c:['education','culture','science']},
  {id:'life',e:'🌿',n:'Lifestyle',s:'Culinária · viagem',t:'api',c:['cooking','travel','lifestyle']}
];

// Estado global
var SCR = 'menu';
var mItems = [], mIdx = 0;
var cItems = [], cIdx = 0;
var channels = [];
var channelsOriginais = [];
var retryFn = null;
var hls = null;
var ovTmr = null;
var failTmr = null;
var playing = false;
var apiCache = null;
var currentCategory = null;
var sincronizando = false;

// localStorage keys
var STORAGE_CANAL_STATUS = 'iptv_k10_status_v4';
var STORAGE_CANAL_BANIDOS = 'iptv_k10_banidos_v4';
var STORAGE_LAST_SYNC = 'iptv_k10_last_sync_v4';
var DIAS_SINCRONIZACAO = 7;
var LIMITE_ERRORS_PARA_BAN = 3;

// Carregar status dos canais
function loadCanalStatus() {
  try { var s = localStorage.getItem(STORAGE_CANAL_STATUS); return s ? JSON.parse(s) : {}; } catch(e) { return {}; }
}
function loadCanalBanidos() {
  try { var s = localStorage.getItem(STORAGE_CANAL_BANIDOS); return s ? JSON.parse(s) : {}; } catch(e) { return {}; }
}

var canalStatus = loadCanalStatus();
var canalBanidos = loadCanalBanidos();

function saveCanalStatus() { localStorage.setItem(STORAGE_CANAL_STATUS, JSON.stringify(canalStatus)); }
function saveCanalBanidos() { localStorage.setItem(STORAGE_CANAL_BANIDOS, JSON.stringify(canalBanidos)); }

function precisaSincronizar() {
  var lastSync = localStorage.getItem(STORAGE_LAST_SYNC);
  if (!lastSync) return true;
  return (Date.now() - parseInt(lastSync)) / (1000 * 60 * 60 * 24) >= DIAS_SINCRONIZACAO;
}

function marcarSincronizacao() {
  localStorage.setItem(STORAGE_LAST_SYNC, Date.now().toString());
}

// Reportar erro do canal (chamado quando o usuário tenta assistir e dá erro)
function reportarErroCanal(channelId, categoriaId) {
  var key = categoriaId + '_' + channelId;
  if (!canalStatus[key]) {
    canalStatus[key] = { erros: 0, ultimoErro: Date.now(), status: 'desconhecido' };
  }
  canalStatus[key].erros = (canalStatus[key].erros || 0) + 1;
  canalStatus[key].ultimoErro = Date.now();
  
  // Se erros >= LIMITE_ERRORS_PARA_BAN, bane o canal
  if (canalStatus[key].erros >= LIMITE_ERRORS_PARA_BAN) {
    canalBanidos[channelId] = {
      banidoEm: Date.now(),
      motivo: 'erros_repetidos',
      categoria: categoriaId
    };
    saveCanalBanidos();
    document.getElementById('statusBar').innerHTML = '🚫 Canal banido: ' + channelId.substring(0, 20);
    setTimeout(function() {
      if (document.getElementById('statusBar').innerHTML.includes('banido')) {
        document.getElementById('statusBar').innerHTML = '✅ Pronto';
      }
    }, 3000);
  }
  
  saveCanalStatus();
  return canalStatus[key].erros;
}

// Reportar sucesso do canal (quando funciona)
function reportarSucessoCanal(channelId, categoriaId) {
  var key = categoriaId + '_' + channelId;
  if (!canalStatus[key]) {
    canalStatus[key] = { sucessos: 1, status: 'bom' };
  } else {
    canalStatus[key].sucessos = (canalStatus[key].sucessos || 0) + 1;
    canalStatus[key].status = 'bom';
    // Resetar erros se tiver sucesso
    if (canalStatus[key].erros) {
      canalStatus[key].erros = 0;
    }
  }
  
  // Se o canal estava banido, desbanir
  if (canalBanidos[channelId]) {
    delete canalBanidos[channelId];
    saveCanalBanidos();
    document.getElementById('statusBar').innerHTML = '✅ Canal recuperado: ' + channelId.substring(0, 20);
    setTimeout(function() {
      if (document.getElementById('statusBar').innerHTML.includes('recuperado')) {
        document.getElementById('statusBar').innerHTML = '✅ Pronto';
      }
    }, 3000);
  }
  
  saveCanalStatus();
}

// Verificar se canal está banido
function isCanalBanido(channelId) {
  return !!canalBanidos[channelId];
}

// ============================================================
// FUNÇÕES DE REDE
// ============================================================
function get(url, cb, timeoutMs) {
  timeoutMs = timeoutMs || 15000;
  var x = new XMLHttpRequest();
  x.open('GET', url);
  x.timeout = timeoutMs;
  x.onreadystatechange = function() {
    if (x.readyState !== 4) return;
    if (x.status >= 200 && x.status < 300) cb(null, x.responseText);
    else cb('HTTP ' + x.status);
  };
  x.ontimeout = function() { cb('timeout'); };
  x.onerror = function() { cb('erro'); };
  try { x.send(); } catch(e) { cb(e.message); }
}

function getJSON(url, cb) {
  get(url, function(e, t) {
    if (e) return cb(e);
    try { cb(null, JSON.parse(t)); }
    catch(x) { cb('JSON inválido'); }
  });
}

function fetchApiWithFallback(cb) {
  if (apiCache) return cb(null, apiCache);
  
  var idx = 0;
  var lastErr = null;
  
  function tryNext() {
    if (idx >= API_SERVERS.length) {
      cb(lastErr || 'Todos os servidores falharam');
      return;
    }
    
    var server = API_SERVERS[idx++];
    var done = 0;
    var chs = null, strs = null;
    var err = null;
    
    function checkDone() {
      if (++done < 2) return;
      if (err) {
        lastErr = err;
        tryNext();
      } else {
        apiCache = { chs: chs, strs: strs };
        cb(null, apiCache);
      }
    }
    
    getJSON(server + '/channels.json', function(e, d) {
      if (e) { err = e; checkDone(); }
      else { chs = d; checkDone(); }
    });
    
    getJSON(server + '/streams.json', function(e, d) {
      if (e) { err = e; checkDone(); }
      else { strs = d; checkDone(); }
    });
  }
  
  tryNext();
}

function buildChannelList(data, filterCats) {
  var streamMap = {};
  for (var i = 0; i < data.strs.length; i++) {
    streamMap[data.strs[i].channel] = data.strs[i].url;
  }
  
  var out = [];
  for (var j = 0; j < data.chs.length && out.length < 2000; j++) {
    var ch = data.chs[j];
    var url = streamMap[ch.id];
    if (!url) continue;
    
    var chCats = ch.categories || [];
    var isAdult = false;
    for (var k = 0; k < chCats.length; k++) {
      if (chCats[k] === 'xxx' || chCats[k] === 'adult' || chCats[k] === 'porn') {
        isAdult = true;
        break;
      }
    }
    if (isAdult) continue;
    
    if (filterCats && filterCats.length > 0) {
      var hasCat = false;
      for (var c = 0; c < chCats.length; c++) {
        if (filterCats.indexOf(chCats[c]) !== -1) {
          hasCat = true;
          break;
        }
      }
      if (!hasCat) continue;
    }
    
    var country = (ch.country || '').toUpperCase();
    out.push({
      id: ch.id,
      name: ch.name,
      logo: ch.logo || '',
      country: country,
      flag: FLAGS[country] || '🌐',
      cat: chCats.join(', '),
      url: url
    });
  }
  
  return out;
}

// ============================================================
// TESTE LEVE DE CANAL
// ============================================================
function testarCanalLeve(channel, callback) {
  var url = channel.url;
  var xhr = new XMLHttpRequest();
  var timeout = setTimeout(function() {
    if (xhr) { try { xhr.abort(); } catch(e) {} }
    callback(false, 'timeout');
  }, 3000);
  
  xhr.open('HEAD', url, true);
  xhr.timeout = 3000;
  
  xhr.onload = function() {
    clearTimeout(timeout);
    callback(true, null);
  };
  
  xhr.onerror = function() {
    clearTimeout(timeout);
    callback(false, 'erro');
  };
  
  xhr.ontimeout = function() {
    clearTimeout(timeout);
    callback(false, 'timeout');
  };
  
  try { xhr.send(); } catch(e) { callback(false, 'exception'); }
}

// ============================================================
// SINCRONIZAÇÃO INTELIGENTE
// ============================================================
function sincronizarCanais() {
  if (sincronizando) return;
  if (!currentCategory || !channelsOriginais.length) return;
  
  sincronizando = true;
  var progressBar = document.getElementById('progressBar');
  var statusBar = document.getElementById('statusBar');
  var syncBtn = document.getElementById('c-sync');
  
  progressBar.style.display = 'block';
  statusBar.innerHTML = '🔄 Sincronizando canais...';
  syncBtn.classList.add('sincronizando');
  syncBtn.innerHTML = '⏳ Sincronizando...';
  
  // Garantir que a categoria existe no status
  if (!canalStatus[currentCategory.id]) {
    canalStatus[currentCategory.id] = {};
  }
  
  var agora = Date.now();
  var limiteDias = DIAS_SINCRONIZACAO * 24 * 60 * 60 * 1000;
  
  // Separar canais em categorias
  var canaisNovos = [];
  var canaisParaTestar = [];
  var canaisRecuperar = [];
  
  for (var i = 0; i < channelsOriginais.length; i++) {
    var ch = channelsOriginais[i];
    var status = canalStatus[currentCategory.id][ch.id];
    var estaBanido = isCanalBanido(ch.id);
    
    if (!status) {
      // Canal novo
      canaisNovos.push(ch);
    } else if (status.status === 'ruim' && (agora - status.lastCheck > limiteDias)) {
      // Canal ruim há mais de 7 dias - testar novamente para ver se recuperou
      canaisRecuperar.push(ch);
    } else if (!status.lastCheck || (agora - status.lastCheck > limiteDias)) {
      // Canal expirado
      canaisParaTestar.push(ch);
    }
  }
  
  // Mostrar canais novos
  if (canaisNovos.length > 0) {
    statusBar.innerHTML = '🆕 ' + canaisNovos.length + ' canais novos detectados!';
    setTimeout(function() { if (statusBar.innerHTML.includes('novos')) statusBar.innerHTML = '✅ Pronto'; }, 3000);
  }
  
  // Canais para recuperar (testar novamente)
  var todosTestar = canaisNovos.concat(canaisParaTestar).concat(canaisRecuperar);
  var total = todosTestar.length;
  
  if (total === 0) {
    progressBar.style.display = 'none';
    statusBar.innerHTML = '✅ Tudo atualizado';
    syncBtn.classList.remove('sincronizando');
    syncBtn.innerHTML = '🔄 Sincronizar';
    sincronizando = false;
    // Apenas carregar lista com filtros atuais
    carregarCanaisFiltrados();
    return;
  }
  
  statusBar.innerHTML = '🔍 Testando ' + total + ' canais...';
  var testados = 0;
  var bons = 0;
  var ruins = 0;
  var recuperados = 0;
  var index = 0;
  var CONCORRENCIA = 2;
  var ativos = 0;
  
  function testarProximo() {
    if (index >= total) {
      if (ativos === 0) {
        marcarSincronizacao();
        saveCanalStatus();
        progressBar.style.display = 'none';
        var msg = '✅ ' + bons + ' bons';
        if (ruins > 0) msg += ', ' + ruins + ' ruins';
        if (recuperados > 0) msg += ', 🔄 ' + recuperados + ' recuperados';
        if (canaisNovos.length > 0) msg += ', 🆕 ' + canaisNovos.length + ' novos';
        statusBar.innerHTML = msg;
        syncBtn.classList.remove('sincronizando');
        syncBtn.innerHTML = '🔄 Sincronizar';
        setTimeout(function() {
          if (statusBar.innerHTML !== '🔍 Testando...') {
            statusBar.innerHTML = '✅ Pronto';
          }
        }, 4000);
        sincronizando = false;
        carregarCanaisFiltrados();
      }
      return;
    }
    
    if (ativos >= CONCORRENCIA) {
      setTimeout(testarProximo, 100);
      return;
    }
    
    var ch = todosTestar[index];
    var idxAtual = index;
    var ehRecuperacao = canaisRecuperar.indexOf(ch) !== -1;
    var ehNovo = canaisNovos.indexOf(ch) !== -1;
    index++;
    ativos++;
    
    progressBar.innerHTML = '🔍 ' + idxAtual + '/' + total + '<br>' + ch.name.substring(0, 35);
    
    testarCanalLeve(ch, function(funciona, erro) {
      ativos--;
      testados++;
      
      var statusAnterior = canalStatus[currentCategory.id][ch.id];
      var eraRuim = statusAnterior && statusAnterior.status === 'ruim';
      
      if (funciona) {
        bons++;
        canalStatus[currentCategory.id][ch.id] = {
          status: 'bom',
          lastCheck: Date.now(),
          name: ch.name
        };
        
        // Se era ruim e agora funciona, é recuperação
        if (eraRuim) {
          recuperados++;
          // Desbanir se estava banido
          if (canalBanidos[ch.id]) {
            delete canalBanidos[ch.id];
            saveCanalBanidos();
          }
          statusBar.innerHTML = '🔄 Canal recuperado: ' + ch.name.substring(0, 30);
        } else if (ehNovo) {
          statusBar.innerHTML = '🆕 Novo canal: ' + ch.name.substring(0, 30);
        }
      } else {
        ruins++;
        canalStatus[currentCategory.id][ch.id] = {
          status: 'ruim',
          lastCheck: Date.now(),
          name: ch.name
        };
      }
      
      // Salvar a cada 10 canais
      if (testados % 10 === 0) {
        saveCanalStatus();
      }
      
      setTimeout(testarProximo, 200);
    });
    
    setTimeout(testarProximo, 100);
  }
  
  testarProximo();
}

// Carregar canais filtrados (excluindo banidos e ruins)
function carregarCanaisFiltrados() {
  if (!currentCategory) return;
  
  var catStatus = canalStatus[currentCategory.id] || {};
  
  var canaisFiltrados = channels.filter(function(ch) {
    // Se canal está banido, não aparece
    if (isCanalBanido(ch.id)) return false;
    
    var status = catStatus[ch.id];
    // Se nunca foi testado, aparece (vai ser testado na sincronização)
    if (!status) return true;
    // Se é bom, aparece
    if (status.status === 'bom') return true;
    // Se é ruim, some da lista
    return false;
  });
  
  // Ordenar por nome
  canaisFiltrados.sort(function(a, b) {
    return a.name.localeCompare(b.name);
  });
  
  var canaisOcultos = channels.length - canaisFiltrados.length;
  if (canaisOcultos > 0) {
    var statusBar = document.getElementById('statusBar');
    statusBar.innerHTML = '🗑️ ' + canaisOcultos + ' canais ocultos';
    setTimeout(function() {
      if (statusBar.innerHTML.includes('canais ocultos')) {
        statusBar.innerHTML = '✅ Pronto';
      }
    }, 3000);
  }
  
  renderList(canaisFiltrados);
}

// ============================================================
// UI FUNCTIONS
// ============================================================
function esc(s) {
  return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function setState(state, msg) {
  document.getElementById('c-load').style.display = state === 'load' ? 'flex' : 'none';
  document.getElementById('c-err').style.display = state === 'err' ? 'flex' : 'none';
  document.getElementById('c-list').style.display = state === 'list' ? 'block' : 'none';
  if (state === 'load') document.getElementById('l-txt').textContent = msg || '';
  if (state === 'err') {
    document.getElementById('e-txt').textContent = msg || '';
    cItems = [document.getElementById('c-back'), document.getElementById('c-retry')];
    cIdx = 1;
    setFoc(cItems[1]);
  }
}

function showScr(name) {
  ['menu', 'channels', 'player'].forEach(function(s) {
    document.getElementById('s-' + s).classList[s === name ? 'add' : 'remove']('on');
  });
  SCR = name;
  if (name === 'menu' && mItems.length) setFoc(mItems[mIdx]);
  if (name === 'player') setFoc(document.getElementById('p-back'));
  if (name === 'channels' && cItems.length > 0 && cIdx < cItems.length) {
    setTimeout(function() { setFoc(cItems[cIdx]); }, 50);
  }
}

function setFoc(el) {
  if (!el) return;
  document.querySelectorAll('.foc').forEach(function(x) { x.classList.remove('foc'); });
  el.classList.add('foc');
  try { el.focus(); } catch(e) {}
  try { el.scrollIntoView({ block: 'nearest' }); } catch(e) {}
}

// ============================================================
// CARREGAR CATEGORIA
// ============================================================
function loadCat(cat) {
  currentCategory = cat;
  showScr('channels');
  document.getElementById('c-title').textContent = cat.e + ' ' + cat.n;
  document.getElementById('c-cnt').textContent = '';
  setState('load', 'Carregando canais...');
  
  retryFn = function() { loadCat(cat); };
  
  fetchApiWithFallback(function(err, data) {
    if (err) {
      setState('err', 'Falha na API.\n' + err);
      return;
    }
    
    var chs = buildChannelList(data, cat.c);
    
    if (cat.id === 'brasil') {
      chs = chs.filter(function(ch) { return ch.country === 'BR'; });
    }
    
    if (chs.length === 0) {
      setState('err', 'Nenhum canal encontrado.');
      return;
    }
    
    channelsOriginais = chs.slice(); // Guardar original para detectar novos
    channels = chs;
    carregarCanaisFiltrados();
    
    // Verificar se precisa sincronizar
    if (precisaSincronizar()) {
      setTimeout(function() {
        if (currentCategory === cat) {
          sincronizarCanais();
        }
      }, 2000);
    }
  });
}

function renderList(chs) {
  var list = document.getElementById('c-list');
  list.innerHTML = '';
  setState('list');
  document.getElementById('c-cnt').textContent = chs.length + ' canais ativos';
  
  cItems = [document.getElementById('c-back')];
  
  for (var i = 0; i < chs.length; i++) {
    var ch = chs[i];
    var el = document.createElement('div');
    el.className = 'ch';
    el.tabIndex = 0;
    el.setAttribute('data-i', i);
    
    // Verificar se é canal novo ou recuperado para animação
    var catStatus = canalStatus[currentCategory.id] || {};
    var status = catStatus[ch.id];
    var ehNovo = !status;
    var ehRecuperado = status && status.status === 'bom' && status.recuperado;
    
    if (ehNovo) el.classList.add('ch-new');
    if (ehRecuperado) el.classList.add('ch-recovered');
    
    el.innerHTML = (ch.logo ? 
      '<img class="ch-lg" src="' + esc(ch.logo) + '" onerror="this.style.display=\'none\'" alt="">' :
      '<span class="ch-fl">' + ch.flag + '</span>'
    ) + '<div><div class="ch-nm">' + esc(ch.name) + '</div>' +
      (ch.cat ? '<div class="ch-ct">' + ch.flag + ' ' + esc(ch.cat) + '</div>' : '') + '</div>';
    
    (function(idx, item) {
      el.addEventListener('click', function() { play(idx); });
      el.addEventListener('mouseover', function() {
        var i = cItems.indexOf(item);
        if (i >= 0) cIdx = i;
        setFoc(item);
      });
    })(i, el);
    
    list.appendChild(el);
    cItems.push(el);
  }
  
  cIdx = 1;
  setFoc(cItems[1] || cItems[0]);
  
  // Configurar botão de sincronização
  var syncBtn = document.getElementById('c-sync');
  syncBtn.onclick = function() {
    if (syncBtn.classList.contains('sincronizando')) return;
    sincronizarCanais();
  };
}

// ============================================================
// PLAYER
// ============================================================
function stopHls() {
  if (hls) {
    try { hls.destroy(); } catch(e) {}
    hls = null;
  }
}

function voltaCanais() {
  if (playing) return;
  clearTimeout(failTmr);
  stopHls();
  showScr('channels');
  if (cItems && cItems.length > 0 && cIdx < cItems.length) {
    setTimeout(function() { setFoc(cItems[cIdx]); }, 50);
  }
}

function play(idx) {
  var ch = channelsParaExibir ? channelsParaExibir[idx] : null;
  if (!ch) return;
  
  playing = false;
  clearTimeout(failTmr);
  stopHls();
  
  document.getElementById('p-nm').textContent = ch.flag + ' ' + ch.name;
  document.getElementById('p-inf').textContent = ch.cat || ch.country || '';
  document.getElementById('p-st').textContent = '⏳ Conectando...';
  showScr('player');
  showOv();
  
  var vid = document.getElementById('vid');
  vid.src = '';
  
  var timeoutId = setTimeout(function() {
    if (!playing) {
      document.getElementById('p-st').textContent = '❌ Canal offline';
      // Reportar erro para o sistema de banimento
      var erros = reportarErroCanal(ch.id, currentCategory.id);
      if (erros >= LIMITE_ERRORS_PARA_BAN) {
        document.getElementById('statusBar').innerHTML = '🚫 Canal banido após ' + erros + ' erros';
      }
      voltaCanais();
    }
  }, 20000);
  failTmr = timeoutId;
  
  var url = ch.url;
  
  var successHandler = function() {
    clearTimeout(timeoutId);
    playing = true;
    document.getElementById('p-st').textContent = '▶ Ao vivo';
    // Reportar sucesso
    reportarSucessoCanal(ch.id, currentCategory.id);
  };
  
  if (url.indexOf('.m3u8') !== -1 || url.indexOf('m3u8') !== -1) {
    if (typeof Hls !== 'undefined' && Hls.isSupported()) {
      hls = new Hls({ maxBufferLength: 30, startLevel: -1, debug: false });
      hls.loadSource(url);
      hls.attachMedia(vid);
      hls.on(Hls.Events.MANIFEST_PARSED, function() { successHandler(); try { vid.play(); } catch(e) {} });
      hls.on(Hls.Events.ERROR, function(ev, data) {
        if (data.fatal) {
          document.getElementById('p-st').textContent = '❌ Erro';
          reportarErroCanal(ch.id, currentCategory.id);
          voltaCanais();
        }
      });
    } else {
      vid.src = url;
      vid.oncanplay = successHandler;
      vid.onerror = function() {
        document.getElementById('p-st').textContent = '❌ Erro';
        reportarErroCanal(ch.id, currentCategory.id);
        voltaCanais();
      };
      try { vid.load(); vid.play(); } catch(e) {}
    }
  } else {
    vid.src = url;
    vid.oncanplay = successHandler;
    vid.onerror = function() {
      document.getElementById('p-st').textContent = '❌ Erro';
      reportarErroCanal(ch.id, currentCategory.id);
      voltaCanais();
    };
    try { vid.load(); vid.play(); } catch(e) {}
  }
}

function showOv() {
  var ov = document.getElementById('p-ov');
  ov.classList.remove('hide');
  clearTimeout(ovTmr);
  ovTmr = setTimeout(function() { ov.classList.add('hide'); }, 4000);
}

// ============================================================
// TECLADO
// ============================================================
document.addEventListener('keydown', function(e) {
  var k = e.keyCode || e.which;
  var UP = k === 38, DN = k === 40, OK = k === 13 || k === 32, BK = k === 8 || k === 27;
  var teclas = [4,8,13,27,32,36,37,38,39,40,88,166,196,457,461,1009,10009,10182];
  if (teclas.indexOf(k) !== -1) e.preventDefault();
  
  if (SCR === 'menu') {
    if (UP && mIdx > 0) { mIdx--; setFoc(mItems[mIdx]); }
    else if (DN && mIdx < mItems.length - 1) { mIdx++; setFoc(mItems[mIdx]); }
    else if (OK && mItems[mIdx] && mItems[mIdx]._cat) { loadCat(mItems[mIdx]._cat); }
  }
  else if (SCR === 'channels') {
    if (BK) { stopHls(); showScr('menu'); }
    else if (UP && cIdx > 0) { cIdx--; setFoc(cItems[cIdx]); }
    else if (DN && cIdx < cItems.length - 1) { cIdx++; setFoc(cItems[cIdx]); }
    else if (OK && cItems[cIdx]) {
      var el = cItems[cIdx];
      if (el.id === 'c-back') showScr('menu');
      else if (el.id === 'c-retry') { if (retryFn) retryFn(); }
      else if (el.id === 'c-sync') sincronizarCanais();
      else {
        var idx = parseInt(el.getAttribute('data-i') || '-1');
        if (idx >= 0) play(idx);
      }
    }
  }
  else if (SCR === 'player') {
    if (BK) { stopHls(); showScr('channels'); }
    else showOv();
  }
});

// ============================================================
// MONTAR MENU
// ============================================================
(function() {
  var side = document.getElementById('m-side');
  
  for (var i = 0; i < CATS.length; i++) {
    var d = CATS[i];
    if (d.G) {
      var g = document.createElement('div');
      g.className = 'm-grp';
      g.textContent = d.G;
      side.appendChild(g);
    } else {
      var el = document.createElement('div');
      el.className = 'm-item';
      el.tabIndex = 0;
      el.innerHTML = '<span class="m-ico">' + d.e + '</span><div><div class="m-lbl">' + esc(d.n) + '</div><div class="m-sub">' + esc(d.s) + '</div></div>';
      el._cat = d;
      
      (function(cat, item, idx) {
        el.addEventListener('click', function() { loadCat(cat); });
        el.addEventListener('mouseover', function() { mIdx = idx; setFoc(item); });
      })(d, el, mItems.length);
      
      side.appendChild(el);
      mItems.push(el);
    }
  }
  
  document.getElementById('c-back').addEventListener('click', function() { showScr('menu'); });
  document.getElementById('c-retry').addEventListener('click', function() { if (retryFn) retryFn(); });
  document.getElementById('p-back').addEventListener('click', function() { stopHls(); showScr('channels'); });
  document.getElementById('s-player').addEventListener('mousemove', showOv);
  
  if (mItems.length) setFoc(mItems[0]);
})();
