<style>

html,body{height:100%;width:100%;overflow:hidden}
body{background:#07090f;color:#e2e8f0;font-family:Arial,sans-serif;position:fixed;top:0;right:0;bottom:0;left:0}

#c-back{background:#111e38;border:2px solid #38bdf8;color:#38bdf8;font-size:16px;padding:6px 14px;-webkit-border-radius:7px;border-radius:7px;cursor:pointer;-webkit-flex-shrink:0;flex-shrink:0}

.ch-info{-webkit-box-flex:1;-webkit-flex:1;flex:1;min-width:0}

.ch-lang{font-size:9px;padding:2px 6px;-webkit-border-radius:10px;border-radius:10px;background:#1a2540;color:#94a3b8}

.ch-actions{display:-webkit-box;display:-webkit-flex;display:flex;-webkit-flex-shrink:0;flex-shrink:0}

.ch-delete:hover{color:#ef4444}

#s-player{background:#000;position:relative}
#vid{width:100%;height:100%}
.p-ov{position:absolute;top:0;right:0;bottom:0;left:0;display:-webkit-box;display:-webkit-flex;display:flex;-webkit-box-orient:vertical;-webkit-box-direction:normal;-webkit-flex-direction:column;flex-direction:column;-webkit-box-pack:justify;-webkit-justify-content:space-between;justify-content:space-between;-webkit-transition:opacity .4s;transition:opacity .4s}

.p-top{background:-webkit-linear-gradient(top,rgba(0,0,0,.73),transparent);background:linear-gradient(rgba(0,0,0,.73),transparent);padding:16px 24px}

.p-bot{background:-webkit-linear-gradient(top,transparent,rgba(0,0,0,.73));background:linear-gradient(transparent,rgba(0,0,0,.73));padding:14px 24px;display:-webkit-box;display:-webkit-flex;display:flex;-webkit-box-pack:justify;-webkit-justify-content:space-between;justify-content:space-between;-webkit-box-align:end;-webkit-align-items:flex-end;align-items:flex-end}

.verify-status{position:fixed;bottom:10px;right:10px;background:#111e38;padding:5px 12px;-webkit-border-radius:20px;border-radius:20px;font-size:10px;color:#38bdf8;z-index:100}
#verify-progress{position:fixed;bottom:50px;right:10px;background:#0b0f1c;padding:8px 15px;-webkit-border-radius:20px;border-radius:20px;font-size:11px;color:#10b981;z-index:100;display:none;border:1px solid #38bdf8;max-width:300px;text-align:center}
.telemetry-indicator{position:fixed;bottom:15px;left:15px;background:#0a2a1a;-webkit-border-radius:20px;border-radius:20px;padding:5px 12px;display:-webkit-box;display:-webkit-flex;display:flex;-webkit-box-align:center;-webkit-align-items:center;align-items:center;font-size:10px;z-index:1000;border:1px solid #10b981}
.telemetry-indicator > * + *{margin-left:8px}
.telemetry-dot{width:8px;height:8px;-webkit-border-radius:50%;border-radius:50%;background:#10b981;-webkit-animation:pulse 1.5s infinite;animation:pulse 1.5s infinite}
.telemetry-text{color:#4ade80;font-weight:600}
.mode-badge{position:fixed;bottom:15px;right:15px;background:#1a2540;-webkit-border-radius:20px;border-radius:20px;padding:5px 12px;font-size:10px;z-index:1000;border:1px solid #38bdf8;color:#38bdf8;font-weight:600}
@-webkit-keyframes pulse{0%,100%{opacity:1;-webkit-transform:scale(1);transform:scale(1)}50%{opacity:.5;-webkit-transform:scale(0.8);transform:scale(0.8)}}
@keyframes pulse{0%,100%{opacity:1;-webkit-transform:scale(1);transform:scale(1)}50%{opacity:.5;-webkit-transform:scale(0.8);transform:scale(0.8)}}
@-webkit-keyframes sp{to{-webkit-transform:rotate(360deg);transform:rotate(360deg)}}
@keyframes sp{to{-webkit-transform:rotate(360deg);transform:rotate(360deg)}}
.m-item,.ch,.ch-fav,.ch-delete,#c-back,#c-retry,#p-back,button{cursor:pointer}
#c-list::-webkit-scrollbar{width:12px;display:block}

.m-side::-webkit-scrollbar{width:6px}
.m-side::-webkit-scrollbar-track{background:#07090f}
.m-side::-webkit-scrollbar-thumb{background:#1a2540;-webkit-border-radius:3px;border-radius:3px}
body.cursor-off,body.cursor-off *{cursor:none!important}
.scroll-zone{position:absolute;left:0;right:0;height:70px;z-index:10;opacity:0;-webkit-transition:opacity .3s;transition:opacity .3s}
.scroll-zone.top{top:0;background:-webkit-linear-gradient(top,#0b0f1c,transparent);background:linear-gradient(#0b0f1c,transparent)}
.scroll-zone.bot{bottom:0;background:-webkit-linear-gradient(top,transparent,#0b0f1c);background:linear-gradient(transparent,#0b0f1c)}
.scroll-zone.active{opacity:1}
.ch:hover{-webkit-transform:scale(1.005);transform:scale(1.005)}
</style>
</head>
<body>

  </div>
  <div class="m-hint">
    <div class="big">&#128250;</div>

    <div class="t2">&#8593;&#8595; navegar &nbsp;&middot;&nbsp; ENTER selecionar &nbsp;&middot;&nbsp; VOLTAR recuar</div>
  </div>
</div>

<div id="s-channels" class="scr">
  <div class="c-head">
    <button id="c-back">&#9664; Voltar</button>

    <span id="c-cnt"></span>

    <div id="c-load"><div class="spin"></div><div class="ltxt" id="l-txt">Carregando...</div></div>

    <button id="btn-scroll-dn" title="Rolar para baixo" style="display:none;position:absolute;right:4px;bottom:8px;z-index:20;background:#38bdf8;color:#07090f;border:none;border-radius:6px;width:32px;height:44px;font-size:18px;cursor:pointer;font-weight:bold">&#9660;</button>

<script>
// ============================================================
// POLYFILLS - compatibilidade Smart TV 2012+
// ============================================================
if(typeof document.createElement('div').classList==='undefined'){
  (function(w){
    var d=w.document;
    function DOMTokenList(el){this._el=el;this._update()}
    DOMTokenList.prototype={add:function(c){var a=this._arr();if(a.indexOf(c)===-1)a.push(c);this._el.className=a.join(' ');this._update()},remove:function(c){var a=this._arr();var n=[];for(var i=0;i<a.length;i++)if(a[i]!==c)n.push(a[i]);this._el.className=n.join(' ');this._update()},contains:function(c){return this._arr().indexOf(c)!==-1},toggle:function(c){this.contains(c)?this.remove(c):this.add(c)},_arr:function(){var v=this._el.className;return v?v.split(' '):[]},_update:function(){}};
    Object.defineProperty(d.createElement('_'),'classList',{get:function(){return new DOMTokenList(this)}});

  })(window);
}
if(!Element.prototype.closest){
  Element.prototype.closest=function(s){
    var el=this;
    while(el&&el.nodeType===1){
      if(el.matches?el.matches(s):(el.msMatchesSelector?el.msMatchesSelector(s):(el.webkitMatchesSelector?el.webkitMatchesSelector(s):false)))return el;
      el=el.parentNode;
    }
    return null;
  };
}
if(!Element.prototype.matches){
  Element.prototype.matches=Element.prototype.msMatchesSelector||Element.prototype.webkitMatchesSelector||function(s){var m=(this.document||this.ownerDocument).querySelectorAll(s);var i=0;while(m[i]&&m[i]!==this)++i;return !!m[i]};
}

  String.prototype.includes=function(s){return this.indexOf(s)!==-1};
}

(function(){
  var orig=EventTarget.prototype.addEventListener;
  if(!orig)return;
  EventTarget.prototype.addEventListener=function(type,fn,opts){
    var useCapture=false;
    if(opts&&typeof opts==='object'){
      useCapture=!!opts.capture;
      if(opts.once){
        var self=this;var wrapped=function(e){fn.call(this,e);try{orig.call(self,type,wrapped,useCapture)}catch(x){}};
        return orig.call(this,type,wrapped,useCapture);
      }
    } else if(typeof opts==='boolean'){
      useCapture=opts;
    }
    return orig.call(this,type,fn,useCapture);
  };

var hlsLoaded=false;

function fs(){
  var e=document.documentElement;
  var f=e.requestFullscreen||e.webkitRequestFullscreen||e.mozRequestFullScreen||e.msRequestFullscreen;
  try{if(f)f.call(e)}catch(x){}
}
document.addEventListener('keydown',fs,{once:true});

// ============================================================
// DETECÇÃO DE DISPOSITIVO
// ============================================================
function isTV(){
  var ua=navigator.userAgent.toLowerCase();
  return ua.indexOf('tv')!==-1||ua.indexOf('smarttv')!==-1||ua.indexOf('webos')!==-1||
         ua.indexOf('tizen')!==-1||ua.indexOf('vidaa')!==-1||ua.indexOf('android.tv')!==-1;
}
var modoTV=isTV();
var modeBadge=document.getElementById('modeBadge');
if(modoTV){modeBadge.innerHTML='&#128250; Modo TV (leve)'}
else{modeBadge.innerHTML='&#128187; Modo Computador (rapido)'}

// ============================================================

  function(u){ return 'https://api.codetabs.com/v1/proxy?quest='+encodeURIComponent(u); }

function registrarTelemetria(ch,status){

// ============================================================
// FUNÇÕES DE REDE (COM FALLBACK DE PROXY)
// ============================================================
function requestUrl(url, cb) {
  var x=new XMLHttpRequest();
  x.open('GET', url);
  x.timeout=16000;
  x.onreadystatechange=function(){
    if(x.readyState!==4)return;
    if(x.status>=200 && x.status<300) cb(null, x.responseText);
    else cb('HTTP '+x.status);
  };
  x.ontimeout=function(){cb('timeout')};
  x.onerror=function(){cb('erro de rede')};
  try{x.send()}catch(e){cb(e.message)}
}

function getWithProxy(urls, cb) {
  var tries = [];
  for(var i=0;i<urls.length;i++){
    tries.push(urls[i]);
    for(var j=0;j<CORS_PROXIES.length;j++){
      tries.push(CORS_PROXIES[j](urls[i]));
    }
  }
  var idx=0;
  (function next(){
    if(idx>=tries.length) return cb('Todas as fontes falharam (CORS/offline)');
    requestUrl(tries[idx++], function(e,data){
      if(!e && data && data.length>10){
        cb(null, data);
      } else {
        next();
      }
    });
  })();
}

// API do iptv-org: agora usa proxy também
function getApi(cb){
  if(apiCache) return cb(null, apiCache);
  var CH_URL = API_BASE + '/channels.json';
  var ST_URL = API_BASE + '/streams.json';
  var chs=null, strs=null, err=null;
  var done=0;
  function check(){
    if(++done<2) return;
    if(err) return cb(err);
    apiCache = {chs:chs, strs:strs};
    cb(null, apiCache);
  }
  // channels
  getWithProxy([CH_URL], function(e,d){
    if(e){ err=e; check(); return; }
    try{ chs=JSON.parse(d); check(); }catch(e){ err='JSON invalido (channels)'; check(); }
  });
  // streams
  getWithProxy([ST_URL], function(e,d){
    if(e){ err=e; check(); return; }
    try{ strs=JSON.parse(d); check(); }catch(e){ err='JSON invalido (streams)'; check(); }
  });
}

function getM3u(urls,cb){
  getWithProxy(urls, function(e,data){
    if(e) return cb(e);
    if(data.indexOf('#EXTM3U')===-1 && data.indexOf('#EXTINF')===-1)
      return cb('Arquivo não parece M3U');
    cb(null, data);
  });
}

function parseM3u(txt){
  var lines=txt.split('\n'),out=[],cur=null;
  for(var i=0;i<lines.length && out.length<1500;i++){
    var l=lines[i].trim();
    if(l.indexOf('#EXTINF:')===0){
      var nm=l.match(/,(.+)$/), lg=l.match(/tvg-logo="([^"]+)"/), co=l.match(/tvg-country="([^"]+)"/);
      var c=co?co[1].split(';')[0].toUpperCase():'';
      cur={name:nm?nm[1].trim():'Canal', logo:lg?lg[1]:'', country:c, flag:getFlag(c), cat:''};
    }else if(l && l.indexOf('#')!==0 && cur){
      cur.url=l;
      out.push(cur);
      cur=null;
    }
  }
  return out;
}

function buildApi(data,cats){
  var sm={};
  for(var i=0;i<data.strs.length;i++) if(data.strs[i].channel) sm[data.strs[i].channel]=data.strs[i].url;
  var out=[];
  for(var j=0;j<data.chs.length && out.length<2000;j++){
    var ch=data.chs[j];
    if(!sm[ch.id]) continue;
    if(cats){
      var ok=false;
      for(var k=0;k<(ch.categories||[]).length;k++) if(cats.indexOf(ch.categories[k])!==-1){ ok=true; break; }
      if(!ok) continue;
    }
    var co=(ch.country||'').toUpperCase();
    var language=(ch.languages && ch.languages[0]) || '';
    var langDisplay = language ? (getIdiomaFlag(language)+' '+language) : '&#127760;';
    out.push({
      id:ch.id,
      name:ch.name,
      logo:ch.logo||'',
      country:co,
      flag:getFlag(co),
      cat:(ch.categories||[]).join(', '),
      url:sm[ch.id],
      language:language,
      langDisplay:langDisplay
    });
  }
  return out;
}

function loadCat(cat){
  currentCategory=cat.id;
  showScr('channels');
  document.getElementById('c-title').textContent=cat.n;
  document.getElementById('c-cnt').textContent='';
  setState('load','Carregando canais...');
  retryFn=function(){loadCat(cat)};
  if(cat.t==='m3u'){
    getM3u(cat.u, function(e,txt){
      if(e) return setState('err','Falha M3U: '+e);
      var chs=parseM3u(txt);
      if(!chs.length) return setState('err','Nenhum canal encontrado na lista.');
      channels=chs; carregarCanaisFiltrados();
    });
  }else{
    getApi(function(e,data){
      if(e) return setState('err','Falha na API: '+e);
      var chs=buildApi(data,cat.c);
      if(!chs.length) return setState('err','Nenhum canal nesta categoria.');
      channels=chs; carregarCanaisFiltrados();
    });
  }
}

function carregarCanaisFiltrados(){
  if(!currentCategory) return;
  var catStatus=canalStatus[currentCategory]||{};
  var canaisFiltrados=[];
  for(var i=0;i<channels.length;i++){
    var ch=channels[i];
    if(excluidos[ch.id]) continue;
    var st=catStatus[ch.id];
    if(st && st.status==='ruim') continue;
    canaisFiltrados.push(ch);
  }
  canaisFiltrados.sort(function(a,b){
    var aFav=favoritos[a.id]?1:0;
    var bFav=favoritos[b.id]?1:0;
    if(aFav!==bFav) return bFav-aFav;
    return (a.name||'').localeCompare(b.name||'');
  });
  currentChannelsList=canaisFiltrados;
  renderList(canaisFiltrados);
}

var BATCH_SIZE=10;
var renderAllChannels=[];
var renderOffset=0;
var batchSentinel=null;
var batchObserver=null;

function criarElementoCanal(ch,i){
  var isFav=favoritos[ch.id];
  var el=document.createElement('div');
  el.className='ch'+(isFav?' ch-favorito':'');
  el.setAttribute('data-idx',i);

  var logoHtml=ch.logo
    ?'<img class="ch-lg" src="'+esc(ch.logo)+'" onerror="this.style.display=\'none\'" alt="">'
    :'<span class="ch-fl">'+ch.flag+'</span>';
  var langHtml='<span class="ch-lang">'+(ch.langDisplay||'&#127760;')+'</span>';
  var countryHtml='<span class="ch-country">'+ch.flag+' '+(ch.country||'Mundo')+'</span>';
  var catHtml=ch.cat?'<span class="ch-cat">'+esc(ch.cat.split(',')[0])+'</span>':'';

  el.innerHTML=logoHtml+
    '<div class="ch-info">'+
      '<div class="ch-nm">'+esc(ch.name)+'</div>'+
      '<div class="ch-details">'+langHtml+countryHtml+catHtml+'</div>'+
    '</div>'+
    '<div class="ch-actions">'+
      '<button class="ch-fav'+(isFav?' active':'')+'" data-id="'+esc(ch.id)+'">'+(isFav?'&#9733;':'&#9734;')+'</button>'+
      '<button class="ch-delete" data-id="'+esc(ch.id)+'">&#128465;</button>'+
    '</div>';

  (function(idx,item,channelId){
    el.onclick=function(e){
      var t=e.target||e.srcElement;
      if(t.className && (t.className.indexOf('ch-fav')!==-1 || t.className.indexOf('ch-delete')!==-1)) return;
      play(idx);
    };
    var favBtn=el.querySelector('.ch-fav');
    if(favBtn) favBtn.onclick=function(e){ e=e||window.event; if(e.stopPropagation)e.stopPropagation(); toggleFavorito(channelId,e); };
    var delBtn=el.querySelector('.ch-delete');
    if(delBtn) delBtn.onclick=function(e){ e=e||window.event; if(e.stopPropagation)e.stopPropagation(); excluirCanal(channelId,e); };
    el.onmouseover=function(){
      var pos=-1;
      for(var x=0;x<cItems.length;x++) if(cItems[x]===item){ pos=x; break; }
      if(pos>=0) cIdx=pos;
      setFoc(item);
    };
  })(i,el,ch.id);
  return el;
}

function removerSentinela(){
  if(batchObserver){ try{batchObserver.disconnect()}catch(e){} batchObserver=null; }
  if(batchSentinel && batchSentinel.parentNode) batchSentinel.parentNode.removeChild(batchSentinel);
  batchSentinel=null;
}

function adicionarSentinela(list){
  removerSentinela();
  if(renderOffset>=renderAllChannels.length) return;
  batchSentinel=document.createElement('div');
  batchSentinel.style.cssText='height:40px;text-align:center;color:#334155;font-size:12px;padding-top:12px';
  batchSentinel.innerHTML='&#9203; Carregando mais canais...';
  list.appendChild(batchSentinel);
  if(typeof IntersectionObserver!=='undefined'){
    batchObserver=new IntersectionObserver(function(entries){
      if(entries[0].isIntersecting) renderProximoLote();
    },{root:list,threshold:0.1});
    batchObserver.observe(batchSentinel);
  }
}

function renderProximoLote(){
  var list=document.getElementById('c-list');
  removerSentinela();
  var fim=Math.min(renderOffset+BATCH_SIZE, renderAllChannels.length);
  for(var i=renderOffset;i<fim;i++){
    var el=criarElementoCanal(renderAllChannels[i],i);
    list.appendChild(el); cItems.push(el);
  }
  renderOffset=fim;
  document.getElementById('c-cnt').textContent=renderOffset+(renderOffset<renderAllChannels.length?'/'+renderAllChannels.length:'')+' canais';
  if(renderOffset<renderAllChannels.length) adicionarSentinela(list);
  else document.getElementById('c-cnt').textContent=renderAllChannels.length+' canais';
}

function renderList(chs){
  var list=document.getElementById('c-list');
  list.innerHTML=''; removerSentinela();
  renderAllChannels=chs; renderOffset=0;
  setState('list');
  document.getElementById('c-cnt').textContent='0/'+chs.length+' canais';
  cItems=[document.getElementById('c-back')];
  renderProximoLote();
  cIdx=1; setFoc(cItems[1]||cItems[0]);
}

// PLAYER E VERIFICAÇÃO
// ============================================================
function voltaCanais(){
  if(playing) return;
  clearTimeout(failTmr); cancelarVerificacao(); stopHls();
  if(currentPlayingChannel) registrarTelemetria(currentPlayingChannel,'ruim');
  currentPlayingChannel=null; showScr('channels');
}
function stopHls(){ if(hls){ try{hls.destroy()}catch(e){} hls=null; } }

var qualityTimer1=null,qualityTimer2=null;
function cancelarVerificacao(){
  if(qualityTimer1){clearTimeout(qualityTimer1);qualityTimer1=null}
  if(qualityTimer2){clearTimeout(qualityTimer2);qualityTimer2=null}
}
function verificarQualidade(ch,vid){
  cancelarVerificacao();
  qualityTimer1=setTimeout(function(){
    if(!playing)return;
    var w=64,h=36,frame1=null;
    var audioBytes1=vid.webkitAudioDecodedByteCount||0;
    try{var c=document.createElement('canvas');c.width=w;c.height=h;var ctx=c.getContext('2d');ctx.drawImage(vid,0,0,w,h);frame1=ctx.getImageData(0,0,w,h).data;}catch(e){frame1=null}
    qualityTimer2=setTimeout(function(){
      if(!playing)return;
      var audioBytes2=vid.webkitAudioDecodedByteCount||0;
      var temAudio = (typeof vid.webkitAudioDecodedByteCount!=='undefined') ? (audioBytes2-audioBytes1)>100 : true;
      var videoMovendo=true;
      if(frame1){
        try{
          var c2=document.createElement('canvas');c2.width=w;c2.height=h;
          var ctx2=c2.getContext('2d');ctx2.drawImage(vid,0,0,w,h);
          var frame2=ctx2.getImageData(0,0,w,h).data;
          var diffPixels=0;
          for(var i=0;i<frame1.length;i+=4){
            var d=Math.abs(frame1[i]-frame2[i])+Math.abs(frame1[i+1]-frame2[i+1])+Math.abs(frame1[i+2]-frame2[i+2]);
            if(d>30) diffPixels++;
          }
          var pct=(diffPixels/(w*h))*100;
          videoMovendo = pct>0.5;
        }catch(e){videoMovendo=true}
      }
      var statusEl=document.getElementById('p-st');
      if(videoMovendo) statusEl.innerHTML='&#9654; Ao vivo';
      else if(temAudio) statusEl.innerHTML='&#127925; Radio / So audio';
      else{
        statusEl.innerHTML='X Sem video e sem audio';
        registrarTelemetria(ch,'ruim'); currentPlayingChannel=null;
        setTimeout(function(){stopHls();showScr('channels')},2500);
      }
    },3000);
  },4000);
}

function play(idx){
  var ch=currentChannelsList[idx];
  if(!ch) return;
  playing=false; clearTimeout(failTmr);
  currentPlayingChannel=ch; channelStartTime=Date.now();
  document.getElementById('p-nm').innerHTML=ch.flag+' '+esc(ch.name);
  var langInfo=ch.language?' · Idioma: '+ch.language:'';
  document.getElementById('p-inf').textContent=(ch.country||'Mundo')+langInfo;
  document.getElementById('p-st').innerHTML='&#9203; Conectando...';
  document.getElementById('verifyStatus').textContent='Testando: '+ch.name.substring(0,25);
  showScr('player'); showOv();
  var vid=document.getElementById('vid');
  stopHls(); vid.src='';
  var url=ch.url;
  if(!url){ document.getElementById('p-st').textContent='Erro URL invalida'; registrarTelemetria(ch,'ruim'); currentPlayingChannel=null; setTimeout(function(){showScr('channels')},2000); return; }
  failTmr=setTimeout(function(){ if(!playing){ registrarTelemetria(ch,'ruim'); currentPlayingChannel=null; document.getElementById('p-st').textContent='Timeout'; showScr('channels'); } },10000);
  var tried=false;
  vid.onerror=function(){ if(!tried){ tried=true; tryHls(); } else { document.getElementById('p-st').textContent='Erro'; registrarTelemetria(ch,'ruim'); currentPlayingChannel=null; showScr('channels'); } };
  vid.oncanplay=function(){ playing=true; clearTimeout(failTmr); document.getElementById('p-st').innerHTML='&#9654; Ao vivo verificando...'; registrarTelemetria(ch,'bom'); verificarQualidade(ch,vid); };
  vid.src=url;
  try{ vid.load(); var p=vid.play(); if(p&&p.catch) p.catch(function(){}); }catch(e){}
  function tryHls(){
    if(typeof Hls==='undefined'){
      if(hlsLoaded){ registrarTelemetria(ch,'ruim'); currentPlayingChannel=null; showScr('channels'); return; }
      hlsLoaded=true;
      document.getElementById('p-st').innerHTML='&#9203; Carregando HLS...';
      var s=document.createElement('script');
      s.src='https://cdn.jsdelivr.net/npm/hls.js@1/dist/hls.min.js';
      s.onload=tryHls;
      s.onerror=function(){ document.getElementById('p-st').textContent='HLS indisponivel'; registrarTelemetria(ch,'ruim'); currentPlayingChannel=null; showScr('channels'); };
      document.head.appendChild(s); return;
    }
    if(!Hls.isSupported()){ registrarTelemetria(ch,'ruim'); currentPlayingChannel=null; showScr('channels'); return; }
    hls=new Hls({maxBufferLength:30, startLevel:-1, debug:false});
    hls.loadSource(url); hls.attachMedia(vid);
    hls.on(Hls.Events.MANIFEST_PARSED,function(){ clearTimeout(failTmr); playing=true; document.getElementById('p-st').innerHTML='&#9654; Ao vivo verificando...'; registrarTelemetria(ch,'bom'); verificarQualidade(ch,vid); try{ var p=vid.play(); if(p&&p.catch) p.catch(function(){}); }catch(e){} });
    hls.on(Hls.Events.ERROR,function(ev,d){ if(d.fatal){ document.getElementById('p-st').textContent='Erro HLS'; registrarTelemetria(ch,'ruim'); currentPlayingChannel=null; showScr('channels'); } });
  }
}

function showOv(){
  var ov=document.getElementById('p-ov');
  ov.classList.remove('hide'); clearTimeout(ovTmr);
  ovTmr=setTimeout(function(){ ov.classList.add('hide'); },4000);
}

// ============================================================
// TECLADO / CONTROLE REMOTO
// ============================================================
document.onkeydown=function(e){
  e=e||window.event;
  var k=e.keyCode||e.which;
  var UP=k===38, DN=k===40, OK=k===13||k===32;
  var BK=k===8||k===27||k===36||k===88||k===166||k===196||k===457||k===461||k===1009||k===4||k===10009||k===10182;
  var blockKeys=[4,8,13,27,32,36,37,38,39,40,88,166,196,457,461,1009,10009,10182];
  var shouldBlock=false;
  for(var bi=0;bi<blockKeys.length;bi++) if(k===blockKeys[bi]){ shouldBlock=true; break; }
  if(shouldBlock){ if(e.preventDefault)e.preventDefault(); else e.returnValue=false; }
  if(SCR==='menu'){
    if(UP && mIdx>0){ mIdx--; setFoc(mItems[mIdx]); }
    else if(DN && mIdx<mItems.length-1){ mIdx++; setFoc(mItems[mIdx]); }
    else if(OK && mItems[mIdx] && mItems[mIdx]._cat) loadCat(mItems[mIdx]._cat);
  }else if(SCR==='channels'){
    if(BK){ stopHls(); showScr('menu'); }
    else if(UP && cIdx>0){ cIdx--; setFoc(cItems[cIdx]); }
    else if(DN){
      if(cIdx>=cItems.length-3 && renderOffset<renderAllChannels.length) renderProximoLote();
      if(cIdx<cItems.length-1){ cIdx++; setFoc(cItems[cIdx]); }
    }
    else if(OK && cItems[cIdx]){
      var el2=cItems[cIdx];
      if(el2.id==='c-back') showScr('menu');
      else if(el2.id==='c-retry'){ if(retryFn) retryFn(); }
      else{ var idx=parseInt(el2.getAttribute('data-idx')||'-1'); if(idx>=0) play(idx); }
    }
  }else if(SCR==='player'){
    if(BK){ currentPlayingChannel=null; stopHls(); showScr('channels'); } else showOv();
  }
};

// ============================================================
// MONTAR MENU
// ============================================================
(function(){
  var side=document.getElementById('m-side');
  for(var i=0;i<CATS.length;i++){
    var d=CATS[i];
    if(d.G){
      var g=document.createElement('div'); g.className='m-grp'; g.innerHTML=d.G; side.appendChild(g);
    }else{
      var el=document.createElement('div'); el.className='m-item'; el.tabIndex=0;
      el.innerHTML='<span class="m-ico">'+d.e+'</span><div><div class="m-lbl">'+esc(d.n)+'</div><div class="m-sub">'+esc(d.s)+'</div></div>';
      el._cat=d;
      (function(cat,item,ii){
        item.onclick=function(){ loadCat(cat); };
        item.onmouseover=function(){ mIdx=ii; setFoc(item); };
      })(d,el,mItems.length);
      side.appendChild(el); mItems.push(el);
    }
  }
  document.getElementById('c-back').onclick=function(){ showScr('menu'); };
  document.getElementById('c-retry').onclick=function(){ if(retryFn) retryFn(); };
  document.getElementById('p-back').onclick=function(){ currentPlayingChannel=null; stopHls(); showScr('channels'); };
  document.getElementById('s-player').onmousemove=showOv;
  if(mItems.length) setFoc(mItems[0]);
})();

// ============================================================
// SUPORTE MOUSE / TOUCH NA TV
// ============================================================
(function(){
  var cursorTimer=null;
  function mostrarCursor(){
    document.body.className=document.body.className.replace(/\bcursor-off\b/,'').trim();
    clearTimeout(cursorTimer);
    cursorTimer=setTimeout(function(){
      if(SCR==='player'){
        if(document.body.className.indexOf('cursor-off')===-1)
          document.body.className=(document.body.className+' cursor-off').trim();
      }
    },4000);
  }
  document.onmousemove=mostrarCursor;

  var listEl=document.getElementById('c-list');
  var szTop=document.getElementById('sz-top');
  var szBot=document.getElementById('sz-bot');
  var autoScrollTimer=null;
  function pararAutoScroll(){
    clearInterval(autoScrollTimer);autoScrollTimer=null;
    szTop.className=szTop.className.replace(/\bactive\b/,'').trim();
    szBot.className=szBot.className.replace(/\bactive\b/,'').trim();
  }
  function iniciarAutoScroll(dir){
    if(autoScrollTimer) return;
    autoScrollTimer=setInterval(function(){
      listEl.scrollTop+=dir*18;
      if(dir>0){
        var r=listEl.scrollHeight-listEl.scrollTop-listEl.clientHeight;
        if(r<200 && renderOffset<renderAllChannels.length) renderProximoLote();
      }
    },30);
  }
  if(szTop){
    szTop.onmouseenter=function(){ szTop.className+=' active'; iniciarAutoScroll(-1); };
    szTop.onmouseleave=pararAutoScroll;
  }
  if(szBot){
    szBot.onmouseenter=function(){ szBot.className+=' active'; iniciarAutoScroll(1); };
    szBot.onmouseleave=pararAutoScroll;
  }

  if(listEl.addEventListener){
    listEl.addEventListener('wheel',function(e){
      e=e||window.event; if(e.preventDefault) e.preventDefault();
      listEl.scrollTop+=(e.deltaY||e.detail||0)>0?80:-80;
      var r=listEl.scrollHeight-listEl.scrollTop-listEl.clientHeight;
      if(r<300 && renderOffset<renderAllChannels.length) renderProximoLote();
    },false);
  }

  var touchStartY=0,touchStartScroll=0,touchMoved=false;
  if(listEl.addEventListener){
    listEl.addEventListener('touchstart',function(e){
      touchStartY=e.touches[0].clientY; touchStartScroll=listEl.scrollTop; touchMoved=false;
    },false);
    listEl.addEventListener('touchmove',function(e){
      var dy=touchStartY-e.touches[0].clientY;
      listEl.scrollTop=touchStartScroll+dy;
      if(Math.abs(dy)>5) touchMoved=true;
      var r=listEl.scrollHeight-listEl.scrollTop-listEl.clientHeight;
      if(r<300 && renderOffset<renderAllChannels.length) renderProximoLote();
    },false);
    listEl.addEventListener('touchend',function(e){
      if(touchMoved) return;
      var t=e.changedTouches[0];
      var el=document.elementFromPoint(t.clientX,t.clientY);
      if(!el) return;
      var ch=el.closest?el.closest('.ch'):null;
      if(ch){
        var fav=el.closest?el.closest('.ch-fav'):null;
        var del=el.closest?el.closest('.ch-delete'):null;
        if(fav){ fav.onclick && fav.onclick(e); return; }
        if(del){ del.onclick && del.onclick(e); return; }
        var idx=parseInt(ch.getAttribute('data-idx')||'-1');
        if(idx>=0) play(idx);
      }
    },false);
  }

  var menuSide=document.getElementById('m-side');
  var menuTouchMoved=false,menuTouchStartY=0;
  if(menuSide.addEventListener){
    menuSide.addEventListener('touchstart',function(e){ menuTouchStartY=e.touches[0].clientY; menuTouchMoved=false; },false);
    menuSide.addEventListener('touchmove',function(e){ if(Math.abs(e.touches[0].clientY-menuTouchStartY)>5) menuTouchMoved=true; },false);
    menuSide.addEventListener('touchend',function(e){
      if(menuTouchMoved) return;
      var el=document.elementFromPoint(e.changedTouches[0].clientX,e.changedTouches[0].clientY);
      if(!el) return;
      var item=el.closest?el.closest('.m-item'):null;
      if(item && item._cat) loadCat(item._cat);
    },false);
  }
})();
